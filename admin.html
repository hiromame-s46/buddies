<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Buddies 管理画面</title>
<meta name="robots" content="noindex,nofollow">
<meta name="description" content="Buddies profile の管理ページです。">

<meta property="og:description" content="Buddies profile の管理ページです。">

<link rel="icon" type="image/png" sizes="32x32" href="icon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icon/favicon-16x16.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--line:#e5e5e5;--danger:#e53e3e;}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN",sans-serif;background:#f6f6f6;color:#111;min-height:100vh;}
.app{max-width:720px;margin:0 auto;min-height:100vh;background:#fff;display:flex;flex-direction:column;}
header{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);padding:14px 20px;display:flex;align-items:center;gap:12px;z-index:10;}
header h1{font-size:18px;font-weight:800;flex:1;}
.btn{height:38px;padding:0 16px;border-radius:9999px;border:1px solid var(--line);background:#fff;font-weight:600;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;color:#111;font-family:inherit;}
.btn:hover{background:#f5f5f5;}
.btn-primary{background:#111;color:#fff;border-color:#111;}
.btn-primary:hover{background:#333;}
.btn-danger{background:#fff;color:var(--danger);border-color:#fed7d7;}
.btn-danger:hover{background:#fff5f5;}
#tab-content{flex:1;min-height:0;display:flex;flex-direction:column;}

/* ログイン */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:32px 28px;width:100%;max-width:340px;}
.login-card h2{font-size:20px;font-weight:800;margin-bottom:20px;}
.login-card input{width:100%;padding:12px 16px;border:1px solid var(--line);border-radius:12px;font-size:15px;font-family:inherit;margin-bottom:12px;outline:none;}
.login-card input:focus{border-color:#111;}
.login-card .btn{width:100%;justify-content:center;height:46px;font-size:15px;}
.login-err{font-size:13px;color:var(--danger);margin-bottom:10px;}

/* タブ */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--line);padding:0 20px;}
.tab{padding:12px 16px;font-size:14px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:#999;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;}
.tab.active{color:#111;border-bottom-color:#111;}

/* タグ統合UI */
.section{padding:20px;}
.section.fill-section{flex:1;min-height:0;display:flex;flex-direction:column;}
.section-title{font-size:12px;font-weight:700;color:#999;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;}
.tag-list{display:flex;flex-direction:column;gap:6px;flex:1;min-height:260px;overflow-y:auto;border:1px solid var(--line);border-radius:14px;padding:8px;}
.tag-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;cursor:pointer;transition:background .12s;}
.tag-row:hover{background:#f5f5f5;}
.tag-row.selected{background:#f0f0f0;}
.tag-name{flex:1;font-size:14px;font-weight:600;}
.tag-count{font-size:12px;color:#999;flex-shrink:0;}
.tag-checkbox{width:18px;height:18px;accent-color:#111;flex-shrink:0;cursor:pointer;}
.merge-panel{margin-top:16px;padding:16px;border:1px solid var(--line);border-radius:14px;background:#fafafa;display:none;}
.merge-panel.show{display:block;}
.suggest-panel{border:1px solid var(--line);border-radius:14px;background:#fafafa;padding:12px;margin:0 0 12px;display:none;}
.suggest-panel.show{display:block;}
.suggest-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;}
.suggest-title{font-size:12px;font-weight:800;color:#555;}
.suggest-list{display:grid;gap:8px;max-height:210px;overflow:auto;}
.suggest-card{border:1px solid #eee;border-radius:12px;background:#fff;padding:10px;display:grid;gap:8px;}
.suggest-tags{display:flex;flex-wrap:wrap;gap:6px;}
.suggest-tag{font-size:12px;font-weight:700;background:#f1f1f1;border-radius:9999px;padding:4px 9px;}
.suggest-meta{font-size:11px;color:#777;line-height:1.5;}
.merge-label{font-size:12px;font-weight:700;color:#666;margin-bottom:6px;}
.merge-selected{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;min-height:30px;}
.merge-tag{padding:4px 12px;border-radius:9999px;background:#eee;font-size:13px;font-weight:600;}
.merge-arrow{font-size:20px;text-align:center;margin:8px 0;color:#999;}
.merge-to-wrap{display:flex;gap:8px;align-items:center;margin-bottom:12px;}
.merge-to-wrap input{flex:1;padding:10px 14px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;outline:none;}
.merge-to-wrap input:focus{border-color:#111;}
.merge-hint{font-size:12px;color:#999;margin-bottom:12px;}
.result-msg{font-size:13px;font-weight:600;padding:10px 14px;border-radius:10px;display:none;margin-top:10px;}
.result-msg.ok{background:#f0fff4;color:#276749;border:1px solid #c6f6d5;}
.result-msg.err{background:#fff5f5;color:var(--danger);border:1px solid #fed7d7;}
.search-wrap{margin-bottom:10px;}
.search-wrap input{width:100%;padding:10px 14px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;outline:none;}
.search-wrap input:focus{border-color:#111;}
.loading{text-align:center;padding:30px;color:#999;font-size:14px;}
    .empty{text-align:center;padding:30px;color:#999;font-size:14px;}
    .admin-form{display:grid;gap:10px;border:1px solid var(--line);border-radius:14px;padding:14px;background:#fafafa;margin-bottom:16px;}
    .admin-form input,.admin-form textarea,.admin-form select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;outline:none;background:#fff;}
    .admin-form textarea{min-height:72px;resize:vertical;line-height:1.6;}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .verified-list{display:grid;gap:8px;}
    .verified-row{border:1px solid var(--line);border-radius:14px;padding:12px;display:grid;gap:8px;background:#fff;}
    .verified-row-head{display:flex;align-items:center;gap:10px;}
    .verified-row-name{font-size:15px;font-weight:800;flex:1;}
    .verified-row-meta{font-size:12px;color:#777;line-height:1.5;}
    .verified-status{font-size:11px;font-weight:800;border-radius:9999px;padding:4px 8px;background:#f2f2f2;}
    @media(max-width:640px){.form-grid{grid-template-columns:1fr}.tabs{overflow-x:auto}.tab{white-space:nowrap}}
    /* 編集モーダル */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal-sheet{background:#fff;width:100%;max-width:560px;border-radius:20px 20px 0 0;max-height:92dvh;display:flex;flex-direction:column}
    .modal-head{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
    .modal-head h3{margin:0;font-size:16px;font-weight:800;flex:1}
    .modal-close{background:none;border:none;cursor:pointer;font-size:22px;color:#666;width:36px;height:36px;border-radius:50%;display:grid;place-items:center}
    .modal-body{padding:18px;overflow:auto;flex:1}
    .modal-foot{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}
    .modal-body .field{display:grid;gap:6px;margin-bottom:10px}
    .modal-body .field label{font-size:12px;font-weight:700;color:#555}
    .modal-body input,.modal-body textarea,.modal-body select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;outline:none;background:#fff;min-width:0;box-sizing:border-box}
    .modal-body textarea{min-height:80px;resize:vertical;line-height:1.6}
    .sns-admin-editor{display:grid;gap:8px;margin:8px 0 12px}
    .sns-admin-row{display:grid;grid-template-columns:132px minmax(0,1fr) minmax(0,120px) 40px;gap:8px;align-items:center}
    .sns-admin-row .btn{width:40px;padding:0}
    .user-link-list{display:grid;gap:8px}
    .user-link-row{border:1px solid var(--line);border-radius:14px;background:#fff;padding:12px;display:grid;gap:8px}
    .user-link-head{display:flex;align-items:center;gap:10px}
    .user-link-icon{width:38px;height:38px;border-radius:50%;background:#f2f2f2;display:grid;place-items:center;overflow:hidden;font-weight:800;color:#777;flex-shrink:0}
    .user-link-icon img{width:100%;height:100%;object-fit:cover}
    .user-link-name{font-size:14px;font-weight:800}
    .user-link-meta{font-size:12px;color:#777}
    @media(max-width:640px){.sns-admin-row{grid-template-columns:1fr 40px}.sns-admin-row input{grid-column:1/-1}.sns-admin-row .sns-label-input{grid-row:3}}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <h2>開発者ログイン</h2>
    <div id="login-err" class="login-err" style="display:none;"></div>
    <p style="font-size:13px;line-height:1.7;color:#666;margin-bottom:14px;">Buddies profile の通常アカウントでログインします。uid=1 の開発者アカウントのみ管理画面に入れます。</p>
    <input type="text" id="admin-username-input" placeholder="ユーザー名" autocomplete="username">
    <input type="password" id="admin-password-input" placeholder="パスワード" autocomplete="current-password">
    <button class="btn btn-primary" onclick="doLogin()">ログイン</button>
    <a class="btn" href="./index.html" style="width:100%;justify-content:center;text-decoration:none;margin-top:8px;">Buddiesに戻る</a>
  </div>
</div>

<!-- メイン画面 -->
<div id="main-screen" class="app" style="display:none;">
  <header>
    <h1>Buddies 管理</h1>
    <button class="btn" onclick="doLogout()">ログアウト</button>
  </header>

	  <div class="tabs">
	    <button class="tab active" onclick="switchTab('tags')">興味タグ</button>
	    <button class="tab" onclick="switchTab('songs')">楽曲タグ</button>
	    <button class="tab" onclick="switchTab('profile_links')">ユーザーリンク</button>
	    <button class="tab" onclick="switchTab('verified')">コミュニティアカウント</button>
	  </div>

  <div id="tab-content">
    <!-- タブ内容はJS描画 -->
  </div>
</div>

<!-- コミュニティアカウント編集モーダル -->
<div class="modal-overlay" id="edit-verified-modal" onclick="if(event.target===this)closeEditVerified()">
  <div class="modal-sheet">
    <div class="modal-head">
      <h3>コミュニティアカウントを編集</h3>
      <button class="modal-close" type="button" onclick="closeEditVerified()">×</button>
    </div>
    <div class="modal-body" id="edit-verified-body"></div>
    <div class="modal-foot">
      <button class="btn" type="button" onclick="closeEditVerified()">キャンセル</button>
      <button class="btn btn-primary" type="button" onclick="saveEditVerified()">保存</button>
    </div>
  </div>
</div>

<script>
const API = 'api.php';
let currentType = 'tags';
let allItems = [];
let filtered = [];
let selectedNames = new Set();
let verifiedAccounts = [];
let profileLinkUsers = [];
let editingProfileLinkUser = null;

document.getElementById('admin-password-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('admin-username-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

tryDeveloperSession();

function showLoginError(message) {
  const err = document.getElementById('login-err');
  err.textContent = message;
  err.style.display = 'block';
}

function enterAdmin(data) {
  allItems = data || [];
  filtered = allItems;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  currentType = 'tags';
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.includes('興味')));
  renderTab();
}

async function tryDeveloperSession() {
  try {
    const res = await fetch(`${API}?action=admin_tag_list&type=tags`, { credentials:'include' });
    const json = await res.json();
    if (!json.ok) return;
    enterAdmin(json.data || []);
  } catch(e) {}
}

async function doLogin() {
  const username = document.getElementById('admin-username-input').value.trim();
  const password = document.getElementById('admin-password-input').value;
  if (!username || !password) {
    showLoginError('ユーザー名とパスワードを入力してください');
    return;
  }
  const loginRes = await fetch(`${API}?action=auth_login`, {
    method:'POST',
    credentials:'include',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ username, password })
  });
  const loginJson = await loginRes.json();
  if (!loginJson.ok) {
    showLoginError(loginJson.error || 'ログインできませんでした');
    return;
  }
  const res = await fetch(`${API}?action=admin_tag_list&type=tags`, { credentials:'include' });
  const json = await res.json();
  if (!json.ok) {
    await fetch(`${API}?action=auth_logout`, { method:'POST', credentials:'include' }).catch(()=>{});
    showLoginError(json.error || 'uid=1 の通常ログインが必要です');
    return;
  }
  enterAdmin(json.data || []);
}

async function doLogout() {
  await fetch(`${API}?action=auth_logout`, { method:'POST', credentials:'include' }).catch(()=>{});
  allItems = [];
  filtered = [];
  selectedNames.clear();
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('admin-password-input').value = '';
}

// ── タブ切替 ─────────────────────────────────────────────
function switchTab(type) {
  currentType = type;
  selectedNames.clear();
  document.querySelectorAll('.tab').forEach(t => {
    const active = (type === 'tags' && t.textContent.includes('興味'))
      || (type === 'songs' && t.textContent.includes('楽曲'))
      || (type === 'profile_links' && t.textContent.includes('ユーザーリンク'))
      || (type === 'verified' && t.textContent.includes('コミュニティ'));
    t.classList.toggle('active', active);
  });
  if (type === 'verified') loadVerifiedAccounts();
  else if (type === 'profile_links') loadProfileLinks();
  else loadTagList();
}

async function loadTagList() {
  document.getElementById('tab-content').innerHTML = '<div class="loading">読み込み中…</div>';
  const res  = await fetch(`${API}?action=admin_tag_list&type=${currentType}`, { credentials:'include' });
  const json = await res.json();
  if (!json.ok) { document.getElementById('tab-content').innerHTML = '<div class="empty">読み込みに失敗しました</div>'; return; }
  allItems = json.data || [];
  filtered = allItems;
  selectedNames.clear();
  renderTab();
}

function filterList(q) {
  const norm = q.trim().toLowerCase();
  filtered = norm ? allItems.filter(it => it.name.toLowerCase().includes(norm)) : allItems;
  renderList();
}

function renderList() {
  const wrap = document.getElementById('tag-list');
  if (!filtered.length) { wrap.innerHTML = '<div class="empty" style="padding:20px;text-align:center;color:#999;font-size:13px;">該当するタグはありません</div>'; return; }
  wrap.innerHTML = filtered.map(it => `
    <label class="tag-row ${selectedNames.has(it.name) ? 'selected' : ''}">
      <input type="checkbox" class="tag-checkbox" value="${esc(it.name)}" ${selectedNames.has(it.name) ? 'checked' : ''} onchange="toggleSelect(this)">
      <span class="tag-name">${esc(it.name)}</span>
      <span class="tag-count">${it.count}人</span>
    </label>
  `).join('');
}

function toggleSelect(cb) {
  if (cb.checked) selectedNames.add(cb.value);
  else selectedNames.delete(cb.value);
  updateMergePanel();
  // チェックされた行のハイライトを更新
  cb.closest('.tag-row').classList.toggle('selected', cb.checked);
}

function updateMergePanel() {
  const panel = document.getElementById('merge-panel');
  const sel   = document.getElementById('merge-selected');
  if (!panel || !sel) return;
  if (selectedNames.size === 0) {
    panel.classList.remove('show');
    return;
  }
  panel.classList.add('show');
  sel.innerHTML = [...selectedNames].map(n => `<span class="merge-tag">${esc(n)}</span>`).join('');
  document.getElementById('result-msg').style.display = 'none';
}

function fillMergeTo() {
  // 選択中のタグのうち件数が最多のものを統合先候補として入れる
  if (!selectedNames.size) return;
  const best = allItems.filter(it => selectedNames.has(it.name)).sort((a,b) => b.count - a.count)[0];
  if (best) document.getElementById('merge-to').value = best.name;
}

async function doMerge() {
  const to = document.getElementById('merge-to').value.trim();
  if (!to) { showResult('統合先のタグ名を入力してください', false); return; }
  if (!selectedNames.size) { showResult('統合するタグを選択してください', false); return; }

  const froms = [...selectedNames].filter(n => n !== to);
  if (!froms.length) { showResult('統合するタグと統合先が全て同じです', false); return; }

  const label = currentType === 'tags' ? '興味タグ' : '楽曲タグ';
  if (!confirm(`${label}「${froms.join('・')}」を「${to}」に統合します。\nこの操作は元に戻せません。実行しますか？`)) return;

  let totalUpdated = 0;
  for (const from of froms) {
	    const res  = await fetch(`${API}?action=admin_tag_merge`, {
	      method: 'POST',
	      credentials:'include',
	      headers: { 'Content-Type': 'application/json' },
	      body: JSON.stringify({ type: currentType, from, to }),
	    });
    const json = await res.json();
    if (!json.ok) { showResult(`エラー: ${json.error}`, false); return; }
    totalUpdated += json.data.updated;
  }

  showResult(`完了: ${froms.join('・')} → ${to} に統合（${totalUpdated}人更新）`, true);
  selectedNames.clear();
  await loadTagList();
}

function showResult(msg, ok) {
  const el = document.getElementById('result-msg');
  if (!el) return;
  el.textContent = msg;
  el.className = 'result-msg ' + (ok ? 'ok' : 'err');
  el.style.display = 'block';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function assetUrl(url){
  if(!url) return '';
  if(/^https?:\/\//.test(url) || url.startsWith('data:')) return url;
  return url.startsWith('/') ? url : './' + url;
}

function snsLabel(type){
  return ({x:'X',threads:'Threads',instagram:'Instagram',tiktok:'TikTok',youtube:'YouTube',github:'GitHub',line:'LINE',note:'note',ameba:'Ameba',link:'その他リンク'})[type] || 'その他リンク';
}
function snsOptions(){
  return ['x','threads','instagram','tiktok','youtube','github','line','note','ameba','link'];
}
function normalizeAdminLinks(links, fallbackXUrl = ''){
  const out = Array.isArray(links) ? links.filter(s => s && s.url).map(s => ({ type:s.type || 'link', url:s.url || '', label:s.label || '' })) : [];
  if (fallbackXUrl && !out.some(s => s.url === fallbackXUrl)) out.unshift({ type:'x', url:fallbackXUrl, label:'X' });
  return out;
}
function snsAdminEditorHtml(links, prefix, limit = 10){
  return `<div class="sns-admin-editor" id="${prefix}-sns-editor">
    ${links.map((s,i)=>`<div class="sns-admin-row">
      <select onchange="updateAdminSns('${prefix}',${i},'type',this.value)">${snsOptions().map(type => `<option value="${type}" ${s.type===type?'selected':''}>${snsLabel(type)}</option>`).join('')}</select>
      <input value="${esc(s.url||'')}" placeholder="https://..." oninput="updateAdminSns('${prefix}',${i},'url',this.value)">
      <input class="sns-label-input" value="${esc(s.label||'')}" placeholder="表示名" oninput="updateAdminSns('${prefix}',${i},'label',this.value)">
      <button class="btn" type="button" onclick="removeAdminSns('${prefix}',${i})">×</button>
    </div>`).join('')}
  </div><button class="btn" type="button" onclick="addAdminSns('${prefix}',${limit})" ${links.length >= limit ? 'disabled' : ''}>+ SNSリンクを追加</button>`;
}

function adminSnsStore(prefix){
  if (prefix === 'ev') return window._editingVerifiedSns || (window._editingVerifiedSns = []);
  if (prefix === 'profile') return editingProfileLinkUser?.sns_links || [];
  return window._newVerifiedSns || (window._newVerifiedSns = []);
}
function updateAdminSns(prefix,i,k,v){ const store=adminSnsStore(prefix); if(store[i]) store[i][k]=v; }
function removeAdminSns(prefix,i){ adminSnsStore(prefix).splice(i,1); renderAdminSns(prefix); }
function addAdminSns(prefix,limit=10){ const store=adminSnsStore(prefix); if(store.length>=limit) return; store.push({type:'x',url:'',label:''}); renderAdminSns(prefix); }
function renderAdminSns(prefix){
  const wrap = document.getElementById(`${prefix}-sns-wrap`);
  if (!wrap) return;
  const limit = prefix === 'profile' ? 10 : 500;
  wrap.innerHTML = snsAdminEditorHtml(adminSnsStore(prefix), prefix, limit);
}

function renderTab() {
  if (currentType === 'profile_links') { renderProfileLinksTab(); return; }
  if (currentType === 'verified') { renderVerifiedTab(); return; }
  const label = currentType === 'tags' ? '興味タグ' : '楽曲タグ';
  const suggestions = buildMergeSuggestions(allItems);
  document.getElementById('tab-content').innerHTML = `
    <div class="section fill-section">
      <div class="section-title">${label}一覧（${allItems.length}件）　チェックして統合</div>
      <div class="search-wrap">
        <input type="text" id="tag-search" placeholder="${label}を検索…" oninput="filterList(this.value)">
      </div>
      <div class="suggest-panel ${suggestions.length ? 'show' : ''}" id="suggest-panel">
        <div class="suggest-head">
          <div class="suggest-title">似たタグの統合候補（${suggestions.length}件）</div>
          <button class="btn" onclick="renderSuggestions()">再分析</button>
        </div>
        <div class="suggest-list" id="suggest-list"></div>
      </div>
      <div class="tag-list" id="tag-list"></div>
    </div>
    <div class="merge-panel" id="merge-panel">
      <div class="merge-label">統合するタグ（削除される側）</div>
      <div class="merge-selected" id="merge-selected"></div>
      <div class="merge-arrow">↓ 統合先</div>
      <div class="merge-label">統合先のタグ名</div>
      <div class="merge-to-wrap">
        <input type="text" id="merge-to" placeholder="統合先のタグ名を入力">
        <button class="btn" onclick="fillMergeTo()">最多件数を選択</button>
      </div>
      <div class="merge-hint">※ チェックしたタグを持つ全ユーザーに「統合先タグ」を適用し、元のタグを削除します。</div>
      <button class="btn btn-danger" onclick="doMerge()">統合を実行</button>
      <div class="result-msg" id="result-msg"></div>
    </div>
  `;
  renderSuggestions(suggestions);
  renderList();
}

function normalizeTagName(name) {
  return String(name || '')
    .toLowerCase()
    .normalize('NFKC')
    .replace(/[＃#]/g, '')
    .replace(/[・･\s_\-ー〜～~!！?？.,，、。()[\]（）「」『』]/g, '');
}

function tagSimilarity(a, b) {
  const x = normalizeTagName(a);
  const y = normalizeTagName(b);
  if (!x || !y || x === y) return x === y ? 1 : 0;
  if (x.includes(y) || y.includes(x)) return Math.min(x.length, y.length) / Math.max(x.length, y.length) + .25;
  const xs = new Set([...x]);
  const ys = new Set([...y]);
  const inter = [...xs].filter(ch => ys.has(ch)).length;
  const union = new Set([...xs, ...ys]).size || 1;
  return inter / union;
}

function buildMergeSuggestions(items) {
  const out = [];
  const used = new Set();
  const sorted = [...items].sort((a,b) => String(a.name).localeCompare(String(b.name), 'ja'));
  for (let i = 0; i < sorted.length; i++) {
    const base = sorted[i];
    if (used.has(base.name)) continue;
    const group = [base];
    for (let j = i + 1; j < sorted.length; j++) {
      const other = sorted[j];
      if (used.has(other.name)) continue;
      const score = tagSimilarity(base.name, other.name);
      if (score >= .72) group.push(other);
    }
    if (group.length >= 2) {
      group.forEach(it => used.add(it.name));
      const target = [...group].sort((a,b) => b.count - a.count || a.name.length - b.name.length)[0];
      out.push({ target: target.name, items: group, score: Math.round(Math.max(...group.filter(it => it !== target).map(it => tagSimilarity(target.name, it.name))) * 100) });
    }
  }
  return out.sort((a,b) => b.items.reduce((s,it)=>s+it.count,0) - a.items.reduce((s,it)=>s+it.count,0)).slice(0, 12);
}

function renderSuggestions(prebuilt = null) {
  const suggestions = prebuilt || buildMergeSuggestions(allItems);
  const panel = document.getElementById('suggest-panel');
  const list = document.getElementById('suggest-list');
  if (!panel || !list) return;
  panel.classList.toggle('show', suggestions.length > 0);
  const title = panel.querySelector('.suggest-title');
  if (title) title.textContent = `似たタグの統合候補（${suggestions.length}件）`;
  if (!suggestions.length) {
    list.innerHTML = '';
    return;
  }
  list.innerHTML = suggestions.map((s, i) => `
    <div class="suggest-card">
      <div class="suggest-tags">${s.items.map(it => `<span class="suggest-tag">${esc(it.name)} (${it.count})</span>`).join('')}</div>
      <div class="suggest-meta">統合先候補: ${esc(s.target)} / 類似度 ${esc(s.score)}%</div>
      <button class="btn" onclick="applySuggestion(${i})">この候補を選択</button>
    </div>
  `).join('');
  window._tagMergeSuggestions = suggestions;
}

function applySuggestion(index) {
  const suggestions = window._tagMergeSuggestions || [];
  const s = suggestions[index];
  if (!s) return;
  selectedNames = new Set(s.items.map(it => it.name));
  const to = document.getElementById('merge-to');
  if (to) to.value = s.target;
  renderList();
  updateMergePanel();
  document.getElementById('merge-panel')?.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

async function loadVerifiedAccounts() {
  document.getElementById('tab-content').innerHTML = '<div class="loading">読み込み中…</div>';
  const res = await fetch(`${API}?action=verified_admin_list`, { credentials:'include' });
  const json = await res.json();
  if (!json.ok) {
    document.getElementById('tab-content').innerHTML = `<div class="section"><div class="empty">コミュニティ管理は、通常ログイン済みの開発者アカウント（uid=1）のみ利用できます。<br>${esc(json.error || '')}</div></div>`;
    return;
  }
  verifiedAccounts = json.data || [];
  renderVerifiedTab();
}

async function loadProfileLinks(q = '') {
  document.getElementById('tab-content').innerHTML = '<div class="loading">読み込み中…</div>';
  const res = await fetch(`${API}?action=admin_profile_link_list&q=${encodeURIComponent(q)}`, { credentials:'include' });
  const json = await res.json();
  if (!json.ok) {
    document.getElementById('tab-content').innerHTML = `<div class="section"><div class="empty">ユーザーリンク管理は開発者アカウントのみ利用できます。<br>${esc(json.error || '')}</div></div>`;
    return;
  }
  profileLinkUsers = json.data || [];
  renderProfileLinksTab(q);
}

function renderProfileLinksTab(q = '') {
  document.getElementById('tab-content').innerHTML = `
    <div class="section fill-section">
      <div class="section-title">ユーザーSNSリンク管理</div>
      <div class="search-wrap">
        <input id="profile-link-search" value="${esc(q)}" placeholder="表示名・ユーザー名で検索" onkeydown="if(event.key==='Enter')loadProfileLinks(this.value)">
      </div>
      <button class="btn" onclick="loadProfileLinks(document.getElementById('profile-link-search').value)">検索</button>
      <div class="user-link-list" style="margin-top:12px;">
        ${profileLinkUsers.length ? profileLinkUsers.map(userLinkRow).join('') : '<div class="empty">ユーザーが見つかりません</div>'}
      </div>
    </div>`;
}

function userLinkRow(u) {
  const icon = u.user_icon ? `<img src="${esc(assetUrl(u.user_icon))}" alt="">` : esc((u.display_name || u.username || '?')[0]);
  const count = (u.sns_links || []).filter(s => s && s.url).length;
  return `<div class="user-link-row">
    <div class="user-link-head">
      <div class="user-link-icon">${icon}</div>
      <div style="min-width:0;flex:1;">
        <div class="user-link-name">${esc(u.display_name || u.username || '')}</div>
        <div class="user-link-meta">@${esc(u.username || '')} / uid:${esc(u.id)} / SNS ${count}件</div>
      </div>
      <button class="btn btn-primary" onclick="openProfileLinkEditor(${u.id})">リンク編集</button>
    </div>
  </div>`;
}

function openProfileLinkEditor(userId) {
  const user = profileLinkUsers.find(u => Number(u.id) === Number(userId));
  if (!user) return;
  editingProfileLinkUser = { ...user, sns_links: normalizeAdminLinks(user.sns_links || []) };
  const body = document.getElementById('edit-verified-body');
  body.innerHTML = `
    <input type="hidden" id="profile-link-user-id" value="${esc(user.id)}">
    <div class="field"><label>対象ユーザー</label><input value="${esc(user.display_name || user.username || '')} / @${esc(user.username || '')}" disabled></div>
    <div class="field"><label>SNSリンク（最大10件）</label><div id="profile-sns-wrap">${snsAdminEditorHtml(editingProfileLinkUser.sns_links, 'profile', 10)}</div></div>
    <div id="ev-edit-msg" class="result-msg"></div>
  `;
  document.querySelector('#edit-verified-modal .modal-head h3').textContent = 'ユーザーSNSリンクを編集';
  document.querySelector('#edit-verified-modal .modal-foot .btn-primary').setAttribute('onclick', 'saveProfileLinks()');
  document.getElementById('edit-verified-modal').classList.add('open');
}

async function saveProfileLinks() {
  if (!editingProfileLinkUser) return;
  const payload = {
    user_id: editingProfileLinkUser.id,
    sns_links: (editingProfileLinkUser.sns_links || []).filter(s => s.url && s.url.trim()).slice(0, 10),
  };
  const res = await fetch(`${API}?action=admin_profile_link_update`, {
    method:'POST', credentials:'include', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload),
  });
  const json = await res.json();
  const msg = document.getElementById('ev-edit-msg');
  msg.style.display = 'block';
  msg.className = 'result-msg ' + (json.ok ? 'ok' : 'err');
  msg.textContent = json.ok ? '更新しました' : (json.error || '更新に失敗しました');
  if (json.ok) {
    closeEditVerified();
    await loadProfileLinks(document.getElementById('profile-link-search')?.value || '');
  }
}

function verifiedRow(a) {
  return `<div class="verified-row">
    <div class="verified-row-head">
      <div class="verified-row-name">${esc(a.display_name)}</div>
      <span class="verified-status">${esc(a.status)}</span>
    </div>
    <div class="verified-row-meta">
      @${esc(a.login_id || '')} / ${esc(a.label || '')} / 優先度 ${esc(a.recommend_priority)}
      ${a.primary_link_url ? `<br>メインリンク: ${esc(a.primary_link_label || 'リンク')} - ${esc(a.primary_link_url)}` : ''}
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="openEditVerified(${a.id})">編集</button>
      <button class="btn" onclick="promptResetVerifiedPassword(${a.id})">パスワード再発行</button>
      <button class="btn btn-danger" onclick="disableVerifiedAccount(${a.id})">停止</button>
    </div>
  </div>`;
}

  editingProfileLinkUser = null;
  document.querySelector('#edit-verified-modal .modal-head h3').textContent = 'コミュニティアカウントを編集';
  document.querySelector('#edit-verified-modal .modal-foot .btn-primary').setAttribute('onclick', 'saveEditVerified()');
  window._editingVerifiedSns = normalizeAdminLinks(a.sns_links || [], a.x_url || '');
  const body = document.getElementById('edit-verified-body');
  body.innerHTML = `
    <input type="hidden" id="ev-id" value="${a.id}">
    <div class="form-grid">
      <div class="field"><label>表示名</label><input id="ev-name" value="${esc(a.display_name||'')}"></div>
      <div class="field"><label>種別</label>
        <select id="ev-type">
          <option value="verified" ${a.account_type==='verified'?'selected':''}>コミュニティアカウント</option>
          <option value="developer" ${a.account_type==='developer'?'selected':''} ${a.account_type==='developer'?'':'disabled'}>開発者アカウント</option>
        </select>
      </div>
      <div class="field"><label>ラベル</label><input id="ev-label" value="${esc(a.label||'')}"></div>
      <div class="field"><label>おすすめ優先度</label><input id="ev-priority" type="number" value="${esc(a.recommend_priority ?? 0)}"></div>
      <div class="field"><label>ステータス</label>
        <select id="ev-status">
          <option value="active" ${a.status==='active'?'selected':''}>有効</option>
          <option value="paused" ${a.status==='paused'?'selected':''}>停止中</option>
          <option value="disabled" ${a.status==='disabled'?'selected':''}>無効</option>
        </select>
      </div>
    </div>
    <div class="field"><label>説明</label><textarea id="ev-desc">${esc(a.description||'')}</textarea></div>
    <div class="form-grid">
      <div class="field"><label>メインボタン文言</label><input id="ev-plabel" value="${esc(a.primary_link_label||'')}"></div>
      <div class="field"><label>メインリンクURL</label><input id="ev-purl" value="${esc(a.primary_link_url||'')}"></div>
      <div class="field"><label>サブボタン文言</label><input id="ev-slabel" value="${esc(a.secondary_link_label||'')}"></div>
      <div class="field"><label>サブリンクURL</label><input id="ev-surl" value="${esc(a.secondary_link_url||'')}"></div>
      <div class="field"><label>サブ2ボタン文言</label><input id="ev-ctalabel" value="${esc(a.cta_label||'')}"></div>
      <div class="field"><label>サブ2リンクURL</label><input id="ev-ctaurl" value="${esc(a.cta_url||'')}"></div>
      <div class="field"><label>ハッシュタグ（カンマ区切り）</label><input id="ev-hashtags" value="${esc((a.hashtags||[]).join(', '))}"></div>
    </div>
    <div class="field"><label>SNSリンク</label><div id="ev-sns-wrap">${snsAdminEditorHtml(window._editingVerifiedSns, 'ev', 500)}</div></div>
    <div id="ev-edit-msg" class="result-msg"></div>
  `;
  document.getElementById('edit-verified-modal').classList.add('open');
}
function closeEditVerified(){
  document.getElementById('edit-verified-modal').classList.remove('open');
  document.querySelector('#edit-verified-modal .modal-head h3').textContent = 'コミュニティアカウントを編集';
  document.querySelector('#edit-verified-modal .modal-foot .btn-primary').setAttribute('onclick', 'saveEditVerified()');
}
async function saveEditVerified(){
  const id = Number(document.getElementById('ev-id').value);
  const payload = {
    id,
    display_name: document.getElementById('ev-name').value.trim(),
    account_type: document.getElementById('ev-type').value,
    label: document.getElementById('ev-label').value.trim(),
    description: document.getElementById('ev-desc').value.trim(),
    primary_link_label: document.getElementById('ev-plabel').value.trim(),
    primary_link_url:   document.getElementById('ev-purl').value.trim(),
    secondary_link_label: document.getElementById('ev-slabel').value.trim(),
    secondary_link_url:   document.getElementById('ev-surl').value.trim(),
    cta_label: document.getElementById('ev-ctalabel').value.trim(),
    cta_url: document.getElementById('ev-ctaurl').value.trim(),
    x_url: ((window._editingVerifiedSns || []).find(s => s.type === 'x' && s.url && s.url.trim()) || {}).url || '',
    sns_links: (window._editingVerifiedSns || []).filter(s => s.url && s.url.trim()),
    hashtags: document.getElementById('ev-hashtags').value.split(',').map(s=>s.trim()).filter(Boolean),
    recommend_priority: Number(document.getElementById('ev-priority').value || 0),
    status: document.getElementById('ev-status').value,
  };
  const res = await fetch(`${API}?action=verified_admin_update`, {
    method:'POST', credentials:'include', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload),
  });
  const json = await res.json();
  const msg = document.getElementById('ev-edit-msg');
  msg.style.display = 'block';
  msg.className = 'result-msg ' + (json.ok ? 'ok' : 'err');
  msg.textContent = json.ok ? '更新しました' : (json.error || '更新に失敗しました');
  if (json.ok) {
    closeEditVerified();
    loadVerifiedAccounts();
  }
}

async function createVerifiedAccount() {
  const payload = {
    login_id: document.getElementById('va-login').value.trim(),
    password: document.getElementById('va-pass').value,
    display_name: document.getElementById('va-name').value.trim(),
    account_type: document.getElementById('va-type').value,
    label: document.getElementById('va-label').value.trim(),
    recommend_priority: Number(document.getElementById('va-priority').value || 0),
    description: document.getElementById('va-desc').value.trim(),
    primary_link_label: document.getElementById('va-primary-label').value.trim(),
    primary_link_url: document.getElementById('va-primary-url').value.trim(),
    secondary_link_label: document.getElementById('va-secondary-label').value.trim(),
    secondary_link_url: document.getElementById('va-secondary-url').value.trim(),
    cta_label: document.getElementById('va-cta-label').value.trim(),
    cta_url: document.getElementById('va-cta-url').value.trim(),
    x_url: ((window._newVerifiedSns || []).find(s => s.type === 'x' && s.url && s.url.trim()) || {}).url || '',
    sns_links: (window._newVerifiedSns || []).filter(s => s.url && s.url.trim()),
    hashtags: document.getElementById('va-tags').value.split(',').map(s=>s.trim()).filter(Boolean),
  };
  const res = await fetch(`${API}?action=verified_admin_create`, {
    method:'POST',
    credentials:'include',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  });
  const json = await res.json();
  const msg = document.getElementById('verified-result');
  msg.style.display = 'block';
  msg.className = 'result-msg ' + (json.ok ? 'ok' : 'err');
  msg.textContent = json.ok ? '作成しました' : (json.error || '作成に失敗しました');
  if (json.ok) loadVerifiedAccounts();
}

async function promptResetVerifiedPassword(id) {
  const password = prompt('新しいパスワード（8文字以上）');
  if (!password) return;
  const res = await fetch(`${API}?action=verified_admin_reset_password`, {
    method:'POST',
    credentials:'include',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ id, password })
  });
  const json = await res.json();
  alert(json.ok ? '更新しました' : (json.error || '更新に失敗しました'));
}

async function disableVerifiedAccount(id) {
  if (!confirm('このコミュニティアカウントを停止しますか？')) return;
  const res = await fetch(`${API}?action=verified_admin_disable`, {
    method:'POST',
    credentials:'include',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ id })
  });
  const json = await res.json();
  if (!json.ok) alert(json.error || '停止に失敗しました');
  await loadVerifiedAccounts();
}
