/* ログイン */

/* タブ */

.tab{padding:12px 16px;font-size:14px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:#999;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;}

.merge-panel.show{display:block;}

.search-wrap input:focus{border-color:#111;}

<body>

<!-- ログイン画面 -->
<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <h2>開発者ログイン</h2>
    <div id="login-err" class="login-err" style="display:none;"></div>
    <p style="font-size:13px;line-height:1.7;color:#666;margin-bottom:14px;">Buddies profile の通常アカウントでログインします。uid=1 の開発者アカウントのみ管理画面に入れます。</p>
    <input type="text" id="admin-username-input" placeholder="ユーザー名" autocomplete="username">
    <input type="password" id="admin-password-input" placeholder="パスワード" autocomplete="current-password">
    <button class="btn btn-primary" onclick="doLogin()">ログイン</button>
    <a class="btn" href="./index.html" style="width:100%;justify-content:center;text-decoration:none;margin-top:8px;">Buddiesに戻る</a>
  </div>
</div>

<!-- メイン画面 -->
<div id="main-screen" class="app" style="display:none;">
  <header>
    <h1>Buddies 管理</h1>
    <button class="btn" onclick="doLogout()">ログアウト</button>
  </header>

	  <div class="tabs">
	    <button class="tab active" onclick="switchTab('home')">ホーム</button>
	    <button class="tab" onclick="switchTab('tags')">興味タグ</button>
	    <button class="tab" onclick="switchTab('songs')">楽曲タグ</button>
	    <button class="tab" onclick="switchTab('live_ids')">ライブID</button>
	    <button class="tab" onclick="switchTab('profile_links')">ユーザーリンク</button>
	    <button class="tab" onclick="switchTab('verified')">コミュニティアカウント</button>
	    <button class="tab" onclick="switchTab('contacts')">お問い合わせ</button>
	  </div>

  <div id="tab-content">
    <!-- タブ内容はJS描画 -->
  </div>
</div>

<!-- コミュニティアカウント編集モーダル -->
<div class="modal-overlay" id="edit-verified-modal" onclick="if(event.target===this)closeEditVerified()">
  <div class="modal-sheet">
    <div class="modal-head">
      <h3>コミュニティアカウントを編集</h3>
      <button class="modal-close" type="button" onclick="closeEditVerified()">×</button>
    </div>
    <div class="modal-body" id="edit-verified-body"></div>
    <div class="modal-foot">
      <button class="btn" type="button" onclick="closeEditVerified()">キャンセル</button>
      <button class="btn btn-primary" type="button" onclick="saveEditVerified()">保存</button>
    </div>
  </div>
</div>

<script>
const API = 'api.php';
const ADMIN_UA=navigator.userAgent||'';
const ADMIN_IS_ANDROID=/Android/i.test(ADMIN_UA);
function adminTextareaFocused(){const el=document.activeElement;return !!el&&el.tagName==='TEXTAREA'}
function setAdminVh(){
  const vv=window.visualViewport;
  const layoutH=Math.round(window.innerHeight||document.documentElement.clientHeight||667);
  let h=vv?Math.round(vv.height):layoutH;
  if(ADMIN_IS_ANDROID&&adminTextareaFocused()){
    h=(h&&h>=320)?h:layoutH;
  }else if(!adminTextareaFocused()){
    h=layoutH;
  }else if(!h||h<320){
    h=layoutH;
  }
  document.documentElement.style.setProperty('--admin-vh',Math.max(320,Math.round(h))+'px');
}
setAdminVh();window.visualViewport?.addEventListener('resize',setAdminVh);window.visualViewport?.addEventListener('scroll',()=>{if(!ADMIN_IS_ANDROID)setAdminVh();});window.addEventListener('resize',setAdminVh);
let currentType = 'tags';
let allItems = [];
let filtered = [];
let selectedNames = new Set();
let verifiedAccounts = [];
let profileLinkUsers = [];
let contactInquiries = [];
let currentContact = null;
let contactReplyLockUntil = 0, contactReplyLockTimer = null;
let editingProfileLinkUser = null;

document.getElementById('admin-password-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('admin-username-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

tryDeveloperSession();

function showLoginError(message) {
  const err = document.getElementById('login-err');
  err.textContent = message;
  err.style.display = 'block';
}

function preferredInitialTab() {
  const params = new URLSearchParams(location.search);
  const tab = params.get('tab');
  return ['tags','songs','profile_links','verified','contacts'].includes(tab) ? tab : 'tags';
}

function enterAdmin(data) {
  allItems = data || [];
  filtered = allItems;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'flex';
  switchTab(preferredInitialTab());
}

async function tryDeveloperSession() {
  try {
    const res = await fetch(`${API}?action=admin_tag_list&type=tags`, { credentials:'include' });
    const json = await res.json();
    if (!json.ok) return;
    enterAdmin(json.data || []);
  } catch(e) {}
}

async function doLogin() {
  const username = document.getElementById('admin-username-input').value.trim();
  const password = document.getElementById('admin-password-input').value;
  if (!username || !password) {
    showLoginError('ユーザー名とパスワードを入力してください');
    return;
  }
  const loginRes = await fetch(`${API}?action=auth_login`, {
    method:'POST',
    credentials:'include',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ username, password })
  });
  const loginJson = await loginRes.json();
  if (!loginJson.ok) {
    showLoginError(loginJson.error || 'ログインできませんでした');
    return;
  }
  const res = await fetch(`${API}?action=admin_tag_list&type=tags`, { credentials:'include' });
  const json = await res.json();
  if (!json.ok) {
    await fetch(`${API}?action=auth_logout`, { method:'POST', credentials:'include' }).catch(()=>{});
    showLoginError(json.error || 'uid=1 の通常ログインが必要です');
    return;
  }
  enterAdmin(json.data || []);
}

async function doLogout() {
  await fetch(`${API}?action=auth_logout`, { method:'POST', credentials:'include' }).catch(()=>{});
  allItems = [];
  filtered = [];
  selectedNames.clear();
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('admin-password-input').value = '';
  document.body.classList.remove('contacts-mode');
}

// ── タブ切替 ─────────────────────────────────────────────
function switchTab(type) {
  currentType = type;
  document.body.classList.toggle('contacts-mode', type === 'contacts');
  selectedNames.clear();
  document.querySelectorAll('.tab').forEach(t => {
    const active = (type === 'tags' && t.textContent.includes('興味'))
      || (type === 'songs' && t.textContent.includes('楽曲'))
      || (type === 'profile_links' && t.textContent.includes('ユーザーリンク'))
      || (type === 'verified' && t.textContent.includes('コミュニティ'))
      || (type === 'contacts' && t.textContent.includes('お問い合わせ'));
    t.classList.toggle('active', active);
  });
  if (type === 'verified') loadVerifiedAccounts();
  else if (type === 'profile_links') loadProfileLinks();
  else if (type === 'contacts') loadContactInquiries();
  else loadTagList();
}

async function loadTagList() {
  document.getElementById('tab-content').innerHTML = '<div class="loading">読み込み中…</div>';
  const res  = await fetch(`${API}?action=admin_tag_list&type=${currentType}`, { credentials:'include' });
  const json = await res.json();
  if (!json.ok) { document.getElementById('tab-content').innerHTML = '<div class="empty">読み込みに失敗しました</div>'; return; }

function fillMergeTo() {

async function doMerge() {
  const to = document.getElementById('merge-to').value.trim();
  if (!to) { showResult('統合先のタグ名を入力してください', false); return; }
  if (!selectedNames.size) { showResult('統合するタグを選択してください', false); return; }

  const froms = [...selectedNames].filter(n => n !== to);
  if (!froms.length) { showResult('統合するタグと統合先が全て同じです', false); return; }

  const label = currentType === 'tags' ? '興味タグ' : '楽曲タグ';
  if (!confirm(`${label}「${froms.join('・')}」を「${to}」に統合します。\nこの操作は元に戻せません。実行しますか？`)) return;

  let totalUpdated = 0;
  for (const from of froms) {
	    const res  = await fetch(`${API}?action=admin_tag_merge`, {
	      method: 'POST',
	      credentials:'include',
	      headers: { 'Content-Type': 'application/json' },
	      body: JSON.stringify({ type: currentType, from, to }),
	    });
    const json = await res.json();
    if (!json.ok) { showResult(`エラー: ${json.error}`, false); return; }
    totalUpdated += json.data.updated;
  }

  showResult(`完了: ${froms.join('・')} → ${to} に統合（${totalUpdated}人更新）`, true);
  selectedNames.clear();
  await loadTagList();
}

function normalizeTagName(name) {
  return String(name || '')
    .toLowerCase()
    .normalize('NFKC')
    .replace(/[＃#]/g, '')
    .replace(/[・･\s_\-ー〜～~!！?？.,，、。()[\]（）「」『』]/g, '');
}

function tagSimilarity(a, b) {
  const x = normalizeTagName(a);
  const y = normalizeTagName(b);
  if (!x || !y || x === y) return x === y ? 1 : 0;
  if (x.includes(y) || y.includes(x)) return Math.min(x.length, y.length) / Math.max(x.length, y.length) + .25;
  const xs = new Set([...x]);
  const ys = new Set([...y]);
  const inter = [...xs].filter(ch => ys.has(ch)).length;
  const union = new Set([...xs, ...ys]).size || 1;
  return inter / union;
}

function buildMergeSuggestions(items) {
  const out = [];
  const used = new Set();
  const sorted = [...items].sort((a,b) => String(a.name).localeCompare(String(b.name), 'ja'));
  for (let i = 0; i < sorted.length; i++) {
    const base = sorted[i];
    if (used.has(base.name)) continue;
    const group = [base];
    for (let j = i + 1; j < sorted.length; j++) {
      const other = sorted[j];
      if (used.has(other.name)) continue;
      const score = tagSimilarity(base.name, other.name);
      if (score >= .72) group.push(other);
    }
    if (group.length >= 2) {
      group.forEach(it => used.add(it.name));
      const target = [...group].sort((a,b) => b.count - a.count || a.name.length - b.name.length)[0];
      out.push({ target: target.name, items: group, score: Math.round(Math.max(...group.filter(it => it !== target).map(it => tagSimilarity(target.name, it.name))) * 100) });
    }
  }
  return out.sort((a,b) => b.items.reduce((s,it)=>s+it.count,0) - a.items.reduce((s,it)=>s+it.count,0)).slice(0, 12);
}

function renderSuggestions(prebuilt = null) {
  const suggestions = prebuilt || buildMergeSuggestions(allItems);
  const panel = document.getElementById('suggest-panel');
  const list = document.getElementById('suggest-list');
  if (!panel || !list) return;
  panel.classList.toggle('show', suggestions.length > 0);
  const title = panel.querySelector('.suggest-title');
  if (title) title.textContent = `似たタグの統合候補（${suggestions.length}件）`;
  if (!suggestions.length) {
    list.innerHTML = '';

  list.innerHTML = suggestions.map((s, i) => `

      <div class="suggest-tags">${s.items.map(it => `<span class="suggest-tag">${esc(it.name)} (${it.count})</span>`).join('')}</div>

      <button class="btn" onclick="applySuggestion(${i})">この候補を選択</button>
    </div>
  `).join('');
  window._tagMergeSuggestions = suggestions;
}

function applySuggestion(index) {
  const suggestions = window._tagMergeSuggestions || [];

  selectedNames = new Set(s.items.map(it => it.name));

}

function getInitialContactKey() {
  const raw = location.search.replace(/^\?/, '').trim();
  const params = new URLSearchParams(location.search);
  const direct = params.get('contact') || params.get('code') || params.get('contact_code') || params.get('contact_id') || params.get('id');
  if (direct) return direct;
  if (raw && !raw.includes('&')) {
    if (raw.includes('=')) {
      const parts = raw.split('=');
      if (parts[0] === '' && parts[1]) return decodeURIComponent(parts[1]);
    } else if (!raw.includes('=')) return decodeURIComponent(raw);
  }
  return '';
}
async function loadContactInquiries(keepCurrent=false) {
  if (!keepCurrent) document.getElementById('tab-content').innerHTML = '<div class="loading">読み込み中…</div>';
  const res = await fetch(`${API}?action=contact_admin_list`, { credentials:'include' });
  const json = await res.json();
  if (!json.ok) { document.getElementById('tab-content').innerHTML = `<div class="empty">${esc(json.error || '読み込みに失敗しました')}</div>`; return; }
  contactInquiries = json.data || [];
  if (!currentContact && contactInquiries.length) currentContact = contactInquiries[0];
  renderContactTab();
  const initial = getInitialContactKey();
  if (initial && !keepCurrent) {
    history.replaceState(null, '', location.pathname + '?tab=contacts');
    setTimeout(() => openContactInquiry(initial), 80);
  } else if (currentContact && currentContact.id) {
    const found = contactInquiries.find(c => +c.id === +currentContact.id);
    if (found && (!currentContact.messages || keepCurrent === false)) openContactInquiry(found.id, true);
  }
}
function contactStatusLabel(status) { return status === 'cancelled' ? '取りやめ' : (status === 'closed' ? '完了' : '受付中'); }
function contactReplyLabel(c) {
  if (!c.need_reply) return '返信不要';
  if (c.reply_channel === 'site') return 'このサイトで返信';
  if (c.reply_channel === 'dm') return `DM返信 / ${c.dm_service || ''} ${c.dm_account || ''}`;
  return '返信なし';
}
function contactAccountLabel(c) {
  return c.account_mode === 'anonymous' ? `匿名（内部ID: ${esc(c.raw_user_id || '')}）` : esc(c.display_name || 'ログインなし');
}
function renderContactTab() {
  document.body.classList.add('contacts-mode');

        </div>
        <div class="contact-admin-mail" id="contact-admin-mail">${renderContactMailShell()}</div>
      </div>
    </div>`;
}
function contactAdminCard(c) {
  const active = currentContact && +currentContact.id === +c.id;
  const unread = +c.unread_user_count > 0;
  const code = c.contact_code || c.id;
  const previewRaw = c.latest_message || c.message || '';
  const preview = previewRaw.length > 90 ? previewRaw.slice(0, 90) + '…' : previewRaw;
  return `<button class="contact-admin-card ${active?'active':''} ${unread?'unread':''}" onclick="openContactInquiry(${c.id})">

    </div>

    <div class="contact-admin-preview">${esc(preview)}</div>

function renderContactMailShell() {
  if (!currentContact) return '<div class="contact-admin-empty">左の一覧からお問い合わせを選択してください。</div>';
  const c = currentContact;
  const code = c.contact_code || c.id;
  const info = `${esc(c.category || '')}${c.site_name?' / '+esc(c.site_name):''} / ${contactStatusLabel(c.status)} / ${contactReplyLabel(c)}`;
  const delBtn = c.status === 'cancelled' ? `<button class="btn contact-admin-delete" onclick="deleteContactInquiry(${c.id})">削除</button>` : '';
  const detail = `<div class="contact-admin-mailhead"><div><div class="contact-admin-mail-title">#${esc(code)} ${esc(c.category || 'お問い合わせ')}</div><div class="contact-admin-mail-sub">${info}<br>${contactAccountLabel(c)}${c.username ? ' / @' + esc(c.username) : ''}</div></div><div class="contact-admin-actions"><button class="btn" onclick="openContactInquiry(${c.id})">更新</button>${delBtn}</div></div>`;
  if (!c.messages) return detail + '<div class="contact-admin-empty">読み込み中…</div><div></div>';
  const imagesForMessage = (m,i) => {
    const imgs = (c.images || []).filter(img => img.message_id ? +img.message_id === +m.id : i === 0);
    return imgs.length ? `<div class="contact-image-grid">${imgs.map(img => `<a href="${esc(img.url)}" target="_blank" rel="noopener"><img src="${esc(img.url)}" alt="添付画像"></a>`).join('')}</div>` : '';
  };
  const thread = (c.messages || []).map((m,i)=>{
    let body = esc(m.body) + imagesForMessage(m,i);
    return `<div class="admin-mail-row ${m.sender === 'admin' ? 'admin' : 'user'}"><div class="admin-mail-body">${body}<div class="admin-mail-time">${m.sender === 'admin' ? '管理者' : 'ユーザー'} / ${esc(m.created_at || '')}</div></div></div>`;
  }).join('') || '<div class="empty">メッセージがありません</div>';
  const disabled = c.status === 'cancelled' ? 'disabled' : '';
  const composer = `<div class="contact-admin-reply"><textarea id="contact-reply-text" placeholder="返信内容を入力" ${disabled}></textarea><button class="contact-admin-send" id="contact-admin-send" type="button" onclick="sendContactReply()" ${disabled} aria-label="返信を送信"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"></path><path d="m22 2-7 20-4-9-9-4 20-7Z"></path></svg></button></div>`;
  return detail + `<div class="contact-admin-body" id="contact-admin-body">${thread}</div>` + composer;
}
async function openContactInquiry(key, silent=false) {
  const isId = /^\d+$/.test(String(key));
  const query = isId ? `id=${encodeURIComponent(key)}` : `code=${encodeURIComponent(String(key).toUpperCase())}`;
  if (!silent) {
    const base = contactInquiries.find(c => (isId ? +c.id === +key : String(c.contact_code).toUpperCase() === String(key).toUpperCase()));
    if (base) { currentContact = base; renderContactTab(); }
  }
  const res = await fetch(`${API}?action=contact_admin_get&${query}`, { credentials:'include' });
  const json = await res.json();
  if (!json.ok) { alert(json.error || '読み込みに失敗しました'); return; }
  currentContact = json.data;
  const listItem = contactInquiries.find(c => +c.id === +currentContact.id);
  if (listItem) listItem.unread_user_count = 0;
  renderContactTab();
  setTimeout(()=>{const t=document.getElementById('contact-admin-body');if(t)t.scrollTop=t.scrollHeight;const ta=document.getElementById('contact-reply-text');if(ta){const grow=()=>{ta.style.height='auto';const max=Math.min(150,Math.max(96,window.innerHeight*0.24));ta.style.height=Math.min(Math.max(ta.scrollHeight,40),max)+'px';ta.style.overflowY=ta.scrollHeight>max?'auto':'hidden';if(t&&t.scrollHeight-t.scrollTop-t.clientHeight<120)t.scrollTop=t.scrollHeight};ta.addEventListener('input',grow);ta.addEventListener('focus',()=>setTimeout(()=>{ta.scrollIntoView({block:'end',behavior:'smooth'});if(t)t.scrollTop=t.scrollHeight},120));grow();refreshContactReplyLock();}},0);
}

function isContactReplyLocked(){return Date.now()<contactReplyLockUntil;}
function setContactReplyCooldown(ms=3500){contactReplyLockUntil=Date.now()+ms;clearTimeout(contactReplyLockTimer);refreshContactReplyLock();contactReplyLockTimer=setTimeout(refreshContactReplyLock,ms+80);}
function refreshContactReplyLock(){const btn=document.getElementById('contact-admin-send');if(!btn)return;const locked=isContactReplyLocked();if(currentContact && currentContact.status!=='cancelled')btn.disabled=locked;}
async function deleteContactInquiry(id) {
  const target = contactInquiries.find(c => +c.id === +id) || currentContact;
  const label = target ? `#${esc(target.contact_code || target.id)}` : 'このお問い合わせ';
  if (!confirm(`${label} を完全に削除しますか？
取りやめ済みのお問い合わせだけ削除できます。`)) return;
  const res = await fetch(`${API}?action=contact_admin_delete`, {
    method:'POST', credentials:'include', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ id })
  });
  const json = await res.json().catch(()=>null);
  if (!json || !json.ok) { alert(json?.error || '削除に失敗しました'); return; }
  contactInquiries = contactInquiries.filter(c => +c.id !== +id);
  if (currentContact && +currentContact.id === +id) currentContact = contactInquiries[0] || null;
  renderContactTab();
  if (currentContact && currentContact.id) openContactInquiry(currentContact.id, true);
}

async function sendContactReply() {
  if (!currentContact) return;
  if (isContactReplyLocked()) { alert('連続送信を防止しています。数秒後にもう一度お試しください'); return; }
  const ta = document.getElementById('contact-reply-text');
  const text = ta?.value.trim() || '';
  if (!text) { alert('返信内容を入力してください'); return; }
  setContactReplyCooldown();
  const res = await fetch(`${API}?action=contact_admin_reply`, { method:'POST', credentials:'include', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ id: currentContact.id, reply: text }) });
  const json = await res.json();
  if (!json.ok) { alert(json.error || '返信に失敗しました'); return; }
  ta.value = '';
  await openContactInquiry(currentContact.id, true);
  await loadContactInquiries(true);
}

function contactMetrics(){const total=contactInquiries.length;const unread=contactInquiries.reduce((n,c)=>n+(+c.unread_user_count||0),0);const open=contactInquiries.filter(c=>c.status==='open').length;const pending=contactInquiries.filter(c=>c.status==='pending').length;return {total,unread,open,pending};}
function contactMatchesFilter(c){
  if(contactFilter==='unread')return +c.unread_user_count>0;
  if(contactFilter==='open')return c.status==='open';
  if(contactFilter==='pending')return c.status==='pending';
  if(contactFilter==='accepted')return c.status==='accepted'||c.status==='closed';

function contactSetUrl(params, replace){
  const qs = new URLSearchParams();
  if (params.tab) qs.set('tab', params.tab);
  if (params.contact) qs.set('contact', params.contact);
  const url = location.pathname + (qs.toString() ? '?' + qs.toString() : '');
  try { (replace ? history.replaceState : history.pushState).call(history, null, '', url); } catch(e) {}
}
function getInitialContactKey(){
  const params = new URLSearchParams(location.search);
  const direct = params.get('contact') || params.get('code') || params.get('contact_code') || params.get('contact_id') || params.get('id');
  if (direct) return String(direct).trim();
  const hash = String(location.hash || '').replace(/^#/, '');
  if (hash) {
    const hp = new URLSearchParams(hash.includes('=') ? hash : 'contact=' + hash);
    const hv = hp.get('contact') || hp.get('code') || hp.get('id');
    if (hv) return String(hv).trim();
  }
  const raw = location.search.replace(/^\?/, '').trim();
  if (raw && !raw.includes('&') && !raw.includes('=')) return decodeURIComponent(raw);
  return '';
}
function preferredInitialTab(){
  const params = new URLSearchParams(location.search);
  const tab = params.get('tab');
  if (getInitialContactKey()) return 'contacts';
  return ['home','tags','songs','live_ids','profile_links','verified','contacts'].includes(tab) ? tab : 'home';

function switchTab(type){

async function openContactInquiry(key, silent=false, replace=false){
  const keyStr=String(key||'').trim();
  if(!keyStr) return;
  const isId=/^\d+$/.test(keyStr);
  const query=isId?`id=${encodeURIComponent(keyStr)}`:`code=${encodeURIComponent(keyStr.toUpperCase())}`;
  if(!silent){
    const base=contactInquiries.find(c=>isId?+c.id===+keyStr:String(c.contact_code).toUpperCase()===keyStr.toUpperCase());
    if(base){currentContact=base; renderContactDetailPage();}
  }
  try{
    const res=await fetch(`${API}?action=contact_admin_get&${query}`,{credentials:'include'});
    const json=await res.json();
    if(!json.ok){alert(json.error||'読み込みに失敗しました');return;}
    currentContact=json.data;
    const idx=contactInquiries.findIndex(c=>+c.id===+currentContact.id);
    if(idx>=0) contactInquiries[idx]={...contactInquiries[idx],...currentContact,unread_user_count:0};
    contactSetUrl({tab:'contacts',contact:currentContact.contact_code||currentContact.id}, replace);
    renderContactDetailPage();
  }catch(e){alert('通信に失敗しました');}
}
function setupContactReplyInput(){

}

async function updateContactStatus(id,status){
  const old=currentContact?currentContact.status:null;
  if(currentContact) { currentContact.status=status; renderContactDetailPage(); }
  try{
    const res=await fetch(`${API}?action=contact_admin_update_status`,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,status})});
    const json=await res.json().catch(()=>null);
    if(!json||!json.ok){alert(json?.error||'ステータス変更に失敗しました'); if(currentContact) currentContact.status=old; await openContactInquiry(id,true,true); return;}
    currentContact=json.data;
    const idx=contactInquiries.findIndex(c=>+c.id===+id); if(idx>=0) contactInquiries[idx]={...contactInquiries[idx],...json.data,messages:undefined};
    await openContactInquiry(id,true,true);
  }catch(e){alert('通信に失敗しました'); if(currentContact) currentContact.status=old; renderContactDetailPage();}
}
async function deleteContactInquiry(id){
  const target=contactInquiries.find(c=>+c.id===+id)||currentContact;
  const label=target?`#${target.contact_code||target.id}`:'このお問い合わせ';
  if(!confirm(`${label} を完全に削除しますか？\nこの操作は管理者のみ可能です。`))return;
  try{
    const res=await fetch(`${API}?action=contact_admin_delete`,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});
    const json=await res.json().catch(()=>null);
    if(!json||!json.ok){alert(json?.error||'削除に失敗しました');return;}
    contactInquiries=contactInquiries.filter(c=>+c.id!==+id);currentContact=null;contactSetUrl({tab:'contacts'},true);renderContactListPage();
  }catch(e){alert('通信に失敗しました');}
}
function refreshContactReplyLock(){const btn=document.getElementById('contact-admin-send');if(!btn)return;const locked=isContactReplyLocked();if(currentContact && !['rejected','cancelled','accepted','replied','closed'].includes(String(currentContact.status||'')))btn.disabled=locked;}
async function sendContactReply(){
  if(!currentContact)return;
  if(isContactReplyLocked()){alert('連続送信を防止しています。数秒後にもう一度お試しください');return;}
  const ta=document.getElementById('contact-reply-text');
  const text=ta?.value.trim()||'';
  if(!text){alert('返信内容を入力してください');return;}
  setContactReplyCooldown();
  try{
    const res=await fetch(`${API}?action=contact_admin_reply`,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:currentContact.id,reply:text})});

function adminJsonErrorMessage(json, fallback){
  return (json && (json.error || json.message)) || fallback || '処理に失敗しました';
}
async function adminApi(action, options){
  options = options || {};
  const query = options.query ? '&' + new URLSearchParams(options.query).toString() : '';
  const init = { credentials:'include' };
  if (options.body !== undefined) {
    init.method = options.method || 'POST';
    init.headers = {'Content-Type':'application/json'};
    init.body = JSON.stringify(options.body || {});
  } else if (options.method) {
    init.method = options.method;
  }
  const res = await fetch(`${API}?action=${encodeURIComponent(action)}${query}`, init);
  const text = await res.text();
  let json = null;
  try { json = text ? JSON.parse(text) : null; } catch(e) {}
  if (!res.ok || !json || !json.ok) {
    throw new Error(adminJsonErrorMessage(json, text || `HTTP ${res.status}`));
  }
  return json.data;
}
function adminRenderError(message, retry){
  const retryBtn = retry ? `<button class="btn" type="button" onclick="${retry}">再読み込み</button>` : '';
  const el=document.getElementById('tab-content');
  if(el) el.innerHTML=`<div class="empty" style="margin:20px;display:grid;gap:12px;justify-items:center;">${esc(message||'読み込みに失敗しました')}${retryBtn}</div>`;

function contactSetUrl(params, replace){
  const qs = new URLSearchParams();
  if (params && params.tab) qs.set('tab', params.tab);
  if (params && params.contact) qs.set('contact', params.contact);
  const base = location.pathname || 'admin.html';
  const url = base + (qs.toString() ? '?' + qs.toString() : '');
  try { (replace ? history.replaceState : history.pushState).call(history, null, '', url); } catch(e) {}

function contactMatchesFilter(c){

  if(contactFilter==='open')return st==='open';
  if(contactFilter==='pending')return st==='pending';
  if(contactFilter==='accepted')return st==='accepted'||st==='closed';
  if(contactFilter==='replied')return st==='replied';
  if(contactFilter==='rejected')return st==='rejected'||st==='cancelled';
  if(contactFilter==='hidden')return !!c.is_user_hidden||!!c.user_hidden_at;

  const query=isId?{id:keyStr}:{code:keyStr.toUpperCase()};

    const base=contactInquiries.find(c=>isId?+c.id===+keyStr:String(c.contact_code||'').toUpperCase()===keyStr.toUpperCase());
    if(base){ currentContact=base; renderContactDetailPage(); }
  }
  try{
    currentContact = await adminApi('contact_admin_get', {query});
    const idx=contactInquiries.findIndex(c=>+c.id===+currentContact.id);
    if(idx>=0) contactInquiries[idx]={...contactInquiries[idx],...currentContact,unread_user_count:0};
    contactSetUrl({tab:'contacts',contact:currentContact.contact_code||currentContact.id}, !!replace);
    renderContactDetailPage();
  }catch(e){ alert(e.message || '読み込みに失敗しました'); }
}
function setupContactReplyInput(){
  setTimeout(()=>{
    const ta=document.getElementById('contact-reply-text');
    if(!ta)return;
    const grow=()=>{ta.style.height='auto';const max=Math.min(132,Math.max(88,window.innerHeight*0.24));ta.style.height=Math.min(Math.max(ta.scrollHeight,42),max)+'px';ta.style.overflowY=ta.scrollHeight>max?'auto':'hidden';};
    ta.addEventListener('input',grow);
    ta.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){e.preventDefault();sendContactReply();}});
    grow();refreshContactReplyLock();
  },0);
}
function backContactList(){ currentContact=null; contactSetUrl({tab:'contacts'},false); renderContactListPage(); }
async function updateContactStatus(id,status){
  const old=currentContact?currentContact.status:null;
  if(currentContact){ currentContact.status=status; renderContactDetailPage(); }
  try{
    currentContact = await adminApi('contact_admin_update_status', {body:{id,status}});
    const idx=contactInquiries.findIndex(c=>+c.id===+id);
    if(idx>=0) contactInquiries[idx]={...contactInquiries[idx],...currentContact,messages:undefined};

  }catch(e){
    alert(e.message || 'ステータス変更に失敗しました');

    if(id) await openContactInquiry(id,true,true); else renderContactDetailPage();
  }
}
async function deleteContactInquiry(id){
  const target=contactInquiries.find(c=>+c.id===+id)||currentContact;
  const label=target?`#${target.contact_code||target.id}`:'このお問い合わせ';

  try{
    await adminApi('contact_admin_delete', {body:{id}});

}
function refreshContactReplyLock(){
  const btn=document.getElementById('contact-admin-send');
  if(!btn)return;
  const locked=isContactReplyLocked();
  if(currentContact && !['rejected','cancelled','accepted','replied','closed'].includes(String(currentContact.status||''))) btn.disabled=locked;
}
async function sendContactReply(){
  if(!currentContact)return;
  if(isContactReplyLocked()){alert('連続送信を防止しています。数秒後にもう一度お試しください');return;}
  const ta=document.getElementById('contact-reply-text');
  const text=ta?.value.trim()||'';
  if(!text){alert('返信内容を入力してください');return;}
  setContactReplyCooldown();

    await adminApi('contact_admin_reply', {body:{id:currentContact.id,reply:text}});

}



/* admin-mail-unified-20260617: final Admin overrides */
(function(){
  const root = document.documentElement;
  let stableHeight = Math.max(320, Math.round(window.innerHeight || document.documentElement.clientHeight || 667));
  let inputActive = false;
  function activeField(){
    const el = document.activeElement;
    return !!el && /^(TEXTAREA|INPUT|SELECT)$/.test(el.tagName || '') && !!el.closest('#main-screen');
  }
  window.setAdminVh = function(force){
    const layout = Math.max(320, Math.round(window.innerHeight || document.documentElement.clientHeight || stableHeight));
    if (force || (!inputActive && !activeField())) stableHeight = layout;
    root.style.setProperty('--admin-fixed-vh', stableHeight + 'px');
    if (!inputActive && !activeField()) root.style.setProperty('--admin-vh', stableHeight + 'px');
  };
  window.setAdminKeyboardActive = function(on){
    inputActive = !!on;
    document.body.classList.toggle('admin-keyboard-active', inputActive);
    root.classList.toggle('admin-input-active', inputActive);
    window.setAdminVh(false);
    if (inputActive) {
      setTimeout(()=>{
        const scroller = document.getElementById('contact-admin-body') || document.querySelector('.contact-detail-scroll');
        if (scroller) scroller.scrollTop = scroller.scrollHeight;
      }, 90);
    }
  };
  window.addEventListener('resize',()=>{ if(!inputActive && !activeField()) window.setAdminVh(true); }, {passive:true});
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize',()=>{ if(!inputActive && !activeField()) window.setAdminVh(true); }, {passive:true});
    window.visualViewport.addEventListener('scroll',()=>{ if(!inputActive && !activeField()) window.setAdminVh(false); }, {passive:true});
  }
  document.addEventListener('focusin', e=>{
    if (e.target && e.target.closest && e.target.closest('.contact-reply-panel')) window.setAdminKeyboardActive(true);
  });
  document.addEventListener('focusout', e=>{
    if (e.target && e.target.closest && e.target.closest('.contact-reply-panel')) setTimeout(()=>window.setAdminKeyboardActive(false), 160);
  });
  window.setAdminVh(true);
})();

function safeText(value){ return String(value ?? '').replace(/\s+/g,' ').trim(); }
function compactText(value, max){
  const s = safeText(value);
  return s.length > max ? s.slice(0, max) + '…' : s;
}
function updateContactListOnly(){
  const visible = filteredContacts();
  const rows = visible.length ? visible.map(contactAdminRow).join('') : '<div class="contact-empty-state">該当するお問い合わせはありません。</div>';

  if (inner) inner.innerHTML = rows;
  const sub = document.getElementById('contact-list-sub');
  if (sub) {
    const m = contactMetrics();
    sub.textContent = `${visible.length}件 / 全${m.total}件${m.unread ? ' / 未読' + m.unread + '件' : ''}`;
  }
}
function setContactSearch(v){
  contactSearch = v || '';
  updateContactListOnly();
}
function setContactFilter(v){
  contactFilter = v || 'all';
  renderContactListPage();
}
function contactAdminRow(c){

}
function renderContactListPage(){
  document.body.classList.add('contacts-mode');
  setAdminVh(false);
  currentContact = null;
  const m = contactMetrics();
  const visible = filteredContacts();
  const filterButtons = [['all','すべて'],['unread','未読'],['open','受付中'],['pending','保留中'],['accepted','受付済'],['replied','返信済'],['rejected','棄却'],['dm','DM'],['hidden','非表示済']]
    .map(([key,label])=>`<button class="contact-filter-btn ${contactFilter===key?'active':''}" type="button" onclick="setContactFilter('${key}')">${label}</button>`).join('');
  const rows = visible.length ? visible.map(contactAdminRow).join('') : '<div class="contact-empty-state">該当するお問い合わせはありません。</div>';

  el.innerHTML = `<div class="admin-page contact-list-page"><div class="admin-page-head"><div><div class="admin-page-title">お問い合わせ</div><div class="admin-page-sub" id="contact-list-sub">${visible.length}件 / 全${m.total}件${m.unread?` / 未読${m.unread}件`:''}</div></div><div class="admin-head-actions"><button class="btn" type="button" onclick="loadContactInquiries(true)">更新</button></div></div><div class="contact-toolbar"><div class="contact-search-row"><input id="contact-admin-search" class="contact-admin-search" value="${esc(contactSearch||'')}" placeholder="管理番号・カテゴリ・本文で検索" autocomplete="off" inputmode="search"></div><div class="contact-filter-tabs">${filterButtons}</div></div><div class="contact-mail-list"><div class="contact-mail-list-inner" id="contact-mail-list-inner">${rows}</div></div></div>`;
  const search = document.getElementById('contact-admin-search');

    search.addEventListener('keydown', e => { if (e.key === 'Enter') e.preventDefault(); });
  }

function contactMessageSenderLabel(c, sender){
  if (sender === 'admin') return '管理者（ひろまめ）';
  return contactAccountLabel(c) || 'ユーザー';
}
function contactMessageToLabel(c, sender){
  return sender === 'admin' ? `宛先: ${contactAccountLabel(c) || 'ユーザー'}` : '宛先: 管理者';
}
function contactMessagesHtml(c){
  c = c || {};
  if (!Array.isArray(c.messages)) return '<div class="contact-empty-state">本文を読み込み中…</div>';
  const messages = c.messages.length ? c.messages : (c.message ? [{sender:'user', body:c.message, created_at:c.created_at || ''}] : []);
  const body = messages.map((m,i)=>{
    const sender = m.sender === 'admin' ? 'admin' : 'user';
    return `<section class="contact-mail-message ${sender}"><div class="contact-mail-message-head"><div><div class="contact-mail-from">${esc(contactMessageSenderLabel(c, sender))}</div><div class="contact-mail-to">${esc(contactMessageToLabel(c, sender))}</div></div><div class="contact-mail-time">${esc(m.created_at || '')}</div></div><div class="contact-mail-body">${esc(m.body || '')}${contactImagesForMessage(c,m,i)}</div></section>`;
  }).join('') || '<div class="contact-empty-state">メッセージなし</div>';
  return `<div class="contact-mail-thread"><div class="contact-mail-thread-title"><div class="contact-mail-thread-title-main">メール履歴</div><div class="contact-mail-thread-title-sub">${messages.length}件</div></div>${body}</div>`;
}
function canAdminReplyToContact(c){
  const status = String((c && c.status) || 'open');
  return !['rejected','cancelled','accepted','replied','closed'].includes(status);
}
function renderContactDetailPage(){
  document.body.classList.add('contacts-mode');
  setAdminVh(false);
  if(!currentContact){ renderContactListPage(); return; }
  const c = currentContact;
  const code = c.contact_code || c.id;
  const canReply = canAdminReplyToContact(c);
  const disabled = canReply ? '' : 'disabled';
  const hint = canReply ? (c.need_reply ? `返信方法: ${contactReplyLabel(c)}` : '返信不要です。必要な場合だけ返信できます。') : 'このステータスではサイト内返信を追加できません。';
  const detailRows = [
    ['ステータス', contactStatusLabel(c.status)],
    ['カテゴリ', c.category || 'お問い合わせ'],
    ['返信', contactReplyLabel(c)],
    ['送信者', contactAccountLabel(c) + (c.username ? ' / @' + c.username : '')],
    ['既読', c.user_read_at || '未読'],
    ['非表示', c.user_hidden_at || 'なし']
  ];
  if(c.site_name) detailRows.push(['対象', c.site_name]);
  if(c.latest_at || c.updated_at) detailRows.push(['更新', c.latest_at || c.updated_at]);
  const statusCtl = `<div class="contact-admin-statusbar"><label>ステータス</label><select id="contact-status-select" onchange="updateContactStatus(${Number(c.id)},this.value)">${statusOptionsHtml(c.status)}</select></div>`;
  const replyBox = `<div class="contact-reply-panel"><div class="contact-admin-reply-hint">${esc(hint)}</div><div class="contact-admin-reply"><textarea id="contact-reply-text" placeholder="返信を入力" ${disabled}></textarea><button class="contact-admin-send" id="contact-admin-send" type="button" onclick="sendContactReply()" ${disabled} aria-label="返信を送信"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"></path><path d="m22 2-7 20-4-9-9-4 20-7Z"></path></svg></button></div><div class="contact-admin-reply-note" id="contact-admin-reply-note"></div></div>`;
  const el = document.getElementById('tab-content');
  if(!el) return;
  el.innerHTML = `<div class="admin-page contact-detail-page"><div class="contact-detail-head"><div class="contact-detail-head-top"><button class="contact-back-btn" type="button" onclick="backContactList()" aria-label="一覧に戻る">‹</button><div class="contact-detail-title-wrap"><div class="contact-detail-title">#${esc(code)} ${esc(c.category || 'お問い合わせ')}</div><div class="contact-detail-sub">${esc(contactStatusLabel(c.status))} / ${esc(contactReplyLabel(c))}</div></div><div class="contact-detail-actions"><button class="btn" type="button" data-contact="${esc(code)}" onclick="openContactInquiry(this.dataset.contact,true,true)">更新</button><button class="btn contact-admin-delete" type="button" data-delete-contact-id="${Number(c.id)}">削除</button></div></div><div class="contact-detail-tools">${statusCtl}${contactUserStateHtml(c)}</div></div><div class="contact-detail-scroll" id="contact-admin-body"><div class="contact-detail-paper"><div class="contact-detail-grid">${detailRows.map(([k,v])=>`<b>${esc(k)}</b><span>${esc(v)}</span>`).join('')}</div>${contactMessagesHtml(c)}</div></div>${replyBox}</div>`;
  setupContactReplyInput();
}
function setupContactReplyInput(){
  setTimeout(()=>{
    const ta = document.getElementById('contact-reply-text');
    if(!ta) return;
    const grow = ()=>{
      ta.style.height = 'auto';
      const max = Math.min(132, Math.max(88, (window.innerHeight || 667) * 0.22));
      ta.style.height = Math.min(Math.max(ta.scrollHeight, 42), max) + 'px';
      ta.style.overflowY = ta.scrollHeight > max ? 'auto' : 'hidden';
    };
    ta.addEventListener('input', grow);
    ta.addEventListener('focus', ()=>{
      if (window.setAdminKeyboardActive) window.setAdminKeyboardActive(true);
      setTimeout(()=>{ const sc = document.getElementById('contact-admin-body'); if(sc) sc.scrollTop = sc.scrollHeight; }, 80);
    });
    ta.addEventListener('blur', ()=>setTimeout(()=>{ if (window.setAdminKeyboardActive) window.setAdminKeyboardActive(false); }, 160));
    ta.addEventListener('keydown', e=>{ if((e.metaKey||e.ctrlKey) && e.key === 'Enter'){ e.preventDefault(); sendContactReply(); } });
    grow();
    refreshContactReplyLock();
  },0);
}
async function updateContactStatus(id,status){
  const select = document.getElementById('contact-status-select');
  const oldStatus = currentContact ? currentContact.status : null;
  if(select) select.disabled = true;
  try{
    const fresh = await adminApi('contact_admin_update_status', {body:{id,status}});
    currentContact = fresh;
    const idx = contactInquiries.findIndex(c=>+c.id===+id);
    if(idx>=0) contactInquiries[idx] = {...contactInquiries[idx], ...fresh, messages:undefined, images:undefined};
    await openContactInquiry(id,true,true);
  }catch(e){
    alert((e && e.message) || 'ステータス変更に失敗しました');
    if(currentContact) currentContact.status = oldStatus;
    if(select) { select.value = oldStatus || 'open'; select.disabled = false; }
  }
}
async function deleteContactInquiry(id){
  const num = Number(id || (currentContact && currentContact.id) || 0);
  if(!num){ alert('削除対象を取得できませんでした。画面を更新してからもう一度お試しください。'); return; }
  const target = contactInquiries.find(c=>+c.id===num) || currentContact || null;
  const label = target ? `#${target.contact_code || target.id}` : 'このお問い合わせ';
  if(!confirm(`${label} を完全に削除しますか？\nこの操作は取り消せません。`)) return;
  const btn = Array.from(document.querySelectorAll('[data-delete-contact-id]')).find(el => Number(el.dataset.deleteContactId) === num);
  if(btn){ btn.classList.add('is-loading'); btn.disabled = true; }
  try{
    await adminApi('contact_admin_delete', {body:{id:num}});
    contactInquiries = contactInquiries.filter(c=>+c.id!==num);
    currentContact = null;
    contactSetUrl({tab:'contacts'}, true);
    renderContactListPage();
  }catch(e){
    if(btn){ btn.classList.remove('is-loading'); btn.disabled = false; }
    alert((e && e.message) || '削除に失敗しました');
  }
}
document.addEventListener('click', function(e){
  const btn = e.target && e.target.closest ? e.target.closest('[data-delete-contact-id]') : null;
  if(!btn) return;
  e.preventDefault();
  e.stopPropagation();
  deleteContactInquiry(btn.dataset.deleteContactId);
}, true);
async function sendContactReply(){
  if(!currentContact) return;
  if(!canAdminReplyToContact(currentContact)){ alert('このステータスではサイト内返信を追加できません。'); return; }
  if(isContactReplyLocked()){ alert('連続送信を防止しています。数秒後にもう一度お試しください'); return; }
  const ta = document.getElementById('contact-reply-text');
  const text = ta?.value.trim() || '';
  if(!text){ alert('返信内容を入力してください'); return; }
  const btn = document.getElementById('contact-admin-send');
  if(btn){ btn.classList.add('is-loading'); btn.disabled = true; }
  setContactReplyCooldown();
  try{
    const data = await adminApi('contact_admin_reply', {body:{id:currentContact.id,reply:text}});
    if(ta) ta.value = '';
    if(data && data.inquiry) currentContact = data.inquiry;
    try{ contactInquiries = await adminApi('contact_admin_list') || contactInquiries; }catch(e){}
    await openContactInquiry(currentContact.id,true,true);
  }catch(e){
    if(btn){ btn.classList.remove('is-loading'); btn.disabled = false; }
    alert((e && e.message) || '返信に失敗しました');
  }
}


/* admin-compact-mail-view-20260617: final delete/open guard and compact controls */
function canAdminDeleteContact(c){
  const status = String((c && c.status) || 'open');
  return status !== 'open';
}
function contactDeleteButtonHtml(c){
  const id = Number(c && c.id || 0);
  const canDelete = canAdminDeleteContact(c);
  const title = canDelete ? '削除' : '受付中は削除できません。ステータスを変更してから削除してください。';
  return `<button class="btn contact-admin-delete ${canDelete ? '' : 'is-disabled'}" type="button" data-delete-contact-id="${id}" ${canDelete ? '' : 'disabled aria-disabled="true"'} title="${esc(title)}">削除</button>`;
}
function canSendContactMailNotification(c){
  return !!(c && c.contact_mail_notification_available && Array.isArray(c.messages) && c.messages.some(m => m.sender === 'admin'));
}
function contactMailButtonHtml(c){
  if(!(c && c.contact_mail_notification_available)) return '';
  const enabled = canSendContactMailNotification(c);
  const sent = !!(c && c.email_notification);
  const label = sent ? 'メール通知を再送' : 'メール通知を送信';
  const title = enabled ? label : '管理者返信済みの場合に送信できます。';
  return `<button class="btn ${sent ? '' : 'btn-primary'} ${enabled ? '' : 'is-disabled'}" type="button" data-contact-mail-id="${Number(c && c.id || 0)}" ${enabled ? '' : 'disabled aria-disabled="true"'} title="${esc(title)}">${esc(label)}</button>`;
}
async function sendContactMailNotification(id){
  const num = Number(id || (currentContact && currentContact.id) || 0);
  if(!num) return;
  if(!confirm('このお問い合わせの最新返信をメールで通知しますか？')) return;
  const btn = Array.from(document.querySelectorAll('[data-contact-mail-id]')).find(el => Number(el.dataset.contactMailId) === num);
  if(btn){ btn.disabled = true; btn.textContent = '送信中…'; }
  try{
    const result = await adminApi('contact_admin_send_mail', {body:{id:num}});
    if(result && result.inquiry) currentContact = result.inquiry;
    try{ contactInquiries = await adminApi('contact_admin_list') || contactInquiries; }catch(e){}
    await openContactInquiry(num,true,true);
    alert(`メール通知を送信しました。${result && result.to ? '\\n送信先: ' + result.to : ''}`);
  }catch(e){
    if(btn){ btn.disabled = false; btn.textContent = 'メール通知を送信'; }
    alert((e && e.message) || 'メール通知の送信に失敗しました');
  }
}
function applyContactDeleteGuard(){
  const btns = document.querySelectorAll('[data-delete-contact-id]');
  if(!btns.length) return;
  const canDelete = canAdminDeleteContact(currentContact);
  btns.forEach(btn=>{
    btn.disabled = !canDelete;
    btn.classList.toggle('is-disabled', !canDelete);
    btn.title = canDelete ? '削除' : '受付中は削除できません。ステータスを変更してから削除してください。';
    btn.setAttribute('aria-disabled', canDelete ? 'false' : 'true');
  });
}
const __renderContactDetailPageCompact = renderContactDetailPage;
renderContactDetailPage = function(){
  __renderContactDetailPageCompact();
  const actions = document.querySelector('.contact-detail-actions');
  const oldBtn = actions && actions.querySelector('[data-delete-contact-id]');
  if(actions && currentContact && oldBtn){
    if(!actions.querySelector('[data-contact-mail-id]')){
      oldBtn.insertAdjacentHTML('beforebegin', contactMailButtonHtml(currentContact));
    }
    oldBtn.outerHTML = contactDeleteButtonHtml(currentContact);
  }
  applyContactDeleteGuard();
};
document.addEventListener('click', function(e){
  const btn = e.target && e.target.closest ? e.target.closest('[data-contact-mail-id]') : null;
  if(!btn) return;
  e.preventDefault();
  e.stopPropagation();
  sendContactMailNotification(btn.dataset.contactMailId);
}, true);
const __deleteContactInquiryCompact = deleteContactInquiry;
deleteContactInquiry = async function(id){
  const num = Number(id || (currentContact && currentContact.id) || 0);
  const target = (Array.isArray(contactInquiries) ? contactInquiries.find(c=>+c.id===num) : null) || currentContact || null;
  if(target && !canAdminDeleteContact(target)){
    alert('受付中のお問い合わせは削除できません。ステータスを「保留中」「受付済」「返信済」「棄却」などに変更してから削除してください。');
    applyContactDeleteGuard();
    return;
  }
  return __deleteContactInquiryCompact(id);
};
