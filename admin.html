<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Buddies 管理画面</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--line:#e5e5e5;--danger:#e53e3e;}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN",sans-serif;background:#f6f6f6;color:#111;min-height:100vh;}
.app{max-width:720px;margin:0 auto;min-height:100vh;background:#fff;}
header{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);padding:14px 20px;display:flex;align-items:center;gap:12px;z-index:10;}
header h1{font-size:18px;font-weight:800;flex:1;}
.btn{height:38px;padding:0 16px;border-radius:9999px;border:1px solid var(--line);background:#fff;font-weight:600;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;color:#111;font-family:inherit;}
.btn:hover{background:#f5f5f5;}
.btn-primary{background:#111;color:#fff;border-color:#111;}
.btn-primary:hover{background:#333;}
.btn-danger{background:#fff;color:var(--danger);border-color:#fed7d7;}
.btn-danger:hover{background:#fff5f5;}
main{padding:20px;}

/* ログイン */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-card{background:#fff;border:1px solid var(–line);border-radius:20px;padding:32px 28px;width:100%;max-width:340px;}
.login-card h2{font-size:20px;font-weight:800;margin-bottom:20px;}
.login-card input{width:100%;padding:12px 16px;border:1px solid var(–line);border-radius:12px;font-size:15px;font-family:inherit;margin-bottom:12px;outline:none;}
.login-card input:focus{border-color:#111;}
.login-card .btn{width:100%;justify-content:center;height:46px;font-size:15px;}
.login-err{font-size:13px;color:var(–danger);margin-bottom:10px;}

/* タブ */
.tabs{display:flex;gap:0;border-bottom:1px solid var(–line);padding:0 20px;}
.tab{padding:12px 16px;font-size:14px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:#999;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;}
.tab.active{color:#111;border-bottom-color:#111;}

/* タグ統合UI */
.section{padding:20px;}
.section-title{font-size:12px;font-weight:700;color:#999;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;}
.tag-list{display:flex;flex-direction:column;gap:6px;max-height:400px;overflow-y:auto;border:1px solid var(–line);border-radius:14px;padding:8px;}
.tag-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;cursor:pointer;transition:background .12s;}
.tag-row:hover{background:#f5f5f5;}
.tag-row.selected{background:#f0f0f0;}
.tag-name{flex:1;font-size:14px;font-weight:600;}
.tag-count{font-size:12px;color:#999;flex-shrink:0;}
.tag-checkbox{width:18px;height:18px;accent-color:#111;flex-shrink:0;cursor:pointer;}
.merge-panel{margin-top:16px;padding:16px;border:1px solid var(–line);border-radius:14px;background:#fafafa;display:none;}
.merge-panel.show{display:block;}
.merge-label{font-size:12px;font-weight:700;color:#666;margin-bottom:6px;}
.merge-selected{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;min-height:30px;}
.merge-tag{padding:4px 12px;border-radius:9999px;background:#eee;font-size:13px;font-weight:600;}
.merge-arrow{font-size:20px;text-align:center;margin:8px 0;color:#999;}
.merge-to-wrap{display:flex;gap:8px;align-items:center;margin-bottom:12px;}
.merge-to-wrap input{flex:1;padding:10px 14px;border:1px solid var(–line);border-radius:10px;font-size:14px;font-family:inherit;outline:none;}
.merge-to-wrap input:focus{border-color:#111;}
.merge-hint{font-size:12px;color:#999;margin-bottom:12px;}
.result-msg{font-size:13px;font-weight:600;padding:10px 14px;border-radius:10px;display:none;margin-top:10px;}
.result-msg.ok{background:#f0fff4;color:#276749;border:1px solid #c6f6d5;}
.result-msg.err{background:#fff5f5;color:var(–danger);border:1px solid #fed7d7;}
.search-wrap{margin-bottom:10px;}
.search-wrap input{width:100%;padding:10px 14px;border:1px solid var(–line);border-radius:10px;font-size:14px;font-family:inherit;outline:none;}
.search-wrap input:focus{border-color:#111;}
.loading{text-align:center;padding:30px;color:#999;font-size:14px;}
.empty{text-align:center;padding:30px;color:#999;font-size:14px;}

/* ===== 類似タグ検出UI ===== */
.similar-section{padding:0 20px 20px;}
.similar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.similar-header .section-title{margin-bottom:0;}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 6px;background:#111;color:#fff;font-size:11px;font-weight:700;border-radius:9999px;}
.similar-list{display:flex;flex-direction:column;gap:10px;}
.similar-group{border:1px solid var(–line);border-radius:14px;overflow:hidden;}
.similar-group-header{display:flex;align-items:center;padding:10px 14px;background:#fafafa;border-bottom:1px solid var(–line);gap:8px;}
.reason-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:9999px;flex-shrink:0;}
.reason-case{background:#e9d8fd;color:#553c9a;}
.reason-kana{background:#bee3f8;color:#2a4365;}
.reason-space{background:#fefcbf;color:#744210;}
.reason-both{background:#fed7d7;color:#742a2a;}
.reason-prefix{background:#c6f6d5;color:#22543d;}
.similar-group-body{padding:10px 14px;display:flex;flex-direction:column;gap:8px;}
.similar-tags{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.similar-tag-item{display:flex;align-items:center;gap:4px;}
.sim-tag{padding:4px 12px;border-radius:9999px;font-size:13px;font-weight:600;background:#eee;cursor:pointer;border:1.5px solid transparent;transition:all .12s;user-select:none;}
.sim-tag:hover{border-color:#bbb;}
.sim-tag.sim-selected{background:#111;color:#fff;border-color:#111;}
.sim-tag.sim-to{background:#fff;border:1.5px solid #111;}
.sim-count{font-size:11px;color:#999;}
.similar-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.similar-hint{font-size:11px;color:#bbb;}
.similar-group-result{font-size:12px;font-weight:600;padding:6px 10px;border-radius:8px;display:none;}
.similar-group-result.ok{background:#f0fff4;color:#276749;}
.similar-group-result.err{background:#fff5f5;color:var(–danger);}
.detect-bar{display:flex;align-items:center;gap:10px;padding:14px 20px;background:#fafafa;border-bottom:1px solid var(–line);}
.detect-bar .btn{flex-shrink:0;}
.detect-info{font-size:12px;color:#999;flex:1;}
.no-similar{text-align:center;padding:24px;color:#bbb;font-size:13px;}
.tab-inner{display:flex;gap:0;border-bottom:1px solid var(–line);padding:0 20px;background:#fafafa;}
.tab-inner .tab{font-size:13px;padding:10px 14px;}

/* ===== SNSリンクUI ===== */
.sns-search-bar{display:flex;gap:8px;align-items:center;padding:16px 20px;border-bottom:1px solid var(–line);}
.sns-search-bar input{flex:1;padding:10px 14px;border:1px solid var(–line);border-radius:10px;font-size:14px;font-family:inherit;outline:none;}
.sns-search-bar input:focus{border-color:#111;}
.sns-results{padding:16px 20px;display:flex;flex-direction:column;gap:10px;}
.sns-user-card{border:1px solid var(–line);border-radius:14px;overflow:hidden;}
.sns-user-header{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fafafa;border-bottom:1px solid var(–line);}
.sns-user-name{font-size:14px;font-weight:700;flex:1;}
.sns-user-id{font-size:11px;color:#bbb;}
.sns-link-rows{display:flex;flex-direction:column;gap:0;}
.sns-link-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(–line);}
.sns-link-row:last-child{border-bottom:none;}
.sns-link-check{width:16px;height:16px;accent-color:#111;flex-shrink:0;cursor:pointer;}
.sns-link-url{flex:1;font-size:12px;color:#555;word-break:break-all;line-height:1.4;}
.sns-link-url a{color:#555;text-decoration:none;}
.sns-link-url a:hover{text-decoration:underline;}
.sns-type-cur{font-size:12px;font-weight:700;color:#999;flex-shrink:0;min-width:60px;text-align:right;}
.sns-empty{text-align:center;padding:40px;color:#bbb;font-size:13px;}
.sns-bulk-bar{position:sticky;bottom:0;background:#fff;border-top:1px solid var(–line);padding:12px 20px;display:none;align-items:center;gap:10px;flex-wrap:wrap;z-index:5;}
.sns-bulk-bar.show{display:flex;}
.sns-bulk-info{font-size:13px;color:#555;flex:1;}
.sns-bulk-to-wrap{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.sns-bulk-to-wrap input{padding:8px 12px;border:1px solid var(–line);border-radius:9999px;font-size:13px;font-family:inherit;outline:none;width:140px;}
.sns-bulk-to-wrap input:focus{border-color:#111;}
.sns-result-bar{padding:10px 20px;font-size:13px;font-weight:600;display:none;}
.sns-result-bar.ok{background:#f0fff4;color:#276749;}
.sns-result-bar.err{background:#fff5f5;color:var(–danger);}

</style>
</head>
<body>

<!-- ログイン画面 -->

<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <h2>管理者ログイン</h2>
    <div id="login-err" class="login-err" style="display:none;"></div>
    <input type="password" id="admin-key-input" placeholder="パスワード" autocomplete="current-password">
    <button class="btn btn-primary" onclick="doLogin()">ログイン</button>
  </div>
</div>

<!-- メイン画面 -->

<div id="main-screen" class="app" style="display:none;">
  <header>
    <h1>Buddies 管理</h1>
    <button class="btn" onclick="doLogout()">ログアウト</button>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('tags')">興味タグ</button>
    <button class="tab" onclick="switchTab('songs')">楽曲タグ</button>
    <button class="tab" onclick="switchTab('sns')">SNSリンク</button>
  </div>

  <div id="tab-content">
    <!-- タブ内容はJS描画 -->
  </div>
</div>

<script>
const API = 'api.php';
let adminKey = '';
let currentType = 'tags';
let allItems = [];
let filtered = [];
let selectedNames = new Set();

// ── ログイン ──────────────────────────────────────────────
document.getElementById('admin-key-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const key = document.getElementById('admin-key-input').value.trim();
  if (!key) return;
  const res = await fetch(`${API}?action=admin_tag_list&type=tags`, {
    headers: { 'X-Admin-Key': key }
  });
  const json = await res.json();
  if (!json.ok) {
    const err = document.getElementById('login-err');
    err.textContent = 'パスワードが違います';
    err.style.display = 'block';
    return;
  }
  adminKey = key;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  allItems = json.data || [];
  filtered = allItems;
  renderTab();
}

function doLogout() {
  adminKey = '';
  allItems = [];
  filtered = [];
  selectedNames.clear();
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('admin-key-input').value = '';
}

// ── タブ切替 ─────────────────────────────────────────────
function switchTab(type) {
  currentType = type;
  selectedNames.clear();
  document.querySelectorAll('.tabs .tab').forEach(t => {
    const map = {tags:'興味', songs:'楽曲', sns:'SNS'};
    t.classList.toggle('active', t.textContent.trim().startsWith(map[type] || ''));
  });
  if (type === 'sns') {
    renderSnsTab();
  } else {
    loadTagList();
  }
}

async function loadTagList() {
  document.getElementById('tab-content').innerHTML = '<div class="loading">読み込み中…</div>';
  const res  = await fetch(`${API}?action=admin_tag_list&type=${currentType}`, { headers: { 'X-Admin-Key': adminKey } });
  const json = await res.json();
  if (!json.ok) { document.getElementById('tab-content').innerHTML = '<div class="empty">読み込みに失敗しました</div>'; return; }
  allItems = json.data || [];
  filtered = allItems;
  selectedNames.clear();
  renderTab();
}

function filterList(q) {
  const norm = q.trim().toLowerCase();
  filtered = norm ? allItems.filter(it => it.name.toLowerCase().includes(norm)) : allItems;
  renderList();
}

function renderList() {
  const wrap = document.getElementById('tag-list');
  if (!filtered.length) { wrap.innerHTML = '<div class="empty" style="padding:20px;text-align:center;color:#999;font-size:13px;">該当するタグはありません</div>'; return; }
  wrap.innerHTML = filtered.map(it => `
    <label class="tag-row ${selectedNames.has(it.name) ? 'selected' : ''}">
      <input type="checkbox" class="tag-checkbox" value="${esc(it.name)}" ${selectedNames.has(it.name) ? 'checked' : ''} onchange="toggleSelect(this)">
      <span class="tag-name">${esc(it.name)}</span>
      <span class="tag-count">${it.count}人</span>
    </label>
  `).join('');
}

function toggleSelect(cb) {
  if (cb.checked) selectedNames.add(cb.value);
  else selectedNames.delete(cb.value);
  updateMergePanel();
  cb.closest('.tag-row').classList.toggle('selected', cb.checked);
}

function updateMergePanel() {
  const panel = document.getElementById('merge-panel');
  const sel   = document.getElementById('merge-selected');
  if (!panel || !sel) return;
  if (selectedNames.size === 0) { panel.classList.remove('show'); return; }
  panel.classList.add('show');
  sel.innerHTML = [...selectedNames].map(n => `<span class="merge-tag">${esc(n)}</span>`).join('');
  document.getElementById('result-msg').style.display = 'none';
}

function fillMergeTo() {
  if (!selectedNames.size) return;
  const best = allItems.filter(it => selectedNames.has(it.name)).sort((a,b) => b.count - a.count)[0];
  if (best) document.getElementById('merge-to').value = best.name;
}

async function doMerge() {
  const to = document.getElementById('merge-to').value.trim();
  if (!to) { showResult('統合先のタグ名を入力してください', false); return; }
  if (!selectedNames.size) { showResult('統合するタグを選択してください', false); return; }

  const froms = [...selectedNames].filter(n => n !== to);
  if (!froms.length) { showResult('統合するタグと統合先が全て同じです', false); return; }

  const label = currentType === 'tags' ? '興味タグ' : '楽曲タグ';
  if (!confirm(`${label}「${froms.join('・')}」を「${to}」に統合します。\nこの操作は元に戻せません。実行しますか？`)) return;

  let totalUpdated = 0;
  for (const from of froms) {
    const res  = await fetch(`${API}?action=admin_tag_merge`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Key': adminKey },
      body: JSON.stringify({ type: currentType, from, to }),
    });
    const json = await res.json();
    if (!json.ok) { showResult(`エラー: ${json.error}`, false); return; }
    totalUpdated += json.data.updated;
  }

  showResult(`完了: ${froms.join('・')} → ${to} に統合（${totalUpdated}人更新）`, true);
  selectedNames.clear();
  await loadTagList();
}

function showResult(msg, ok) {
  const el = document.getElementById('result-msg');
  if (!el) return;
  el.textContent = msg;
  el.className = 'result-msg ' + (ok ? 'ok' : 'err');
  el.style.display = 'block';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ════════════════════════════════════════════════
//  類似タグ検出ロジック
// ════════════════════════════════════════════════

// カタカナ→ひらがな変換
function kata2hira(str) {
  return str.replace(/[\u30A1-\u30F6]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60));
}

// ひらがな→カタカナ変換
function hira2kata(str) {
  return str.replace(/[\u3041-\u3096]/g, c => String.fromCharCode(c.charCodeAt(0) + 0x60));
}

// 正規化キー生成（比較用）
function normalizeKey(s) {
  let n = s.trim();            // 前後スペース除去
  n = n.replace(/\s+/g, '');  // 内部スペースも除去
  n = n.toLowerCase();         // 小文字化
  n = kata2hira(n);            // カタカナ→ひらがな統一
  // 全角英数→半角
  n = n.replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
  // 全角スペース除去
  n = n.replace(/\u3000/g, '');
  return n;
}

// 差分の理由を判定
function detectReason(a, b) {
  const reasons = [];

  const aNoSpace = a.replace(/[\s\u3000]+/g, '');
  const bNoSpace = b.replace(/[\s\u3000]+/g, '');

  // 空白の有無チェック
  if (aNoSpace !== a || bNoSpace !== b) {
    if (aNoSpace.toLowerCase() === bNoSpace.toLowerCase() ||
        kata2hira(aNoSpace.toLowerCase()) === kata2hira(bNoSpace.toLowerCase())) {
      reasons.push('space');
    }
  }

  // 大文字小文字チェック
  const aLow = a.toLowerCase().replace(/[\s\u3000]+/g,'');
  const bLow = b.toLowerCase().replace(/[\s\u3000]+/g,'');
  if (aLow !== a.replace(/[\s\u3000]+/g,'') || bLow !== b.replace(/[\s\u3000]+/g,'')) {
    if (aLow === bLow) reasons.push('case');
    else if (kata2hira(aLow) === kata2hira(bLow)) reasons.push('case');
  }

  // ひらがな・カタカナチェック
  const aHira = kata2hira(a.replace(/[\s\u3000]+/g,'').toLowerCase());
  const bHira = kata2hira(b.replace(/[\s\u3000]+/g,'').toLowerCase());
  const hasKana = (s) => /[\u3040-\u30FF]/.test(s);
  if (aHira === bHira && hasKana(a + b) && kata2hira(a.replace(/[\s\u3000]+/g,'')) !== kata2hira(b.replace(/[\s\u3000]+/g,''))) {
    reasons.push('kana');
  }
  // ひらがなとカタカナが混在している場合（大文字小文字なし）
  if (aHira === bHira && hira2kata(a.replace(/[\s\u3000]+/g,'').toLowerCase()) !== hira2kata(b.replace(/[\s\u3000]+/g,'').toLowerCase())) {
    if (!reasons.includes('kana')) reasons.push('kana');
  }

  if (reasons.length === 0) reasons.push('similar');
  return reasons;
}

// 類似グループを生成
function detectSimilarGroups(items) {
  // normalizeKey でグルーピング
  const map = new Map(); // normalizeKey → [item, ...]
  for (const item of items) {
    const key = normalizeKey(item.name);
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(item);
  }

  const groups = [];
  for (const [key, members] of map.entries()) {
    if (members.length < 2) continue;

    // reasonを判定（最初の2要素で代表）
    const reasons = new Set();
    for (let i = 0; i < members.length - 1; i++) {
      for (let j = i + 1; j < members.length; j++) {
        const r = detectReason(members[i].name, members[j].name);
        r.forEach(x => reasons.add(x));
      }
    }

    // 件数最多を先頭に
    members.sort((a, b) => b.count - a.count);
    groups.push({ key, members, reasons: [...reasons] });
  }

  // グループを件数合計の多い順にソート
  groups.sort((a, b) => {
    const sa = a.members.reduce((s, m) => s + m.count, 0);
    const sb = b.members.reduce((s, m) => s + m.count, 0);
    return sb - sa;
  });

  return groups;
}

const REASON_LABEL = {
  case:    { text: '大文字/小文字', cls: 'reason-case' },
  kana:    { text: 'ひらがな/カタカナ', cls: 'reason-kana' },
  space:   { text: '空白の有無', cls: 'reason-space' },
  both:    { text: '複合', cls: 'reason-both' },
  similar: { text: '類似', cls: 'reason-prefix' },
};

// 各グループの選択状態 { groupKey: { selectedNames: Set, toName: string } }
const groupState = new Map();

function getGroupState(key, members) {
  if (!groupState.has(key)) {
    // デフォルト：件数最多以外を選択、最多を統合先に
    const toName = members[0].name;
    const sel = new Set(members.slice(1).map(m => m.name));
    groupState.set(key, { selected: sel, toName });
  }
  return groupState.get(key);
}

function renderSimilarGroups() {
  const groups = detectSimilarGroups(allItems);
  const container = document.getElementById('similar-list-wrap');
  if (!container) return;

  // バッジ更新
  const badge = document.getElementById('similar-badge');
  if (badge) badge.textContent = groups.length;

  if (!groups.length) {
    container.innerHTML = '<div class="no-similar">類似タグは検出されませんでした 🎉</div>';
    return;
  }

  container.innerHTML = groups.map((g, gi) => {
    const st = getGroupState(g.key, g.members);
    const reasonHtml = g.reasons.map(r => {
      const info = REASON_LABEL[r] || REASON_LABEL.similar;
      return `<span class="reason-badge ${info.cls}">${info.text}</span>`;
    }).join('');

    const tagsHtml = g.members.map(m => {
      const isSelected = st.selected.has(m.name);
      const isTo = st.toName === m.name;
      let cls = 'sim-tag';
      if (isSelected) cls += ' sim-selected';
      else if (isTo) cls += ' sim-to';
      return `
        <span class="similar-tag-item">
          <span class="sim-tag ${isSelected ? 'sim-selected' : ''} ${isTo && !isSelected ? 'sim-to' : ''}"
            onclick="simToggle(${gi}, '${esc(m.name)}')"
            title="クリックで削除対象に追加/除外">${esc(m.name)}</span>
          <span class="sim-count">${m.count}人</span>
        </span>`;
    }).join('');

    return `
      <div class="similar-group" id="sg-${gi}">
        <div class="similar-group-header">
          ${reasonHtml}
          <span style="font-size:12px;color:#999;margin-left:auto;">${g.members.length}件</span>
        </div>
        <div class="similar-group-body">
          <div class="similar-tags" id="sg-tags-${gi}">${tagsHtml}</div>
          <div class="similar-actions">
            <span class="similar-hint">統合先:</span>
            <input id="sg-to-${gi}" type="text" value="${esc(st.toName)}"
              style="flex:1;padding:6px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;outline:none;min-width:0;"
              oninput="simSetTo(${gi}, this.value)">
            <button class="btn" style="height:32px;font-size:12px;padding:0 10px;" onclick="simAutoTo(${gi})">最多</button>
            <button class="btn btn-danger" style="height:32px;font-size:12px;padding:0 12px;" onclick="simMerge(${gi})">統合</button>
          </div>
          <div style="font-size:11px;color:#bbb;">
            <b>黒塗り</b> = 削除対象 ／ <b>枠のみ</b> = 統合先（クリックで切替）
          </div>
          <div class="similar-group-result" id="sg-result-${gi}"></div>
        </div>
      </div>`;
  }).join('');

  // グループ数を更新
  document.getElementById('similar-count-label').textContent = `${groups.length}グループ検出`;
}

// ── 類似グループ操作 ─────────────────────────────────────

// allItems から groups を再取得
function getSimilarGroups() {
  return detectSimilarGroups(allItems);
}

function simToggle(gi, name) {
  const groups = getSimilarGroups();
  const g = groups[gi];
  if (!g) return;
  const st = getGroupState(g.key, g.members);
  if (st.selected.has(name)) {
    st.selected.delete(name);
    // 統合先が未設定なら自動セット
    if (!st.toName || st.toName === name) {
      const best = g.members.find(m => !st.selected.has(m.name));
      if (best) st.toName = best.name;
    }
  } else {
    st.selected.add(name);
    if (st.toName === name) {
      const best = g.members.find(m => !st.selected.has(m.name));
      st.toName = best ? best.name : '';
    }
  }
  refreshGroupUI(gi, g, st);
}

function simSetTo(gi, val) {
  const groups = getSimilarGroups();
  const g = groups[gi];
  if (!g) return;
  const st = getGroupState(g.key, g.members);
  st.toName = val;
  // 統合先が選択中ならチェックを外す
  if (st.selected.has(val)) {
    st.selected.delete(val);
  }
  refreshGroupUI(gi, g, st);
}

function simAutoTo(gi) {
  const groups = getSimilarGroups();
  const g = groups[gi];
  if (!g) return;
  const st = getGroupState(g.key, g.members);
  const best = g.members.filter(m => !st.selected.has(m.name)).sort((a,b)=>b.count-a.count)[0]
    || g.members.sort((a,b)=>b.count-a.count)[0];
  st.toName = best.name;
  st.selected.delete(best.name);
  const inp = document.getElementById(`sg-to-${gi}`);
  if (inp) inp.value = best.name;
  refreshGroupUI(gi, g, st);
}

function refreshGroupUI(gi, g, st) {
  const tagsWrap = document.getElementById(`sg-tags-${gi}`);
  const inp = document.getElementById(`sg-to-${gi}`);
  if (!tagsWrap) return;
  if (inp) inp.value = st.toName;
  tagsWrap.innerHTML = g.members.map(m => {
    const isSelected = st.selected.has(m.name);
    const isTo = st.toName === m.name && !isSelected;
    return `
      <span class="similar-tag-item">
        <span class="sim-tag ${isSelected ? 'sim-selected' : ''} ${isTo ? 'sim-to' : ''}"
          onclick="simToggle(${gi}, '${esc(m.name)}')">${esc(m.name)}</span>
        <span class="sim-count">${m.count}人</span>
      </span>`;
  }).join('');
}

async function simMerge(gi) {
  const groups = getSimilarGroups();
  const g = groups[gi];
  if (!g) return;
  const st = getGroupState(g.key, g.members);

  const to = (st.toName || '').trim();
  if (!to) { simShowResult(gi, '統合先を指定してください', false); return; }
  const froms = [...st.selected].filter(n => n !== to);
  if (!froms.length) { simShowResult(gi, '削除対象タグを選択してください', false); return; }

  const label = currentType === 'tags' ? '興味タグ' : '楽曲タグ';
  if (!confirm(`${label}「${froms.join('・')}」を「${to}」に統合します。\nこの操作は元に戻せません。実行しますか？`)) return;

  let totalUpdated = 0;
  for (const from of froms) {
    const res  = await fetch(`${API}?action=admin_tag_merge`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Key': adminKey },
      body: JSON.stringify({ type: currentType, from, to }),
    });
    const json = await res.json();
    if (!json.ok) { simShowResult(gi, `エラー: ${json.error}`, false); return; }
    totalUpdated += json.data.updated;
  }

  simShowResult(gi, `完了: ${froms.join('・')} → ${to}（${totalUpdated}人更新）`, true);
  groupState.delete(g.key);
  await loadTagList(); // リスト再取得後に類似リストも再描画
}

function simShowResult(gi, msg, ok) {
  const el = document.getElementById(`sg-result-${gi}`);
  if (!el) return;
  el.textContent = msg;
  el.className = 'similar-group-result ' + (ok ? 'ok' : 'err');
  el.style.display = 'block';
}

// ── サブタブ切替（一覧 / 類似タグ検出）───────────────────

let currentSubTab = 'list';

function switchSubTab(sub) {
  currentSubTab = sub;
  document.querySelectorAll('.tab-inner .tab').forEach(t =>
    t.classList.toggle('active', t.dataset.sub === sub)
  );
  document.getElementById('subtab-list').style.display = sub === 'list' ? '' : 'none';
  document.getElementById('subtab-similar').style.display = sub === 'similar' ? '' : 'none';
  if (sub === 'similar') renderSimilarGroups();
}

// ════════════════════════════════════════════════
//  SNSリンク管理
// ════════════════════════════════════════════════

let snsResults = [];         // [{user_id, username, display_name, links:[{type,url}]}]
let snsSelected = new Map(); // "userId::url" → {user_id, url, cur_type}

function renderSnsTab() {
  document.getElementById('tab-content').innerHTML = `
    <div class="sns-search-bar">
      <input type="text" id="sns-query" placeholder="URLキーワードで検索（例: twitter.com, x.com）">
      <button class="btn btn-primary" onclick="snsSearch()">検索</button>
      <button class="btn" onclick="snsSearchAll()">全件表示</button>
    </div>
    <div id="sns-result-bar" class="sns-result-bar"></div>
    <div id="sns-results" class="sns-results">
      <div class="sns-empty">キーワードを入力して検索するか「全件表示」を押してください</div>
    </div>
    <div class="sns-bulk-bar" id="sns-bulk-bar">
      <span class="sns-bulk-info" id="sns-bulk-info">0件選択中</span>
      <div class="sns-bulk-to-wrap">
        <span style="font-size:12px;font-weight:700;color:#666;">SNS名称を変更→</span>
        <input type="text" id="sns-new-type" placeholder="例: X / Instagram">
        <button class="btn btn-primary" onclick="snsBulkRename()">一括変更</button>
        <button class="btn" onclick="snsClearSelect()">選択解除</button>
      </div>
    </div>
  `;
  document.getElementById('sns-query').addEventListener('keydown', e => {
    if (e.key === 'Enter') snsSearch();
  });
  snsSelected.clear();
}

async function snsSearch() {
  const q = document.getElementById('sns-query')?.value.trim() ?? '';
  await snsLoad(q);
}

async function snsSearchAll() {
  if (document.getElementById('sns-query')) document.getElementById('sns-query').value = '';
  await snsLoad('');
}

async function snsLoad(q) {
  document.getElementById('sns-results').innerHTML = '<div class="loading">検索中…</div>';
  snsSelected.clear();
  updateSnsBulkBar();

  const url = `${API}?action=admin_sns_search` + (q ? `&q=${encodeURIComponent(q)}` : '');
  const res  = await fetch(url, { headers: { 'X-Admin-Key': adminKey } });
  const json = await res.json();
  if (!json.ok) { document.getElementById('sns-results').innerHTML = `<div class="sns-empty">エラー: ${esc(json.error)}</div>`; return; }

  snsResults = json.data || [];
  renderSnsResults();
}

function renderSnsResults() {
  const wrap = document.getElementById('sns-results');
  if (!snsResults.length) {
    wrap.innerHTML = '<div class="sns-empty">該当するユーザーはいません</div>';
    return;
  }

  wrap.innerHTML = snsResults.map(u => {
    const linksHtml = u.links.map(l => {
      const key = `${u.user_id}::${l.url}`;
      const checked = snsSelected.has(key) ? 'checked' : '';
      const typeLabel = l.type ? esc(l.type) : '<span style="color:#bbb;">（名称なし）</span>';
      return `
        <div class="sns-link-row">
          <input type="checkbox" class="sns-link-check" ${checked}
            onchange="snsToggle(this, ${u.user_id}, '${esc(l.url)}', '${esc(l.type || '')}')">
          <span class="sns-link-url"><a href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.url)}</a></span>
          <span class="sns-type-cur">${typeLabel}</span>
        </div>`;
    }).join('');

    return `
      <div class="sns-user-card">
        <div class="sns-user-header">
          <span class="sns-user-name">${esc(u.display_name)}</span>
          <span class="sns-user-id">@${esc(u.username)} (ID:${u.user_id})</span>
        </div>
        <div class="sns-link-rows">${linksHtml}</div>
      </div>`;
  }).join('');
}

function snsToggle(cb, userId, url, curType) {
  const key = `${userId}::${url}`;
  if (cb.checked) {
    snsSelected.set(key, { user_id: userId, url, cur_type: curType });
  } else {
    snsSelected.delete(key);
  }
  updateSnsBulkBar();
}

function updateSnsBulkBar() {
  const bar  = document.getElementById('sns-bulk-bar');
  const info = document.getElementById('sns-bulk-info');
  if (!bar) return;
  if (snsSelected.size === 0) {
    bar.classList.remove('show');
    return;
  }
  bar.classList.add('show');
  // 選択中の現在のSNS名称をまとめて表示
  const types = [...new Set([...snsSelected.values()].map(v => v.cur_type).filter(Boolean))];
  const typeStr = types.length ? `（現在: ${types.map(t => esc(t)).join(' / ')}）` : '';
  info.innerHTML = `${snsSelected.size}件選択中 ${typeStr}`;
}

function snsClearSelect() {
  snsSelected.clear();
  // チェックボックスを全解除
  document.querySelectorAll('.sns-link-check').forEach(cb => cb.checked = false);
  updateSnsBulkBar();
}

async function snsBulkRename() {
  const newType = document.getElementById('sns-new-type')?.value.trim() ?? '';
  if (!newType) { showSnsResult('変更後のSNS名称を入力してください', false); return; }
  if (!snsSelected.size) { showSnsResult('変更対象を選択してください', false); return; }

  const selectedList = [...snsSelected.values()];

  // 対象ユーザーと現在の名称を確認メッセージに含める
  const userIds = [...new Set(selectedList.map(v => v.user_id))];
  const curTypes = [...new Set(selectedList.map(v => v.cur_type).filter(Boolean))];
  const curStr = curTypes.length ? `「${curTypes.join('・')}」→` : '';

  if (!confirm(`${selectedList.length}件のSNSリンク名称を ${curStr}「${newType}」に変更します。\nユーザー数: ${userIds.length}人\n\nよろしいですか？`)) return;

  const changes = selectedList.map(v => ({
    user_id:  v.user_id,
    url:      v.url,
    new_type: newType,
  }));

  const res  = await fetch(`${API}?action=admin_sns_rename`, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Key': adminKey },
    body:    JSON.stringify({ changes }),
  });
  const json = await res.json();
  if (!json.ok) { showSnsResult(`エラー: ${json.error}`, false); return; }

  showSnsResult(`完了: ${json.data.updated}人のSNSリンク名称を「${newType}」に更新しました`, true);
  snsSelected.clear();
  // 結果を再取得して表示を更新
  const q = document.getElementById('sns-query')?.value.trim() ?? '';
  await snsLoad(q);
}

function showSnsResult(msg, ok) {
  const el = document.getElementById('sns-result-bar');
  if (!el) return;
  el.textContent = msg;
  el.className = 'sns-result-bar ' + (ok ? 'ok' : 'err');
  el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderTab() {
  const label = currentType === 'tags' ? '興味タグ' : '楽曲タグ';

  document.getElementById('tab-content').innerHTML = `
    <!-- サブタブナビ -->
    <div class="tab-inner">
      <button class="tab active" data-sub="list" onclick="switchSubTab('list')">一覧・統合</button>
      <button class="tab" data-sub="similar" onclick="switchSubTab('similar')">
        類似タグ検出
        <span class="badge" id="similar-badge">…</span>
      </button>
    </div>

    <!-- 一覧タブ -->
    <div id="subtab-list">
      <div class="section">
        <div class="section-title">${label}一覧（${allItems.length}件）　チェックして統合</div>
        <div class="search-wrap">
          <input type="text" id="tag-search" placeholder="${label}を検索…" oninput="filterList(this.value)">
        </div>
        <div class="tag-list" id="tag-list"></div>
      </div>
      <div class="merge-panel" id="merge-panel">
        <div class="merge-label">統合するタグ（削除される側）</div>
        <div class="merge-selected" id="merge-selected"></div>
        <div class="merge-arrow">↓ 統合先</div>
        <div class="merge-label">統合先のタグ名</div>
        <div class="merge-to-wrap">
          <input type="text" id="merge-to" placeholder="統合先のタグ名を入力">
          <button class="btn" onclick="fillMergeTo()">最多件数を選択</button>
        </div>
        <div class="merge-hint">※ チェックしたタグを持つ全ユーザーに「統合先タグ」を適用し、元のタグを削除します。</div>
        <button class="btn btn-danger" onclick="doMerge()">統合を実行</button>
        <div class="result-msg" id="result-msg"></div>
      </div>
    </div>

    <!-- 類似タグ検出タブ -->
    <div id="subtab-similar" style="display:none;">
      <div class="detect-bar">
        <button class="btn btn-primary" onclick="renderSimilarGroups()">🔍 再検出</button>
        <span class="detect-info" id="similar-count-label">検出中…</span>
      </div>
      <div class="similar-section">
        <div class="similar-list" id="similar-list-wrap">
          <div class="loading">分析中…</div>
        </div>
      </div>
    </div>
  `;

  renderList();

  // バッジのために事前カウントだけ計算
  const count = detectSimilarGroups(allItems).length;
  const badge = document.getElementById('similar-badge');
  if (badge) badge.textContent = count;
}
</script>
