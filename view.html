<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--line:#e8e8e8;--ink:#111;--muted:#666;--soft:#f7f7f7;--blue:#3b82f6;--gold:#e6b422}
body{margin:0;min-height:100dvh;background:var(--soft);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;line-height:1.6}
.app{max-width:680px;margin:0 auto;min-height:100dvh;background:#fff}
header{position:relative;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:10px;min-height:57px}
header h1{font-size:15px;margin:0;font-weight:700;color:#555;position:absolute;left:50%;transform:translateX(-50%);max-width:48%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;pointer-events:none}
.back{display:inline-flex;align-items:center;gap:4px;font-size:14px;color:#111;text-decoration:none;font-weight:600;padding:6px 10px;border-radius:9999px}
.back:hover{background:#f3f3f3}
main{padding:20px}
.hero{display:flex;flex-direction:column;align-items:center;text-align:center;padding:18px 16px 8px}
.icon-wrap{position:relative;width:120px;height:120px;flex-shrink:0}
.icon{width:100%;height:100%;border-radius:50%;background:#f2f2f2;display:grid;place-items:center;font-size:48px;font-weight:800;color:#888;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.06)}
.icon img{width:100%;height:100%;object-fit:cover;object-position:top center}
.badge{position:absolute;bottom:0;right:0;width:30px;height:30px;border-radius:50%;border:3px solid #fff;display:grid;place-items:center;box-shadow:0 2px 6px rgba(0,0,0,.12);z-index:2}
.badge.sns{background:var(--blue)}
.badge.verified{background:var(--gold)}
.badge svg{width:14px;height:14px}
.kind{display:inline-flex;align-items:center;gap:6px;border-radius:9999px;background:#fff;border:1px solid var(--line);color:#333;font-size:12px;font-weight:800;padding:4px 12px;margin-top:14px}
.kind.sns{border-color:#bfdbfe;color:#1d4ed8;background:#eff6ff}
.kind-note{font-size:12px;color:var(--muted);line-height:1.6;margin-top:6px}
.name{font-size:26px;font-weight:800;margin:8px 0 4px;letter-spacing:.02em;color:#111}
.hero-meta{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:10px;max-width:100%}
.hero-meta-chip{display:inline-flex;align-items:center;gap:5px;min-height:28px;padding:5px 10px;border-radius:9999px;background:#f7f7f7;border:1px solid #ececec;color:#333;font-size:12px;font-weight:700;line-height:1.2}
.hero-meta-label{color:#777;font-size:10px;font-weight:800}
.section{margin-top:24px}
.section-title{font-size:12px;font-weight:700;color:#333;text-transform:uppercase;letter-spacing:.5px;margin:0 0 10px}
.card{background:#f7f7f7;border:1px solid #efefef;border-radius:24px;padding:16px 16px 18px}
.meta-grid{display:grid;gap:10px}
.meta-item{display:grid;grid-template-columns:108px 1fr;gap:10px;align-items:start}
.meta-label{font-size:12px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.3px}
.meta-value{font-size:14px;color:#222;line-height:1.7}
.box{font-size:14px;line-height:1.9;color:#333;white-space:pre-wrap;margin:0}
.oshi-group+.oshi-group{margin-top:18px;padding-top:18px;border-top:1px solid #e9e9e9}
.oshi-label{font-size:12px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.3px;margin-bottom:10px}
.oshi-members{display:flex;flex-wrap:wrap;gap:10px}
.member-chip{display:flex;align-items:center;gap:10px;min-width:0;padding:8px 12px 8px 8px;background:#fff;border:1px solid #ececec;border-radius:9999px}
.member-chip-avatar{width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#ececec;display:grid;place-items:center;color:#666;font-weight:700}
.member-chip-avatar img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
.member-chip-name{font-size:13px;font-weight:700;color:#222;line-height:1.35}
.tag-list{display:flex;flex-wrap:wrap;gap:8px}
.tag{display:inline-flex;align-items:center;min-height:34px;padding:7px 12px;border-radius:9999px;background:#fff;border:1px solid #ececec;font-size:13px;font-weight:700;color:#333;line-height:1.35}
.history-list{display:grid;gap:12px;position:relative}
.history-list:before{content:"";position:absolute;left:12px;top:8px;bottom:8px;width:2px;border-radius:9999px;background:#e7e7e7}
.history-item{position:relative;display:grid;grid-template-columns:34px 1fr;gap:10px;align-items:start}
.history-marker{position:relative;z-index:1;width:26px;height:26px;border-radius:50%;background:#111;border:6px solid #f7f7f7;box-shadow:0 0 0 1px #e7e7e7;margin-top:8px}
.history-body{background:#fff;border:1px solid #ececec;border-radius:16px;padding:13px 14px;display:grid;gap:7px}
.history-date{width:fit-content;max-width:100%;border-radius:9999px;background:#f2f2f2;color:#555;font-size:11px;font-weight:900;line-height:1.2;padding:5px 9px}
.history-title{font-size:14px;font-weight:900;color:#111;line-height:1.5}
.history-note{font-size:13px;color:#555;line-height:1.7;white-space:pre-wrap}
.history-more-btn{width:100%;min-height:42px;border-radius:9999px;border:1px solid #ececec;background:#fff;color:#111;font:inherit;font-size:13px;font-weight:900;cursor:pointer}
.history-more-btn:hover{background:#fafafa}
.links{display:grid;gap:8px}
.link,.btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;min-height:48px;border-radius:9999px;text-decoration:none;font-weight:700;font-size:14px;padding:0 20px;border:1.5px solid #111;background:#fff;color:#111;cursor:pointer;font-family:inherit}
.link:hover,.btn:hover{background:#fafafa}
.btn.favorite-add{background:#111;color:#fff;border-color:#111}
.btn.favorite-add:hover{background:#222}
.btn.favorite-done{background:#fff;color:#111;border-color:#111}
.btn.favorite-done:hover{background:#fafafa}
.btn:disabled{opacity:.5;cursor:not-allowed}
.notice{font-size:12px;color:#777;text-align:center;margin-top:10px;line-height:1.7}
.spacer{height:18px}
.footer{margin-top:32px;padding:16px;text-align:center;font-size:12px;color:#aaa}
.error{padding:40px 20px;text-align:center}
.error h2{font-size:18px;margin:0 0 10px}
.error a{color:#111}
.skeleton{padding:60px 20px;text-align:center;color:#aaa}
.empty-text{font-size:13px;color:#888;line-height:1.7}

.sakulabo-favorites{display:grid;gap:8px}
.sakulabo-fav-item{display:flex;align-items:center;justify-content:flex-start;gap:10px;padding:12px 14px;border-radius:16px;background:#fff;border:1px solid #ececec;color:#111;text-decoration:none}
.sakulabo-fav-item:hover{background:#fafafa}
.sakulabo-fav-faces{display:flex;flex-shrink:0;margin-right:2px}
.sakulabo-fav-face{width:34px;height:34px;border-radius:50%;border:2px solid #fff;overflow:hidden;background:#fdf2f8;display:grid;place-items:center;color:#f9a8d4;font-size:12px;font-weight:800;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.sakulabo-fav-face+.sakulabo-fav-face{margin-left:-10px}
.sakulabo-fav-face img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
.sakulabo-fav-main{min-width:0;flex:1}
.sakulabo-fav-date{font-size:10px;color:#999;font-weight:800;line-height:1.2;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sakulabo-fav-title{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sakulabo-fav-meta{font-size:12px;color:#666;margin-top:2px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sakumap-stamps{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.sakumap-stamp{border:1px solid #ececec;border-radius:16px;background:#fff;padding:10px;display:grid;gap:7px;justify-items:center;text-align:center;min-width:0}
.sakumap-stamp-img{width:58px;height:58px;border-radius:14px;background:#fafafa;display:grid;place-items:center;overflow:hidden;color:#b86a7e;font-size:26px;border:1px solid #f0f0f0}
.sakumap-stamp-img img{width:100%;height:100%;object-fit:contain;display:block}
.sakumap-stamp-name{width:100%;font-size:11px;font-weight:800;color:#222;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sakumap-stamp-date{font-size:10px;color:#777;font-weight:700;line-height:1.3}
.sakumv-records{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.sakumv-record{border:1px solid #ececec;border-radius:16px;background:#fff;padding:12px;display:grid;gap:6px;min-width:0}
.sakumv-section{font-size:12px;font-weight:900;color:#222;line-height:1.35}
.sakumv-score{font-size:20px;font-weight:900;color:#111;line-height:1}
.sakumv-meta{display:flex;gap:8px;flex-wrap:wrap;color:#777;font-size:11px;font-weight:800;line-height:1.3}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:80;display:none;align-items:flex-end;justify-content:center}
.confirm-overlay.open{display:flex}
.confirm-sheet{background:#fff;width:100%;max-width:520px;border-radius:20px 20px 0 0;padding:18px;box-shadow:0 -8px 24px rgba(0,0,0,.12)}
.confirm-title{font-size:16px;font-weight:800;margin:0 0 8px;color:#111}
.confirm-body{font-size:13px;color:#666;line-height:1.7;margin:0 0 16px}
.confirm-actions{display:grid;gap:8px}
.confirm-btn{min-height:46px;border-radius:9999px;border:1px solid #ddd;background:#fff;color:#111;font:800 14px inherit;cursor:pointer}
.confirm-btn.danger{background:#e00;border-color:#e00;color:#fff}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:#111;color:#fff;border-radius:9999px;padding:10px 16px;font-size:13px;opacity:0;pointer-events:none;transition:.25s;z-index:50;max-width:90%;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:560px){main{padding:16px}.name{font-size:22px}.icon-wrap{width:104px;height:104px}.meta-item{grid-template-columns:1fr;gap:2px}.member-chip{width:100%}}
</style>
</head>
<body>
<div class="app">
  <header>
    <a class="back" href="./" onclick="return closeOrBack(event)" aria-label="戻る">← 戻る</a>
    <h1>プロフィール</h1>
  </header>
  <main id="app"><div class="skeleton">読み込み中…</div></main>
</div>
<div id="toast" class="toast"></div>
<div id="confirm-modal" class="confirm-overlay" onclick="if(event.target===this)closeConfirmModal()">
  <div class="confirm-sheet">
    <h2 id="confirm-title" class="confirm-title">確認</h2>
    <p id="confirm-body" class="confirm-body"></p>
    <div class="confirm-actions">
      <button id="confirm-ok" class="confirm-btn danger" type="button">解除する</button>
      <button class="confirm-btn" type="button" onclick="closeConfirmModal()">キャンセル</button>
    </div>
  </div>
</div>
<script>
const API = './api.php';
const MEMBER_DATA = '../data/member.json';
let profile = null;
let me = null;
let memberMap = {};

function closeOrBack(e){
  if (window.opener && !window.opener.closed) { e.preventDefault(); window.close(); return false; }
  return true;
}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function assetUrl(url){ if (!url) return ''; if (/^https?:\/\//.test(url) || url.startsWith('data:')) return url; return url.startsWith('/') ? url : './' + url; }
function absoluteUrl(url){ return new URL(url || location.href, location.href).href; }
function setMeta(selector, attr, value){
  if (!value) return;
  let el = document.head.querySelector(selector);
  if (!el) {
    el = document.createElement('meta');
    if (selector.startsWith('meta[name="')) el.setAttribute('name', selector.match(/meta\[name="([^"]+)"/)?.[1] || '');
    if (selector.startsWith('meta[property="')) el.setAttribute('property', selector.match(/meta\[property="([^"]+)"/)?.[1] || '');
    document.head.appendChild(el);
  }
  el.setAttribute(attr, value);
}
function setCanonical(url){
  let el = document.head.querySelector('link[rel="canonical"]');
  if (!el) {
    el = document.createElement('link');
    el.setAttribute('rel', 'canonical');
    document.head.appendChild(el);
  }
  el.setAttribute('href', url);
}
function profileDescription(p){
  const parts = [];
  const oshis = getOshiList(p);
  if (oshis.length) parts.push(`推しメン: ${oshis.join('、')}`);
  const songs = Array.isArray(p.favorite_songs) ? p.favorite_songs : (Array.isArray(p.favoriteSongs) ? p.favoriteSongs : []);
  if (songs.length) parts.push(`好きな曲: ${songs.slice(0, 3).join('、')}`);
  if (p.location) parts.push(`地域: ${p.location}`);
  const bio = String(p.bio || p.comment || '').trim().replace(/\s+/g, ' ');
  if (bio) parts.push(bio.slice(0, 80));
  return (parts.join(' | ') || '櫻坂46ファン同士でプロフィール交換できるBuddies profile。').slice(0, 160);
}
function updateSeo(p){
  const title = `${getDisplayName(p)}のBuddiesプロフィール`;
  const description = profileDescription(p);
  const url = absoluteUrl(`view.html?id=${encodeURIComponent(p.id)}`);
  const image = absoluteUrl(`og-image.php?uid=${encodeURIComponent(p.id)}&v=2`);
  document.title = title;
  setMeta('meta[name="description"]', 'content', description);
  setMeta('meta[property="og:title"]', 'content', title);
  setMeta('meta[property="og:description"]', 'content', description);
  setMeta('meta[property="og:url"]', 'content', url);
  setMeta('meta[property="og:image"]', 'content', image);
  setMeta('meta[name="twitter:title"]', 'content', title);
  setMeta('meta[name="twitter:description"]', 'content', description);
  setMeta('meta[name="twitter:image"]', 'content', image);
  setCanonical(url);
}
function toast(text){ const t=document.getElementById('toast'); t.textContent=text; t.classList.add('show'); clearTimeout(t._timer); t._timer=setTimeout(()=>t.classList.remove('show'),1800); }
function openConfirmModal(title, body, onOk){
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-body').textContent = body;
  document.getElementById('confirm-ok').onclick = () => { closeConfirmModal(); onOk(); };
  document.getElementById('confirm-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeConfirmModal(){
  document.getElementById('confirm-modal').classList.remove('open');
  document.body.style.overflow = '';
}
function getDisplayName(p){ return p.display_name || p.username || '名無し'; }
function hasSns(p){ return Array.isArray(p.sns_links) && p.sns_links.some(s => s && s.url && String(s.url).trim()); }
function getOshiList(p){ return [p.oshi_member,p.oshi_member_2,p.oshi_member_3].filter(Boolean); }
function stanceLabel(v){ return v === 'silent_ok' ? '無言フォローOK' : v === 'hello_please' ? '一言欲しい' : ''; }
function snsLabel(type){ return ({x:'X',threads:'Threads',instagram:'Instagram',tiktok:'TikTok',youtube:'YouTube',link:'Link'})[type] || 'Link'; }
function snsIcon(type){
  const icons = {
    x:'<svg viewBox="0 0 1200 1227" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M714.163 519.284 1160.89 0h-105.86L667.137 450.887 357.328 0H0l468.492 681.821L0 1226.37h105.866l409.625-476.152 327.181 476.152H1200L714.137 519.284h.026ZM569.165 687.828l-47.468-67.894L144.011 79.694h162.604l304.797 435.991 47.468 67.894 396.2 566.721H892.476L569.165 687.854v-.026Z"/></svg>',
    instagram:'<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37Z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>',
    youtube:'<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="6.5" width="18" height="11" rx="3"/><path d="M10 9.5 15 12l-5 2.5Z" fill="currentColor" stroke="none"/></svg>',
    tiktok:'<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 3v11.2a4.2 4.2 0 1 1-4.2-4.2"/><path d="M14 5.5c1.1 2.4 2.8 3.8 5 4.1"/></svg>',
    threads:'<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.8 10.7c-.4-3.1-2.4-5.1-5.7-5.1-3.8 0-6.1 2.7-6.1 6.4s2.5 6.4 6.3 6.4c3.2 0 5.5-1.6 5.5-4.1 0-2.2-1.7-3.5-4.2-3.5h-1.1"/><path d="M14.2 13.8c-.4 1.2-1.3 1.9-2.5 1.9-1.4 0-2.4-.9-2.4-2.2 0-1.4 1-2.2 2.7-2.2.7 0 1.4.1 2.2.3"/></svg>',
    link:'<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>'
  };
  return icons[type] || icons.link;
}
function getMember(name){ return name ? (memberMap[name] || null) : null; }
function getAvatarUrl(p){
  if (p && p.user_icon) return assetUrl(p.user_icon);
  const firstOshi = p?.oshi_member || getOshiList(p)[0];
  const m = getMember(firstOshi);
  if (m && m.image) return assetUrl(m.image);
  return '';
}
function getAvatarColor(p){
  const firstOshi = p?.oshi_member || getOshiList(p)[0];
  const m = getMember(firstOshi);
  return (m && m.color) ? m.color : '#f2f2f2';
}
function avatarInner(p){
  const url = getAvatarUrl(p);
  if (url) return `<img src="${esc(url)}" alt="" onerror="this.style.display='none'">`;
  return esc((getDisplayName(p)[0] || '？'));
}
function memberChip(name){
  const m = getMember(name) || {};
  const img = m.image ? `<img src="${esc(assetUrl(m.image))}" alt="" onerror="this.style.display='none'">` : esc((name[0]||'？'));
  return `<div class="member-chip"><div class="member-chip-avatar">${img}</div><div class="member-chip-name">${esc(name)}</div></div>`;
}

function favMeta(parts){return parts.filter(Boolean).join(' ・ ');}
function favoriteMemberName(name){return typeof name === 'string' ? name.trim() : '';}
function externalMark(){return '<span style="color:#aaa;font-size:13px;flex-shrink:0;margin-left:auto;">↗</span>';}
function favWrap(url, body){return url ? `<a class="sakulabo-fav-item" href="${esc(url)}" target="_blank" rel="noopener">${body}${externalMark()}</a>` : `<div class="sakulabo-fav-item">${body}</div>`;}
function sakulaboFavUrl(item){ if (!item) return ''; return (window.innerWidth >= 1024 && item.url_pc) ? item.url_pc : (item.url_mobile || item.url || ''); }
function sakulaboMimiFaces(item){
  const members = Array.isArray(item?.members) ? item.members.filter(Boolean) : [];
  if (!members.length) return '<div class="sakulabo-fav-faces"><div class="sakulabo-fav-face">♪</div></div>';
  return `<div class="sakulabo-fav-faces">${members.slice(0,4).map(name=>{
    const img = memberMap[name]?.image || '';
    return `<div class="sakulabo-fav-face">${img ? `<img src="${esc(assetUrl(img))}" alt="" onerror="this.style.display='none'">` : esc(name[0] || '?')}</div>`;
  }).join('')}</div>`;
}
function renderSakulaboFavorites(p){
  const fav = p.sakulabo_favorites || {};
  const mimis = Array.isArray(fav.mimis) ? fav.mimis.filter(Boolean) : [];
  const blogs = Array.isArray(fav.blogs) ? fav.blogs.filter(Boolean) : [];
  const blocks = [];
  if (p.show_favorite_mimis && mimis.length) {
    blocks.push(`<div class="section"><div class="section-title">お気に入りのさくみみ</div><div class="card"><div class="sakulabo-favorites">${mimis.slice(0,10).map(item=>{
      const members = Array.isArray(item.members) ? item.members.map(favoriteMemberName).filter(Boolean).join('・') : '';
      const body = `${sakulaboMimiFaces(item)}<div class="sakulabo-fav-main">${item.date ? `<div class="sakulabo-fav-date">${esc(item.date)}</div>` : ''}<div class="sakulabo-fav-title">${esc(item.title || item.id || 'さくみみ')}</div>${members ? `<div class="sakulabo-fav-meta">${esc(members)}</div>` : ''}</div>`;
      return favWrap(sakulaboFavUrl(item), body);
    }).join('')}</div></div></div>`);
  }
  if (p.show_favorite_blogs && blogs.length) {
    blocks.push(`<div class="section"><div class="section-title">お気に入りのブログ</div><div class="card"><div class="sakulabo-favorites">${blogs.slice(0,10).map(item=>{
      const meta = favMeta([favoriteMemberName(item.member), item.date]);
      const body = `<div class="sakulabo-fav-main"><div class="sakulabo-fav-title">${esc(item.title || 'ブログ')}</div>${meta ? `<div class="sakulabo-fav-meta">${esc(meta)}</div>` : ''}</div>`;
      return favWrap(item.url, body);
    }).join('')}</div></div></div>`);
  }
  return blocks.join('');
}
function fmtSakumapDate(s){
  if (!s) return '';
  const d = new Date(String(s).replace(' ', 'T'));
  if (isNaN(d)) return String(s);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}
function renderSakumapStamps(p){
  const stamps = Array.isArray(p.sakumap_stamps) ? p.sakumap_stamps : [];
  if (!p.show_sakumap_stamps || !stamps.length) return '';
  return `<div class="section"><div class="section-title">SakuMapスタンプ</div><div class="card"><div class="sakumap-stamps">${stamps.slice(0,12).map(s=>`
    <div class="sakumap-stamp">
      <div class="sakumap-stamp-img">${s.image_url ? `<img src="${esc(s.image_url)}" alt="">` : esc(s.icon_emoji || '🌸')}</div>
      <div class="sakumap-stamp-name">${esc(s.name || 'スタンプ')}</div>
      <div class="sakumap-stamp-date">${esc(fmtSakumapDate(s.claimed_at))}</div>
    </div>
  `).join('')}</div></div></div>`;
}

function renderSakumvQuizRecords(p){
  const records = Array.isArray(p.sakumv_quiz_records) ? p.sakumv_quiz_records : [];
  if (!p.show_sakumv_quiz || !records.length) return '';
  return `<div class="section"><div class="section-title">SakuMV Quiz</div><div class="card"><div class="sakumv-records">${records.map(r=>`
    <div class="sakumv-record">
      <div class="sakumv-section">${esc(r.section || '')}</div>
      <div class="sakumv-score">${esc(r.correct_count)} / ${esc(r.question_count)}</div>
      <div class="sakumv-meta"><span>${esc(Number(r.time_seconds || 0).toFixed(1))}秒</span><span>${esc(r.rank)}位</span></div>
    </div>
  `).join('')}</div></div></div>`;
}

function historyDateLabel(item){
  const y = item?.year ? `${item.year}` : '';
  if (!y) return '';
  const m = item.month ? `${String(item.month).padStart(2,'0')}` : '';
  const d = item.day ? `${String(item.day).padStart(2,'0')}` : '';
  return [y, m, d].filter(Boolean).join('.');
}
function renderBuddiesHistory(p){
  const items = Array.isArray(p.buddies_history) ? p.buddies_history.filter(Boolean) : [];
  if (!items.length) return '';
  window.__buddiesHistoryItems = items;
  const collapsed = items.length > 5;
  const visible = collapsed ? items.slice(0, 5) : items;
  return `<div class="section"><div class="section-title">My Buddies history</div><div class="card"><div class="history-list" id="history-list" data-expanded="false">${visible.map(item=>`
    <div class="history-item">
      <div class="history-marker" aria-hidden="true"></div>
      <div class="history-body">
        <div class="history-date">${esc(historyDateLabel(item))}</div>
        <div class="history-title">${esc(item.title || '')}</div>
        ${item.note ? `<div class="history-note">${esc(item.note)}</div>` : ''}
      </div>
    </div>`).join('')}</div>${collapsed ? `<button class="history-more-btn" type="button" onclick="toggleHistoryList(this)">すべて見る（${items.length}件）</button>` : ''}</div></div>`;
}

function historyItemHtml(item){
  return `<div class="history-item">
    <div class="history-marker" aria-hidden="true"></div>
    <div class="history-body">
      <div class="history-date">${esc(historyDateLabel(item))}</div>
      <div class="history-title">${esc(item.title || '')}</div>
      ${item.note ? `<div class="history-note">${esc(item.note)}</div>` : ''}
    </div>
  </div>`;
}

function toggleHistoryList(btn){
  const items = window.__buddiesHistoryItems || [];
  const list = document.getElementById('history-list');
  if (!list || !Array.isArray(items)) return;
  const expanded = list.dataset.expanded === 'true';
  const nextItems = expanded ? items.slice(0, 5) : items;
  list.innerHTML = nextItems.map(historyItemHtml).join('');
  list.dataset.expanded = expanded ? 'false' : 'true';
  btn.textContent = expanded ? `すべて見る（${items.length}件）` : '閉じる';
}

function metaRows(p){
  const rows = [];
  if (p.location) rows.push(['都道府県', p.location]);
  if (p.age) rows.push(['年齢', `${p.age}歳`]);
  if (p.gender) rows.push(['性別', p.gender]);
  if (p.buddies_since) rows.push(['Buddies歴', p.buddies_since]);
  return rows;
}
function heroMeta(rows){
  if (!rows.length) return '';
  return `<div class="hero-meta">${rows.map(([label,val])=>`<span class="hero-meta-chip"><span class="hero-meta-label">${esc(label)}</span>${esc(val)}</span>`).join('')}</div>`;
}

async function load(){
  const params = new URLSearchParams(location.search);
  const id = parseInt(params.get('id') || params.get('uid') || '0', 10);
  if (!id) return renderError('プロフィールが指定されていません。');
  try {
    const [meRes, pRes, memberRes] = await Promise.all([
      fetch(`${API}?action=auth_me`, { credentials:'include' }).catch(()=>null),
      fetch(`${API}?action=buddies_public_profile_get&user_id=${id}`, { credentials:'include' }),
      fetch(`${MEMBER_DATA}?_=${Date.now()}`).catch(()=>null)
    ]);
    if (meRes) { try { const j = await meRes.json(); me = j.ok ? j.data : null; } catch(e){} }
    if (memberRes) {
      try {
        const raw = await memberRes.json();
        const arr = Array.isArray(raw) ? raw : Object.values(raw || {});
        arr.forEach(m => { if (m && m.name) memberMap[m.name] = m; });
      } catch(e){}
    }
    const json = await pRes.json();
    if (!json.ok) return renderError(json.error || 'プロフィールを取得できませんでした。');
    profile = json.data;
    if (profile.verified_account && profile.verified_account.id) {
      location.replace('./verified/view.html?id=' + encodeURIComponent(profile.verified_account.id));
      return;
    }
    render(profile);
  } catch (e) { renderError('通信エラーが発生しました。'); }
}

function renderError(text){
  document.title = 'Buddies profile';
  document.getElementById('app').innerHTML = `<div class="error"><h2>${esc(text)}</h2><p><a href="./">← Buddies トップへ戻る</a></p></div>`;
}

function render(p){
  const name = getDisplayName(p);
  updateSeo(p);
  const sns = hasSns(p);
  const stance = stanceLabel(p.follow_stance);
  const badge = sns ? `<div class="badge sns" title="SNS登録済み"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>` : '';
  const heroIcon = avatarInner(p);
  const heroBg = getAvatarColor(p);
  const links = (p.sns_links || []).filter(s => s && s.url && String(s.url).trim()).slice(0,10);
  const linkHtml = links.map(s => {
    const label = s.label && String(s.label).trim() ? s.label : snsLabel(s.type);
    return `<a class="link" href="${esc(s.url)}" target="_blank" rel="noopener">${snsIcon(s.type)}<span>${esc(label)}</span></a>`;
  }).join('');
  const rows = metaRows(p);
  const oshis = getOshiList(p);
  const interests = Array.isArray(p.tags) ? p.tags : [];
  const songs = Array.isArray(p.favorite_songs) ? p.favorite_songs : [];
  const snsSection = `
    <div class="section">
      <div class="section-title">SNSリンク</div>
      <div class="${linkHtml ? 'links' : 'card'}">${linkHtml || '<div class="empty-text">まだ登録されていません。</div>'}</div>
    </div>`;
  const myOshiSection = `
    <div class="section">
      <div class="section-title">My推し</div>
      <div class="card">
        <div class="oshi-group">
          <div class="oshi-label">推しメン</div>
          ${oshis.length ? `<div class="oshi-members">${oshis.map(memberChip).join('')}</div>` : `<div class="empty-text">まだ登録されていません。</div>`}
        </div>
        <div class="oshi-group">
          <div class="oshi-label">興味</div>
          ${interests.length ? `<div class="tag-list">${interests.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>` : `<div class="empty-text">まだ登録されていません。</div>`}
        </div>
        <div class="oshi-group">
          <div class="oshi-label">好きな曲</div>
          ${songs.length ? `<div class="tag-list">${songs.map(s=>`<span class="tag">${esc(s)}</span>`).join('')}</div>` : `<div class="empty-text">まだ登録されていません。</div>`}
        </div>
      </div>
    </div>`;
  const upperSections = myOshiSection + snsSection;

  document.getElementById('app').innerHTML = `
    <div class="hero">
      <div class="icon-wrap"><div class="icon" style="background:${esc(heroBg)}">${heroIcon}</div>${badge}</div>
      ${sns ? `<div class="kind sns">SNS登録済み</div>${stance ? `<div class="kind-note">${esc(stance)}</div>` : ''}` : `<div class="kind">一般ユーザー</div>`}
      <div class="name">${esc(name)}</div>
      ${heroMeta(rows)}
    </div>

    ${upperSections}

    <div class="section">
      <div class="section-title">Bio</div>
      <div class="card"><div class="box">${p.bio ? esc(p.bio) : 'まだ登録されていません。'}</div></div>
    </div>

    ${renderBuddiesHistory(p)}
    ${renderSakulaboFavorites(p)}
    ${renderSakumapStamps(p)}
    ${renderSakumvQuizRecords(p)}

    <div class="spacer"></div>
    <div id="favorite-area" class="section"></div>
    <div class="footer">Buddies profile</div>
  `;
  renderFavoriteArea();
}

function openLoginForFavorite(){
  if (!profile) return;
  const redirect = `view.html?id=${encodeURIComponent(profile.id)}`;
  location.href = `./?favorite_redirect=${encodeURIComponent(redirect)}`;
}

function renderFavoriteArea(){
  const area = document.getElementById('favorite-area');
  if (!area || !profile) return;
  const canFavoriteTarget = profile.account_role === 'user';
  if (!me) {
    area.innerHTML = `<button class="btn favorite-add" onclick="openLoginForFavorite()">ログインしてお気に入り</button><div class="notice">お気に入りはログイン中の一般ユーザー同士で利用できます。</div>`;
    return;
  }
  const meIsGeneral = me.account_role === 'user';
  if (profile.is_self || Number(me.id) === Number(profile.id)) {
    area.innerHTML = `<button class="btn" onclick="location.href='./?edit=1'">プロフィールを編集</button>`;
    return;
  }
  if (!meIsGeneral || !canFavoriteTarget) {
    area.innerHTML = `<div class="notice">お気に入りは一般ユーザー同士で利用できます。</div>`;
    return;
  }
  const active = !!profile.favorited;
  area.innerHTML = `<button class="btn ${active ? 'favorite-done' : 'favorite-add'}" onclick="toggleFavorite()">${active ? 'お気に入り済み' : 'お気に入りに追加'}</button>`;
}

async function toggleFavorite(){
  if (!profile || !me) return;
  if (profile.favorited) {
    openConfirmModal('お気に入りの解除', `${getDisplayName(profile)} さんをお気に入りから解除しますか？`, doToggleFavorite);
    return;
  }
  await doToggleFavorite();
}

async function doToggleFavorite(){
  if (!profile || !me) return;
  try {
    const res = await fetch(`${API}?action=buddies_favorite_toggle`, {
      method:'POST', credentials:'include', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ target_id: profile.id })
    });
    const json = await res.json();
    if (!json.ok) {
      if (res.status === 401) {
        toast('ログイン後にもう一度お試しください');
        setTimeout(openLoginForFavorite, 300);
        return;
      }
      toast(json.error || '更新できませんでした');
      return;
    }
    profile.favorited = !!json.data.favorited;
    renderFavoriteArea();
    toast(profile.favorited ? 'お気に入りに追加しました' : 'お気に入りから削除しました');
  } catch(e) { toast('通信エラーが発生しました'); }
}

load();
</script>
</body>
</html>
