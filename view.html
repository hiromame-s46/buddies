<script>
const API = './api.php';
const MEMBER_DATA = '../data/member.json';
const LIVE_DATA = '../data/live.json';
let profile = null;
let me = null;
let memberMap = {};
let memberDataLoaded = false;
let liveOptions = [];

function closeOrBack(e){
  const params = new URLSearchParams(location.search);
  if (params.get('from') === 'live') {
    e.preventDefault();
    const live = params.get('live') || '';
    location.href = './live.html' + (live ? '?live=' + encodeURIComponent(live) : '');
    return false;
  }
  if (window.opener && !window.opener.closed) { e.preventDefault(); window.close(); return false; }
  return true;
}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function assetUrl(url){ if (!url) return ''; if (/^https?:\/\//.test(url) || url.startsWith('data:')) return url; return url.startsWith('/') ? url : './' + url; }
function absoluteUrl(url){ return new URL(url || location.href, location.href).href; }
function localDateKey(d = new Date()){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function liveDateObj(date){const m=String(date||'').match(/^(\d{4})-(\d{2})-(\d{2})$/);return m?new Date(Number(m[1]),Number(m[2])-1,Number(m[3])):null;}
function liveDateLabel(date, weekday){const d=liveDateObj(date);if(!d)return date||'';const w=weekday||['日','月','火','水','木','金','土'][d.getDay()];return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${w})`;}
function liveId(title,date,venue){return [date||'',title||'',venue||''].join('|');}
function venueForPerformance(live,perf,index){
  const lines=String(live.detail_text||'').split(/\n+/).map(s=>s.trim()).filter(Boolean);
  let current=(live.venues&&live.venues.length===1)?live.venues[0]:'';
  let found='';
  for(const line of lines){
    const looksDate=/\d{4}[./]\d{1,2}[./]\d{1,2}/.test(line);
    if(!looksDate) current=line.replace(/^＠/,'').trim();
    if(looksDate){
      const parts=String(perf.date||'').split('-').map(n=>String(Number(n)));
      const compact=`${parts[0]}.${parts[1]}.${parts[2]}`;
      const normalized=line.replace(/[年月]/g,'.').replace(/日/g,'').replace(/-/g,'.');
      if(normalized.includes(compact)){found=current;break;}
    }
  }
  return found || (Array.isArray(live.venues)&&live.venues[index]?live.venues[index]:(live.venues||[]).join(' / '));
}
function buildLiveOptions(raw){
  const items=Array.isArray(raw?.items)?raw.items:(Array.isArray(raw)?raw:[]);
  const out=[];
  items.forEach(live=>{
    (Array.isArray(live.performances)?live.performances:[]).forEach((perf,index)=>{
      const venue=venueForPerformance(live,perf,index);
      out.push({id:liveId(live.title,perf.date,venue),title:live.title||'ライブ',date:perf.date,weekday:perf.weekday||'',venue,url:live.url||''});
    });
  });
  return out.sort((a,b)=>String(a.date).localeCompare(String(b.date))||String(a.title).localeCompare(String(b.title)));
}
function liveDisplay(id){const live=liveOptions.find(l=>l.id===id);if(live)return live;const [date,title,venue]=String(id||'').split('|');return {id,date,title:title||'ライブ',venue:venue||'',weekday:''};}
function seatAreaLabel(v){return v==='arena'?'アリーナ':v==='stand'?'スタンド':'';}
function cleanSeatInfo(seat={}){const floor=String(seat.floor||'').replace(/[^0-9]/g,'').slice(0,2);const area=['arena','stand'].includes(seat.area)?seat.area:'';const block=String(seat.block||'').replace(/[^a-zA-Z0-9]/g,'').toUpperCase().slice(0,12);return{floor,area,block};}
function seatHasValue(seat){const s=cleanSeatInfo(seat);return!!(s.floor||s.area||s.block);}
function seatLabel(seat){const s=cleanSeatInfo(seat);return[s.floor?`${s.floor}階`:'',seatAreaLabel(s.area),s.block?`${s.block}ブロック`:''].filter(Boolean).join(' / ');}
function nextLiveIds(p){const ids=Array.isArray(p?.next_lives)?p.next_lives:[];const today=localDateKey();return ids.filter(id=>{const live=liveDisplay(id);return !live.date||live.date>=today;}).sort((a,b)=>String(liveDisplay(a).date||'9999-99-99').localeCompare(String(liveDisplay(b).date||'9999-99-99')));}
function pastLiveIds(p){const ids=Array.isArray(p?.next_lives)?p.next_lives:[];const today=localDateKey();return ids.filter(id=>{const live=liveDisplay(id);return !!live.date&&live.date<today;}).sort((a,b)=>String(liveDisplay(b).date||'').localeCompare(String(liveDisplay(a).date||'')));}
function setMeta(selector, attr, value){
  if (!value) return;
  let el = document.head.querySelector(selector);
  if (!el) {
    el = document.createElement('meta');
    if (selector.startsWith('meta[name="')) el.setAttribute('name', selector.match(/meta\[name="([^"]+)"/)?.[1] || '');
    if (selector.startsWith('meta[property="')) el.setAttribute('property', selector.match(/meta\[property="([^"]+)"/)?.[1] || '');
    document.head.appendChild(el);
  }
  el.setAttribute(attr, value);
}
function setCanonical(url){
  let el = document.head.querySelector('link[rel="canonical"]');
  if (!el) {
    el = document.createElement('link');
    el.setAttribute('rel', 'canonical');
    document.head.appendChild(el);
  }
  el.setAttribute('href', url);
}

  const y = item?.year ? `${item.year}` : '';
  if (!y) return '';
  const m = item.month ? `${String(item.month).padStart(2,'0')}` : '';
  const d = item.day ? `${String(item.day).padStart(2,'0')}` : '';
  return [y, m, d].filter(Boolean).join('.');
}
function historyLiveHtml(item){
  if (!item?.live_id) return '';
  const live = liveDisplay(item.live_id);
  return `<div class="history-live">
    <div class="history-live-label">参加したLIVE</div>
    <div class="history-live-title">${esc(live.title || 'ライブ')}</div>
    ${live.venue ? `<div class="history-live-venue">${esc(live.venue)}</div>` : ''}
  </div>`;
}
function historyEntryDateKey(item){
  const y = Number(item?.year || 0);
  const m = Number(item?.month || 0);
  const d = Number(item?.day || 0);
  if (!y) return '';
  return `${String(y).padStart(4,'0')}-${String(m || 0).padStart(2,'0')}-${String(d || 0).padStart(2,'0')}`;
}
function historyLiveDateItem(id){
  const live = liveDisplay(id);
  const d = live.dateObj || liveDateObj(live.date);
  return {
    id: `live:${id}`,
    year: d ? d.getFullYear() : '',
    month: d ? d.getMonth() + 1 : '',
    day: d ? d.getDate() : '',
    title: live.title || 'ライブ',
    note: live.venue ? live.venue : '',
    live_id: id,
    image_url: '',
    is_live_only: true,
  };
}
function mergedHistoryItems(p){
  const base = Array.isArray(p.buddies_history) ? p.buddies_history.filter(Boolean) : [];
  const linked = new Set(base.map(item => item.live_id).filter(Boolean));
  const liveOnly = pastLiveIds(p).filter(id => !linked.has(id)).map(historyLiveDateItem);
  return [...base, ...liveOnly].sort((a,b) => {
    const ka = historyEntryDateKey(a);
    const kb = historyEntryDateKey(b);
    if (ka !== kb) return kb.localeCompare(ka);
    return Number(b.id || 0) - Number(a.id || 0);
  });
}
function sortedHistoryItems(p){
  const base = Array.isArray(p.buddies_history) ? p.buddies_history.filter(Boolean) : [];
  return [...base].sort((a,b) => {
    const ka = historyEntryDateKey(a);
    const kb = historyEntryDateKey(b);
    if (ka !== kb) return kb.localeCompare(ka);
    return Number(b.id || 0) - Number(a.id || 0);
  });
}
function pastLiveSummaryItemHtml(id){
  const live = liveDisplay(id);
  return `<div class="history-live-summary-item">
    <div class="history-live-summary-date">${esc(liveDateLabel(live.date, live.weekday))}</div>
    <div class="history-live-summary-main">
      <div class="history-live-summary-name">${esc(live.title || 'ライブ')}</div>
      ${live.venue ? `<div class="history-live-summary-venue">${esc(live.venue)}</div>` : ''}
    </div>
  </div>`;
}
function renderHistoryPastLivesBlock(p){
  const ids = pastLiveIds(p);
  if (!ids.length) return '';
  const limit = 3;
  const shown = ids.slice(0, limit);
  const more = ids.length > limit ? `<div class="history-live-summary-venue">ほか ${ids.length - limit} 公演</div>` : '';
  return `<div class="history-live-summary">
    <div class="history-live-summary-title">参加したLIVE</div>
    <div class="history-live-summary-list">${shown.map(pastLiveSummaryItemHtml).join('')}</div>
    ${more}
  </div>`;
}
function renderBuddiesHistory(p){
  const liveBlock = renderHistoryPastLivesBlock(p);
  const items = sortedHistoryItems(p);
  if (!items.length && !liveBlock) return '';
  window.__buddiesHistoryItems = items;
  const collapsed = items.length > 3;
  const visible = collapsed ? items.slice(0, 3) : items;
  const moreUrl = `./history.html?id=${encodeURIComponent(p.id)}`;
  const historyList = items.length ? `<div class="history-subsection-title">History</div><div class="history-list" id="history-list" data-expanded="false">${visible.map(item=>`
    <div class="history-item">
      <div class="history-marker" aria-hidden="true"></div>
      <div class="history-body">
        <div class="history-date">${esc(historyDateLabel(item))}</div>
        ${historyLiveHtml(item)}
        ${item.image_url ? `<div class="history-image"><img src="${esc(assetUrl(item.image_url))}" alt=""></div>` : ''}
        ${item.is_live_only ? '' : `<div class="history-title">${esc(item.title || '')}</div>${item.note ? `<div class="history-note">${esc(item.note)}</div>` : ''}`}
      </div>
    </div>`).join('')}</div>${collapsed ? `<button class="history-more-btn" type="button" onclick="location.href='${esc(moreUrl)}'">もっと見る（${items.length}件）</button>` : ''}` : '';
  return `<div class="section"><div class="section-title">My Buddies history</div><div class="card">${liveBlock}${historyList}</div></div>`;
}

function historyItemHtml(item){
  return `<div class="history-item">
    <div class="history-marker" aria-hidden="true"></div>
    <div class="history-body">
      <div class="history-date">${esc(historyDateLabel(item))}</div>
      ${historyLiveHtml(item)}
      ${item.image_url ? `<div class="history-image"><img src="${esc(assetUrl(item.image_url))}" alt=""></div>` : ''}
      ${item.is_live_only ? '' : `<div class="history-title">${esc(item.title || '')}</div>${item.note ? `<div class="history-note">${esc(item.note)}</div>` : ''}`}
    </div>
  </div>`;
}

function toggleHistoryList(btn){
  const items = window.__buddiesHistoryItems || [];
  const list = document.getElementById('history-list');
  if (!list || !Array.isArray(items)) return;
  const expanded = list.dataset.expanded === 'true';
  const nextItems = expanded ? items.slice(0, 3) : items;
  list.innerHTML = nextItems.map(historyItemHtml).join('');
  list.dataset.expanded = expanded ? 'false' : 'true';
  btn.textContent = expanded ? `すべて見る（${items.length}件）` : '閉じる';
}

function metaRows(p){
  const rows = [];
  if (p.location) rows.push(['都道府県', p.location]);
  if (p.age) rows.push(['年齢', `${p.age}歳`]);
  if (p.gender) rows.push(['性別', p.gender]);
  if (p.buddies_since) rows.push(['Buddies歴', p.buddies_since]);
  const pastCount = pastLiveIds(p).length;
  if (pastCount > 0) rows.push(['参加したLIVE', `${pastCount}公演`]);
  return rows;
}
function heroMeta(rows){
  if (!rows.length) return '';
  return `<div class="hero-meta">${rows.map(([label,val])=>`<span class="hero-meta-chip"><span class="hero-meta-label">${esc(label)}</span>${esc(val)}</span>`).join('')}</div>`;
}

async function load(){
  const params = new URLSearchParams(location.search);
  const id = parseInt(params.get('id') || params.get('uid') || '0', 10);
  if (!id) return renderError('プロフィールが指定されていません。');
  try {
    const [meRes, pRes, memberRes, liveRes] = await Promise.all([
      fetch(`${API}?action=auth_me`, { credentials:'include' }).catch(()=>null),
      fetch(`${API}?action=buddies_public_profile_get&user_id=${id}`, { credentials:'include' }),
      fetch(`${MEMBER_DATA}?_=${Date.now()}`).catch(()=>null),
      fetch(`${LIVE_DATA}?_=${Date.now()}`).catch(()=>null)
    ]);
    if (meRes) { try { const j = await meRes.json(); me = j.ok ? j.data : null; } catch(e){} }
    if (memberRes) {
      try {
        const raw = await memberRes.json();
        const arr = Array.isArray(raw) ? raw : Object.values(raw || {});
        memberDataLoaded = true;
        arr.forEach(m => { if (m && m.name) memberMap[m.name] = m; });
      } catch(e){}
    }
    if (liveRes) {
      try { liveOptions = buildLiveOptions(await liveRes.json()); } catch(e){ liveOptions = []; }
    }
    const json = await pRes.json();
    if (!json.ok) return renderError(json.error || 'プロフィールを取得できませんでした。');
    profile = json.data;
    if (profile.verified_account && profile.verified_account.id) {
      location.replace('./verified/view.html?id=' + encodeURIComponent(profile.verified_account.id));
      return;
    }
    render(profile);
  } catch (e) { renderError('通信エラーが発生しました。'); }
}

function renderError(text){
  document.title = 'Buddies profile';
  document.getElementById('app').innerHTML = `<div class="error"><h2>${esc(text)}</h2><p><a href="./">← Buddies トップへ戻る</a></p></div>`;
}

function render(p){
  const name = getDisplayName(p);
  updateSeo(p);
  const sns = hasSns(p);
  const stance = stanceLabel(p.follow_stance);
  const badge = sns ? `<div class="badge sns" title="SNS登録済み"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>` : '';
  const heroIcon = avatarInner(p);
  const heroBg = getAvatarColor(p);
  const links = (p.sns_links || []).filter(s => s && s.url && String(s.url).trim()).slice(0,10);
  const otherLinks = links.filter(s => !isHeroSns(s.type));
  const heroSnsHtml = heroSnsIcons(links);
  const linkHtml = otherLinks.map(s => {
    const label = s.label && String(s.label).trim() ? s.label : snsLabel(s.type);
    return `<a class="link" href="${esc(s.url)}" target="_blank" rel="noopener">${snsIcon(s.type)}<span>${esc(label)}</span></a>`;
  }).join('');
  const rows = metaRows(p);
  const oshis = getOshiList(p);
  const interests = Array.isArray(p.tags) ? p.tags : [];
  const songs = Array.isArray(p.favorite_songs) ? p.favorite_songs : [];
  const oshiGroups = [
    oshis.length ? `<div class="oshi-group"><div class="oshi-label">推しメン</div><div class="oshi-members">${oshis.map(memberChip).join('')}</div></div>` : '',
    interests.length ? `<div class="oshi-group"><div class="oshi-label">興味</div><div class="tag-list">${interests.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div></div>` : '',
    songs.length ? `<div class="oshi-group"><div class="oshi-label">好きな曲</div><div class="tag-list">${songs.map(s=>`<span class="tag">${esc(s)}</span>`).join('')}</div></div>` : ''
  ].filter(Boolean).join('');
  const snsSection = otherLinks.length ? `
    <div class="section">
      <div class="section-title">リンク</div>
      <div class="links">${linkHtml}</div>
    </div>` : '';
  const myOshiSection = oshiGroups ? `
    <div class="section">
      <div class="section-title">My推し</div>
      <div class="card">${oshiGroups}</div>
    </div>` : '';
  const nextLiveSection = renderNextLives(p);
  const bioText = p.bio && String(p.bio).trim();
  const bioSection = bioText ? `
    <div class="section">
      <div class="section-title">Bio</div>
      <div class="card"><div class="box">${esc(bioText)}</div></div>
    </div>` : '';
  const historySection = renderBuddiesHistory(p);
  const linkedSections = [
    renderSakulaboFavorites(p),
    renderSakumapStamps(p),
    renderSakumvQuizRecords(p),
  ].filter(Boolean).join('');

  document.getElementById('app').innerHTML = `
    <div class="hero">
      <div class="icon-wrap"><div class="icon" style="background:${esc(heroBg)}">${heroIcon}</div>${badge}</div>
      ${sns ? `<div class="kind sns">SNS登録済み</div>${stance ? `<div class="kind-note">${esc(stance)}</div>` : ''}` : `<div class="kind">一般ユーザー</div>`}
      <div class="name">${esc(name)}</div>
      ${heroSnsHtml}
      ${heroMeta(rows)}
    </div>

    ${nextLiveSection}
    ${myOshiSection}
    ${bioSection}
    ${historySection}
    ${linkedSections}
    ${snsSection}
    <div id="favorite-area" class="section"></div>

    <div class="footer">Buddies profile</div>
  `;
  renderFavoriteArea();
}

function openLoginForFavorite(){
  if (!profile) return;
  const page = location.pathname.split('/').pop() || 'view.html';
  const redirect = `${page}?id=${encodeURIComponent(profile.id)}`;
  location.href = `./?favorite_redirect=${encodeURIComponent(redirect)}`;
}

function favoriteHeartIcon(filled){
  return filled
    ? '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.08C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/></svg>';
}
function renderHeroFavoriteArea(){
  const area = document.getElementById('header-favorite-area');
  if (!area || !profile) return;
  const canFavoriteTarget = profile.account_role === 'user';
  area.innerHTML = '';
  if (profile.is_self || (me && Number(me.id) === Number(profile.id)) || !canFavoriteTarget) return;
  if (!me) {
    area.innerHTML = `<button class="hero-fav-btn login" type="button" onclick="openLoginForFavorite()">ログイン</button>`;
    return;
  }
  if (me.account_role !== 'user') return;
  const active = !!profile.favorited;
  area.innerHTML = `<button class="hero-fav-btn ${active ? 'active' : ''}" type="button" onclick="toggleFavorite()" aria-label="${active ? 'お気に入りを解除' : 'お気に入りに追加'}" title="${active ? 'お気に入り済み' : 'お気に入りに追加'}">${favoriteHeartIcon(active)}</button>`;
}

function renderFavoriteArea(){
  const area = document.getElementById('favorite-area');
  renderHeroFavoriteArea();
  if (!area || !profile) return;
  const canFavoriteTarget = profile.account_role === 'user';
  if (!me) {
    area.innerHTML = `<button class="btn favorite-add" onclick="openLoginForFavorite()">ログインしてお気に入り</button><div class="notice">お気に入りはログイン中の一般ユーザー同士で利用できます。</div>`;
    return;
  }
  const meIsGeneral = me.account_role === 'user';
  if (profile.is_self || Number(me.id) === Number(profile.id)) {
    area.innerHTML = `<button class="btn" onclick="location.href='./?edit=1'">プロフィールを編集</button>`;
    return;
  }
  if (!meIsGeneral || !canFavoriteTarget) {
    area.innerHTML = `<div class="notice">お気に入りは一般ユーザー同士で利用できます。</div>`;
    return;
  }
  const active = !!profile.favorited;
  area.innerHTML = `<button class="btn ${active ? 'favorite-done' : 'favorite-add'}" onclick="toggleFavorite()">${active ? 'お気に入り済み' : 'お気に入りに追加'}</button>`;
}

async function toggleFavorite(){
  if (!profile || !me) return;
  if (profile.favorited) {
    openConfirmModal('お気に入りの解除', `${getDisplayName(profile)} さんをお気に入りから解除しますか？`, doToggleFavorite);
    return;
  }
  await doToggleFavorite();
}

async function doToggleFavorite(){
  if (!profile || !me) return;
  try {
    const res = await fetch(`${API}?action=buddies_favorite_toggle`, {
      method:'POST', credentials:'include', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ target_id: profile.id })
    });
    const json = await res.json();
    if (!json.ok) {
      if (res.status === 401) {
        toast('ログイン後にもう一度お試しください');
        setTimeout(openLoginForFavorite, 300);
        return;
      }
      toast(json.error || '更新できませんでした');
      return;
    }
    profile.favorited = !!json.data.favorited;
    renderFavoriteArea();
    toast(profile.favorited ? 'お気に入りに追加しました' : 'お気に入りから削除しました');
  } catch(e) { toast('通信エラーが発生しました'); }
}

load();
</script>
</body>
</html>
