<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>推しプロフィール v3 - Sakurazaka46</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yomogi&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#3f352d;--soft-ink:#746357;--paper:#fffdfb;--cream:#fff8ef;--petal:#efabc7;--petal-deep:#d98fb0;--sky:#bfd6ea;--mint:#cfe7dc;--butter:#f7e4a6;--shadow:rgba(71,58,48,.16)}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;overscroll-behavior:none;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased}
body{font-family:'Zen Maru Gothic',system-ui,-apple-system,BlinkMacSystemFont,sans-serif;touch-action:manipulation;overflow-x:hidden}
.app{min-height:100dvh;display:flex;flex-direction:column;background:var(--cream);background-image:linear-gradient(140deg,rgba(239,171,199,.24),transparent 30%,rgba(191,214,234,.24) 62%,transparent),radial-gradient(rgba(217,143,176,.54) 0.6px,transparent 0.7px);background-size:100% 100%,24px 24px}
.toolbar{position:sticky;top:0;z-index:100;padding:max(9px,env(safe-area-inset-top)) 12px 9px;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);background:rgba(255,250,247,.82);border-bottom:1.5px solid rgba(217,143,176,.55);display:flex;gap:8px;justify-content:center;overflow-x:auto;scrollbar-width:none}
.toolbar::-webkit-scrollbar{display:none}
.toolbar button{display:inline-flex;align-items:center;justify-content:center;gap:7px;min-height:42px;min-width:42px;padding:0 15px;border-radius:999px;border:1.5px solid var(--ink);background:rgba(255,255,255,.92);color:var(--ink);font-family:'Zen Maru Gothic';font-weight:700;font-size:13px;box-shadow:0 3px 0 var(--ink),0 9px 18px rgba(74,64,54,.08);transition:transform .08s,background .2s;cursor:pointer;flex:0 0 auto}
.toolbar button:active{transform:translateY(2px);box-shadow:0 1px 0 var(--ink)}
.toolbar button.primary{background:linear-gradient(180deg,#ffd7e7,var(--petal))}
.toolbar button svg{width:18px;height:18px;stroke-width:2}
.toolbar button.danger{background:#fff4ef}
.tool-panel{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-8px);z-index:90;display:flex;gap:8px;align-items:center;padding:10px 12px;border:1.5px solid #4a4036;border-radius:18px;background:rgba(255,253,251,.94);box-shadow:0 8px 0 #ead8ca,0 18px 36px rgba(74,64,54,.12);opacity:0;pointer-events:none;transition:opacity .18s,transform .18s}
.tool-panel.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
.tool-panel button{border:1.4px solid #d7c3b5;background:#fffaf7;border-radius:999px;min-height:36px;padding:0 12px;font-family:'Zen Maru Gothic';font-weight:700;color:#4a4036;cursor:pointer;white-space:nowrap}
.tool-panel button:hover{background:#fff0f6}
.layout-panel{top:122px}
.canvas-viewport{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:8px 0 calc(env(safe-area-inset-bottom) + 12px);overflow:hidden}
.canvas-wrap{width:1080px;height:1350px;transform-origin:top center;will-change:transform}
#canvas{width:1080px;height:1350px;position:relative;background:#fff9f2;background-image:linear-gradient(180deg,rgba(255,255,255,.72),transparent 22%),linear-gradient(135deg,rgba(239,171,199,.16),transparent 42%,rgba(191,214,234,.18)),radial-gradient(rgba(217,143,176,.48) 0.8px,transparent 0.8px);background-size:100% 100%,100% 100%,28px 28px;overflow:hidden;box-shadow:0 26px 80px var(--shadow),0 2px 0 #eaded3 inset;border:1.8px solid #dccabf;border-radius:24px}
#canvas:before{content:'SAKURAZAKA 46';position:absolute;left:44px;top:30px;font-family:'Zen Maru Gothic';font-weight:700;font-size:15px;letter-spacing:.18em;color:rgba(116,99,87,.42);z-index:2}
#canvas:after{content:'';position:absolute;left:34px;right:34px;top:22px;height:1px;background:linear-gradient(90deg,transparent,rgba(217,143,176,.65),rgba(191,214,234,.7),transparent);z-index:1}
.obj{position:absolute;pointer-events:none;user-select:none}
.notebook{position:absolute;left:64px;top:374px;width:952px;height:708px;z-index:20}
.notebook-pages{display:flex;width:100%;height:100%;background:linear-gradient(90deg,#fffefd,#fffaf5);border:1.8px solid var(--ink);border-radius:20px;box-shadow:0 10px 0 #e7cfbe,0 20px 44px rgba(61,49,40,.12);overflow:hidden;position:relative}
.notebook-pages:before{content:'';position:absolute;left:50%;top:0;bottom:0;width:2px;background:linear-gradient(#dfc1b2,#f1dfd4);transform:translateX(-1px);z-index:2}
.notebook-pages:after{content:'';position:absolute;left:50%;top:14px;bottom:14px;width:26px;transform:translateX(-50%);background:repeating-linear-gradient(#fffdfb,#fffdfb 14px,#f2e5da 15px,#fffdfb 16px);border-left:1.5px solid #d6bfae;border-right:1.5px solid #d6bfae;z-index:1;border-radius:3px;box-shadow:0 0 16px rgba(74,64,54,.06)}
.page{flex:1;padding:30px 34px 46px;position:relative;z-index:3;font-family:'Yomogi',cursive;color:#3c352f}
.page.left{padding-right:48px}
.page.right{padding-left:48px}
.page h3{font-family:'Zen Maru Gothic';font-weight:700;font-size:22px;margin:0 0 13px;color:var(--ink);letter-spacing:.02em;display:inline-flex;align-items:center;gap:8px}
.page h3:after{content:'';width:42px;height:8px;border-radius:999px;background:linear-gradient(90deg,var(--petal),var(--sky));opacity:.72}
.page .line{margin:0 0 9px;font-size:19px;line-height:1.55;display:flex;align-items:flex-start}
.page .line .label{min-width:5.1em;font-family:'Zen Maru Gothic';font-weight:700;font-size:16px;color:var(--soft-ink);flex-shrink:0;padding-top:3px}
.page .line span[contenteditable]{flex:1;min-width:80px;min-height:1.55em;border-bottom:1.5px dashed transparent;padding:0 5px 1px;outline:none;border-radius:6px;transition:background .15s;display:inline-block;word-break:break-word}
.editing span[contenteditable]{border-bottom-color:#f4c2d7}
.editing span[contenteditable]:focus{background:#fff0f6;box-shadow:0 0 0 2px #f4c2d7 inset}
.page ul{list-style:none;padding:0;margin:4px 0 12px}
.page ul li{display:flex;align-items:flex-start;margin:5px 0;font-size:18px;line-height:1.48;gap:4px}
.page ul li:before{content:'・';color:var(--petal-deep);margin-right:2px}
.page ul li span[contenteditable]{flex:1;word-break:break-word}
.num-list{margin:4px 0 12px}
.num-list .item{display:flex;gap:8px;margin:5px 0;font-size:18px;line-height:1.48;align-items:flex-start}
.num-list .item span[contenteditable]{flex:1}
.hitokoto{margin-top:7px;font-size:18px;text-align:center;border:1.5px solid #efd3bf;border-radius:12px;padding:10px 14px;background:linear-gradient(180deg,#fffaf6,#fff4f7);line-height:1.48;min-height:70px;box-shadow:0 5px 0 rgba(232,212,195,.55)}
.meta{position:absolute;bottom:14px;left:0;right:0;display:flex;justify-content:space-between;gap:18px;padding:0 36px;font-family:'Yomogi';font-size:15px;color:#a08a7a}
.meta span[contenteditable]{border-bottom:1px dashed transparent;padding:0 3px;outline:none;min-width:60px;display:inline-block}
.editing .meta span[contenteditable]{border-bottom-color:#f4c2d7}
[contenteditable]:empty:before{content:attr(data-ph);color:#c4b5a9;pointer-events:none}
.photo-layer{position:absolute;left:12px;top:12px;width:116px;height:112px;border-radius:4px;overflow:hidden;background:linear-gradient(135deg,#fff5f8,#f3fbff)}
.photo-layer img{width:100%;height:100%;object-fit:cover;display:none}
.photo-layer.has-photo img{display:block}
.editing .photo-layer{pointer-events:auto;cursor:pointer}
.photo-hint{position:absolute;left:0;right:0;bottom:16px;text-align:center;font-family:'Zen Maru Gothic';font-size:13px;font-weight:700;color:#a89080;opacity:0;transition:opacity .15s}
.editing .photo-hint{opacity:1}
.window{z-index:5;filter:drop-shadow(0 14px 18px rgba(74,64,54,.08))} .poster{z-index:6;filter:drop-shadow(0 10px 12px rgba(74,64,54,.08))} .polaroid{z-index:28;filter:drop-shadow(0 12px 12px rgba(74,64,54,.12))} .badge{z-index:29;filter:drop-shadow(0 9px 10px rgba(74,64,54,.1))} .uchiwa{z-index:18;filter:drop-shadow(0 10px 10px rgba(74,64,54,.08))} .books{z-index:17;filter:drop-shadow(0 8px 9px rgba(74,64,54,.08))}
.pen{z-index:24} .washi{z-index:25} .highlighter{z-index:24} .ruler{z-index:16} .clip{z-index:17} .eraser{z-index:26} .mechpencil{z-index:26} .latte{z-index:23} .croissant{z-index:22} .icetea{z-index:18}
.accent-strip{position:absolute;left:44px;top:338px;width:188px;height:30px;z-index:19;transform:rotate(-2deg);border:1.5px solid var(--ink);border-radius:999px;background:repeating-linear-gradient(135deg,rgba(255,255,255,.75),rgba(255,255,255,.75) 10px,rgba(239,171,199,.72) 10px,rgba(239,171,199,.72) 20px);box-shadow:0 5px 0 #e8d4c3}
.date-chip{position:absolute;right:44px;top:336px;z-index:19;padding:7px 16px;border:1.5px solid var(--ink);border-radius:999px;background:#fffefc;box-shadow:0 5px 0 #d7e4ef;font-family:'Zen Maru Gothic';font-size:14px;font-weight:700;color:var(--soft-ink);letter-spacing:.08em}
.star{position:absolute;width:10px;height:10px;background:var(--butter);clip-path:polygon(50% 0,62% 35%,100% 50%,62% 65%,50% 100%,38% 65%,0 50%,38% 35%);z-index:27;filter:drop-shadow(0 2px 0 rgba(74,64,54,.12))}
.star.s1{left:236px;top:188px}.star.s2{left:820px;top:208px;background:var(--sky)}.star.s3{left:982px;top:378px;background:var(--petal)}
.slope-line{position:absolute;left:88px;top:282px;width:880px;height:78px;z-index:4;pointer-events:none}
.slope-line svg{width:100%;height:100%;display:block}
.ticket{position:absolute;left:34px;top:270px;width:168px;height:70px;z-index:18;transform:rotate(-7deg);border:1.5px solid var(--ink);border-radius:14px;background:linear-gradient(135deg,#fffefc,#fff1f7);box-shadow:0 7px 0 #e7cfbe;font-family:'Zen Maru Gothic';color:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.ticket:before,.ticket:after{content:'';position:absolute;top:27px;width:20px;height:20px;border-radius:50%;background:#fff9f2;border:1.5px solid var(--ink)}
.ticket:before{left:-11px}.ticket:after{right:-11px}
.ticket strong{font-size:18px;letter-spacing:.12em}.ticket span{font-size:10px;font-weight:700;letter-spacing:.16em;color:var(--soft-ink)}
.penlight{position:absolute;right:28px;top:500px;width:54px;height:178px;z-index:17;transform:rotate(12deg);filter:drop-shadow(0 9px 10px rgba(74,64,54,.08))}
.penlight svg{width:100%;height:100%;display:block}
.petal{position:absolute;width:18px;height:14px;background:var(--petal);border-radius:70% 20% 70% 20%;z-index:18;opacity:.8;filter:drop-shadow(0 2px 0 rgba(74,64,54,.08))}
.petal.p1{left:210px;top:88px;transform:rotate(28deg)}.petal.p2{left:882px;top:138px;transform:rotate(-22deg);background:#f5bfd4}.petal.p3{left:990px;top:790px;transform:rotate(42deg);background:#f0b6cc}.petal.p4{left:42px;top:932px;transform:rotate(-38deg);background:#f6c8d8}.petal.p5{left:520px;top:1168px;transform:rotate(18deg);background:#f0b6cc}
.field-hidden{display:none!important}
#canvas.layout-photo .notebook{left:438px!important;top:378px!important;width:586px!important;height:650px!important}
#canvas.layout-photo .notebook-pages{display:block}
#canvas.layout-photo .notebook-pages:before,#canvas.layout-photo .notebook-pages:after{display:none}
#canvas.layout-photo .page{padding:34px 38px 52px}
#canvas.layout-photo .page.right{display:none}
#canvas.layout-photo .page.left{height:100%;padding-right:42px}
#canvas.layout-photo .polaroid.photo-main{left:54px!important;top:376px!important;transform:rotate(-4deg)!important}
#canvas.layout-photo .polaroid.photo-main svg{width:360px;height:438px}
#canvas.layout-photo .polaroid.photo-main .photo-layer{left:30px;top:30px;width:300px;height:298px;border-radius:8px}
#canvas.layout-photo .polaroid.photo-main .photo-hint{bottom:44px;font-size:22px}
#canvas.layout-photo .polaroid.photo-sub{left:68px!important;top:828px!important;transform:rotate(6deg)!important}
#canvas.layout-photo .polaroid.photo-extra{left:240px!important;top:842px!important;transform:rotate(-5deg)!important}
#canvas.layout-collage .notebook{left:58px!important;top:760px!important;width:964px!important;height:344px!important}
#canvas.layout-collage .notebook-pages:before,#canvas.layout-collage .notebook-pages:after{display:none}
#canvas.layout-collage .page{padding:26px 32px 42px}
#canvas.layout-collage .page h3{font-size:20px;margin-bottom:9px}
#canvas.layout-collage .page .line,#canvas.layout-collage .page ul li,#canvas.layout-collage .num-list .item,#canvas.layout-collage .hitokoto{font-size:17px}
#canvas.layout-collage .polaroid.photo-main{left:92px!important;top:316px!important;transform:rotate(-6deg)!important}
#canvas.layout-collage .polaroid.photo-sub{left:390px!important;top:292px!important;transform:rotate(2deg)!important}
#canvas.layout-collage .polaroid.photo-extra{left:690px!important;top:316px!important;transform:rotate(7deg)!important}
#canvas.layout-collage .polaroid svg{width:250px;height:304px}
#canvas.layout-collage .polaroid .photo-layer{left:22px;top:22px;width:206px;height:200px;border-radius:6px}
#canvas.layout-collage .polaroid .photo-hint{bottom:30px;font-size:18px}
.steam{animation:steam 3.5s ease-in-out infinite}
.steam:nth-child(2){animation-delay:.6s}
.steam:nth-child(3){animation-delay:1.2s}
@keyframes steam{0%{opacity:0;transform:translateY(4px)}40%{opacity:.9}100%{opacity:0;transform:translateY(-14px)}}
#toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 26px);transform:translateX(-50%) translateY(20px);background:#3c352f;color:#fff;padding:12px 22px;border-radius:999px;display:flex;align-items:center;gap:9px;font-family:'Zen Maru Gothic';font-size:14px;font-weight:500;opacity:0;pointer-events:none;transition:all .35s cubic-bezier(.2,.8,.2,1);z-index:200;box-shadow:0 10px 30px rgba(0,0,0,.22);border:1.5px solid #4a4036}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media (max-width:480px){.toolbar{justify-content:flex-start}.toolbar button span{display:none}.toolbar button{padding:0 14px}}
@media (max-width:720px){.tool-panel{top:68px;max-width:calc(100vw - 22px);overflow:auto;justify-content:flex-start}.layout-panel{top:116px}}
</style>
</head>
<body>
<div class="app">
  <div class="toolbar">
    <button id="editBtn" class="primary"><i data-lucide="pen"></i><span>編集モード</span></button>
    <button id="layoutBtn"><i data-lucide="layout-template"></i><span>配置</span></button>
    <button id="templateBtn"><i data-lucide="sparkles"></i><span>おまかせ</span></button>
    <button id="photoBtn"><i data-lucide="image-plus"></i><span>写真</span></button>
    <button id="exportBtn"><i data-lucide="download"></i><span>書き出す</span></button>
    <button id="shareBtn"><i data-lucide="share-2"></i><span>X</span></button>
    <button id="resetBtn" class="danger"><i data-lucide="rotate-ccw"></i><span>リセット</span></button>
  </div>
  <div id="layoutPanel" class="tool-panel layout-panel" aria-hidden="true">
    <button data-layout="notebook">手帳</button>
    <button data-layout="photo">フォト大きめ</button>
    <button data-layout="collage">3枚コラージュ</button>
  </div>
  <div id="toolPanel" class="tool-panel" aria-hidden="true">
    <button data-template="live">ライブ勢</button>
    <button data-template="mv">MV語り勢</button>
    <button data-template="start">新規Buddies</button>
    <button data-template="blank">空にする</button>
  </div>
  <input id="photoInput" type="file" accept="image/*" hidden>

  <div class="canvas-viewport">
    <div class="canvas-wrap">
      <div id="canvas">
        <div class="accent-strip"></div>
        <div class="date-chip">BUDDIES PROFILE</div>
        <div class="star s1"></div>
        <div class="star s2"></div>
        <div class="star s3"></div>
        <div class="slope-line">
          <svg viewBox="0 0 835 86" fill="none" stroke-linecap="round">
            <path d="M8 72C156 32 247 68 394 36C548 3 667 29 827 10" stroke="#efabc7" stroke-width="8" opacity=".46"/>
            <path d="M16 78C164 38 255 74 402 42C556 9 675 35 819 16" stroke="#bfd6ea" stroke-width="3" opacity=".72"/>
          </svg>
        </div>
        <div class="ticket"><strong>SAKURA</strong><span>LIVE TICKET 46</span></div>
        <div class="penlight">
          <svg viewBox="0 0 58 190" fill="none" stroke="#3f352d" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 16h18l8 88H12l8-88z" fill="#fff6fb"/>
            <path d="M22 22h14l5 75H17l5-75z" fill="#efabc7" opacity=".72" stroke="none"/>
            <path d="M13 104h32l-4 70a12 12 0 0 1-24 0l-4-70z" fill="#fffefc"/>
            <path d="M20 126h18M21 144h16M22 162h14" opacity=".58"/>
            <circle cx="29" cy="174" r="4" fill="#bfd6ea"/>
          </svg>
        </div>
        <div class="petal p1"></div>
        <div class="petal p2"></div>
        <div class="petal p3"></div>
        <div class="petal p4"></div>
        <div class="petal p5"></div>

        <!-- Sakura Window -->
        <div class="obj window" style="left:340px;top:44px;width:400px;height:250px">
          <svg viewBox="0 0 400 280" fill="none" stroke="#4A4036" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="20" y="62" width="360" height="200" rx="14" fill="#fffdfb"/>
            <path d="M20 74 A180 122 0 0 1 380 74" fill="#fdf6f0"/>
            <path d="M200 74 V262"/>
            <path d="M20 162 H380"/>
            <rect x="0" y="250" width="400" height="20" rx="6" fill="#f5e9de"/>
            <g fill="#f4c2d7" stroke="none" opacity=".95">
              <path d="M62 42c3-6 10-4 8 3 6-2 8 5 2 8 3 6-4 9-8 3-6 3-9-4-3-8-6-2-2-9 3-6z"/>
              <path d="M342 52c2.5-5 8-3 6 2 4-1.5 6 4 1.5 6 1.5 4.5-3.5 7-6 2-4.5 2-7-3.5-2-6-4.5-1.5-7 2-4z"/>
              <path d="M118 22c2-4 7-3 6 2 4-1 6 3 1 5 2 4-3 6-5 2-4 2-6-3-2-5-4-1-1-6 2-4z"/>
              <path d="M280 36c2-3.5 6-2.5 5 1.5 3.5-1 5 2.5 1 4 1.5 3.5-2.5 5-4 1.5-3.5 1.5-5-2.5-1.5-4-3.5-1-1-5 1.5-3z"/>
            </g>
          </svg>
        </div>

        <!-- 46 Poster -->
        <div class="obj poster" style="left:766px;top:118px;width:112px;height:150px;transform:rotate(4deg)">
          <svg viewBox="0 0 120 160" fill="none" stroke="#4A4036" stroke-width="1.5" stroke-linecap="round">
            <rect x="4" y="4" width="112" height="152" rx="8" fill="#fff"/>
            <rect x="12" y="12" width="96" height="96" rx="4" fill="#fdf4f7"/>
            <text x="60" y="78" text-anchor="middle" font-family="Zen Maru Gothic" font-weight="700" font-size="54" fill="#4A4036" stroke="none">46</text>
            <g fill="#f4c2d7" stroke="none">
              <circle cx="32" cy="128" r="3"/><circle cx="48" cy="134" r="2.5"/><circle cx="64" cy="128" r="3.2"/><circle cx="80" cy="133" r="2.3"/>
            </g>
          </svg>
        </div>

        <!-- Books -->
        <div class="obj books" style="left:800px;top:1138px;transform:rotate(-3deg)">
          <svg width="240" height="140" viewBox="0 0 240 140" fill="none" stroke="#4A4036" stroke-width="1.5" stroke-linecap="round">
            <rect x="10" y="80" width="200" height="28" rx="5" fill="#fde7ef"/>
            <rect x="20" y="52" width="200" height="28" rx="5" fill="#fff4d6"/>
            <rect x="30" y="24" width="200" height="28" rx="5" fill="#e8f2fd"/>
            <path d="M60 24v28M50 52v28M75 80v28" stroke-width="1.3"/>
          </svg>
        </div>

        <!-- Uchiwa -->
        <div class="obj uchiwa" style="left:10px;top:514px;transform:rotate(-18deg)">
          <svg width="140" height="160" viewBox="0 0 140 160" fill="none" stroke="#4A4036" stroke-width="1.5" stroke-linecap="round">
            <rect x="64" y="110" width="12" height="42" rx="6" fill="#f5e1d0"/>
            <ellipse cx="70" cy="68" rx="60" ry="62" fill="#fffdfb"/>
            <ellipse cx="70" cy="68" rx="48" ry="50" fill="none" stroke="#f4c2d7"/>
            <text x="70" y="78" text-anchor="middle" font-family="Zen Maru Gothic" font-weight="700" font-size="38" fill="#4A4036" stroke="none">46</text>
          </svg>
        </div>

        <!-- Notebook -->
        <div class="notebook">
          <div class="notebook-pages">
            <div class="page left">
              <h3 data-section="profile">櫻坂プロフィール</h3>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
lucide.createIcons();

const storePrefix='saku_v3_';
const fields=['name','oshi','birthday','location','sanka','suki1','suki2','suki3','song1','song2','song3','hitokoto','sns','date'];
const today=new Date();
const todayText=`${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
fields.forEach(id=>{
  const el=document.getElementById(id);
  if(!el) return;
  const saved=localStorage.getItem(storePrefix+id) || localStorage.getItem('saku_v2_'+id);
  if(saved) el.textContent=saved;
  if(id==='date'&&!saved) el.textContent=todayText;
  el.addEventListener('input',()=>localStorage.setItem(storePrefix+id,el.textContent));
  el.addEventListener('blur',()=>{if(el.textContent.trim()==='')el.innerHTML=''});
});

const editBtn=document.getElementById('editBtn');
const layoutPanel=document.getElementById('layoutPanel');
const toolPanel=document.getElementById('toolPanel');
const photoInput=document.getElementById('photoInput');
const photoLayer=document.getElementById('photoLayer');
const photoPreview=document.getElementById('photoPreview');
const photoSlots=[...document.querySelectorAll('.photo-slot')];
const canvasEl=document.getElementById('canvas');
let editing=true;
let selectedPhotoSlot=0;
let currentLayout=localStorage.getItem(storePrefix+'layout')||'notebook';
document.body.classList.add('editing');

function setEditable(on){
  document.querySelectorAll('[contenteditable]').forEach(el=>{
    el.setAttribute('contenteditable',on?'true':'false');
  });
}

editBtn.addEventListener('click',()=>{
  editing=!editing;
  document.body.classList.toggle('editing',editing);
  editBtn.classList.toggle('primary',editing);
  setEditable(editing);
  layoutPanel.classList.remove('show');
  toolPanel.classList.remove('show');
});

function setPhotoSlot(slot,value){
  const target=photoSlots[slot];
  if(!target) return;
  const img=target.querySelector('img');
  if(value){
    img.src=value;
    target.classList.add('has-photo');
  }else{
    img.removeAttribute('src');
    target.classList.remove('has-photo');
  }
}

const templates={
  live:{suki1:'ライブでの表情',suki2:'煽りとMCの温度感',suki3:'パフォーマンスの余韻',song1:'承認欲求',song2:'Start over!',song3:'何歳の頃に戻りたいのか?',hitokoto:'次の現場で会えたらうれしいです'},
  mv:{suki1:'視線の作り方',suki2:'歌詞への入り込み方',suki3:'細かい仕草まで美しい',song1:'摩擦係数',song2:'桜月',song3:'五月雨よ',hitokoto:'MVを見返すたびに好きが増えます'},
  start:{suki1:'まっすぐな雰囲気',suki2:'笑顔の破壊力',suki3:'知るほど沼が深い',song1:'Start over!',song2:'BAN',song3:'Nobody’s fault',hitokoto:'まだまだ勉強中ですが仲良くしてください'}
};

const layoutFields={
  notebook:['name','oshi','birthday','location','sanka','suki1','suki2','suki3','song1','song2','song3','hitokoto','sns','date'],
  photo:['name','oshi','suki1','hitokoto','sns','date'],
  collage:['name','oshi','sanka','song1','song2','song3','sns','date']
};

const layoutSections={
  notebook:['profile','points','songs','message'],
  photo:['profile','points','message'],
  collage:['profile','songs']
};

function applyLayout(layout){
  currentLayout=layoutFields[layout]?layout:'notebook';
  canvasEl.classList.remove('layout-notebook','layout-photo','layout-collage');
  canvasEl.classList.add(`layout-${currentLayout}`);
  localStorage.setItem(storePrefix+'layout',currentLayout);
  const visibleFields=new Set(layoutFields[currentLayout]);
  const visibleSections=new Set(layoutSections[currentLayout]);
  document.querySelectorAll('[data-field]').forEach(el=>{
    el.classList.toggle('field-hidden',!visibleFields.has(el.dataset.field));
  });
  document.querySelectorAll('[data-section]').forEach(el=>{
    el.classList.toggle('field-hidden',!visibleSections.has(el.dataset.section));
  });
  document.querySelectorAll('[data-layout]').forEach(btn=>{
    btn.classList.toggle('primary',btn.dataset.layout===currentLayout);
  });
}

document.getElementById('layoutBtn').addEventListener('click',()=>{
  layoutPanel.classList.toggle('show');
  toolPanel.classList.remove('show');
  layoutPanel.setAttribute('aria-hidden',layoutPanel.classList.contains('show')?'false':'true');
});

layoutPanel.addEventListener('click',e=>{
  const btn=e.target.closest('[data-layout]');
  if(!btn) return;
  applyLayout(btn.dataset.layout);
  layoutPanel.classList.remove('show');
  showToast('配置テンプレートを変更しました');
});

function writeField(id,value){
  const el=document.getElementById(id);
  if(!el) return;
  el.textContent=value;
  localStorage.setItem(storePrefix+id,value);
}

document.getElementById('templateBtn').addEventListener('click',()=>{
  toolPanel.classList.toggle('show');
  layoutPanel.classList.remove('show');
  toolPanel.setAttribute('aria-hidden',toolPanel.classList.contains('show')?'false':'true');
});
applyLayout(currentLayout);

photoSlots.forEach((slot,index)=>{
  const saved=localStorage.getItem(storePrefix+'photo_'+index) || (index===0?localStorage.getItem(storePrefix+'photo'):null);
  setPhotoSlot(index,saved);
  slot.addEventListener('click',()=>{
    if(!editing) return;
    selectedPhotoSlot=index;
    photoInput.click();
  });
});

toolPanel.addEventListener('click',e=>{
  const btn=e.target.closest('[data-template]');
  if(!btn) return;
  const key=btn.dataset.template;
  if(key==='blank'){
    fields.forEach(id=>writeField(id,id==='date'?todayText:''));
    showToast('入力欄を空にしました');
  }else{
    Object.entries(templates[key]).forEach(([id,value])=>writeField(id,value));
    showToast('テンプレを入れました');
  }
  toolPanel.classList.remove('show');
});

document.getElementById('photoBtn').addEventListener('click',()=>photoInput.click());
photoInput.addEventListener('change',()=>{
  const file=photoInput.files&&photoInput.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    setPhotoSlot(selectedPhotoSlot,reader.result);
    localStorage.setItem(storePrefix+'photo_'+selectedPhotoSlot,reader.result);
    if(selectedPhotoSlot===0) localStorage.setItem(storePrefix+'photo',reader.result);
    showToast('写真を入れました');
  };
  reader.readAsDataURL(file);
});

function updateScale(){
  const vh=window.visualViewport?window.visualViewport.height:window.innerHeight;
  const vw=window.innerWidth;
  const scale=Math.min(1,(vh*0.88)/1350,(vw*0.96)/1080);
  const wrap=document.querySelector('.canvas-wrap');
  wrap.style.transform=`scale(${scale})`;
  document.querySelector('.canvas-viewport').style.height=`${1350*scale+40}px`;
}
window.addEventListener('resize',updateScale);
if(window.visualViewport)window.visualViewport.addEventListener('resize',updateScale);
updateScale();

document.addEventListener('focusin',e=>{
  if(e.target.isContentEditable){
    setTimeout(()=>{
      const r=e.target.getBoundingClientRect();
      const topOff=document.querySelector('.toolbar').offsetHeight+20;
      if(r.top<topOff||r.bottom>window.innerHeight-30){
        e.target.scrollIntoView({behavior:'smooth',block:'center'});
      }
    },350);
  }
});

function showToast(message='保存完了'){
  const t=document.getElementById('toast');
  t.querySelector('span').textContent=message;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

async function renderProfile(){
  const wasEditing=document.body.classList.contains('editing');
  document.body.classList.remove('editing');
  layoutPanel.classList.remove('show');
  toolPanel.classList.remove('show');
  const canvasEl=document.getElementById('canvas');
  const wrap=document.querySelector('.canvas-wrap');
  const prev=wrap.style.transform;
  wrap.style.transform='scale(1)';
  await new Promise(r=>setTimeout(r,50));
  const out=await html2canvas(canvasEl,{width:1080,height:1350,scale:3,backgroundColor:'#fffaf7',useCORS:true,logging:false});
  wrap.style.transform=prev;
  if(wasEditing)document.body.classList.add('editing');
  return new Promise(resolve=>out.toBlob(resolve,'image/png'));
}

document.getElementById('exportBtn').addEventListener('click',async()=>{
  const blob=await renderProfile();
  if(!blob) return;
  {
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='sakurazaka-profile-v2.png';a.click();
    URL.revokeObjectURL(url);
    showToast('画像を書き出しました');
  }
});

document.getElementById('shareBtn').addEventListener('click',async()=>{
  const text='推しプロフィール作りました #櫻坂46 #BUDDIES #推し活';
  if(navigator.canShare&&navigator.share){
    const blob=await renderProfile();
    if(blob){
      const file=new File([blob],'sakurazaka-profile.png',{type:'image/png'});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file],text}).catch(()=>{});
        return;
      }
    }
  }
  const encoded=encodeURIComponent(text);
  window.open(`https://twitter.com/intent/tweet?text=${encoded}`,'_blank','noopener');
});

document.getElementById('resetBtn').addEventListener('click',()=>{
  if(!confirm('入力内容と写真をリセットしますか？')) return;
  fields.forEach(id=>writeField(id,id==='date'?todayText:''));
  localStorage.removeItem(storePrefix+'photo');
  photoSlots.forEach((_,index)=>localStorage.removeItem(storePrefix+'photo_'+index));
  photoSlots.forEach((_,index)=>setPhotoSlot(index,''));
  showToast('リセットしました');
});

// prevent pull to refresh bounce on iOS
document.body.addEventListener('touchmove',e=>{if(e.touches.length>1)e.preventDefault()},{passive:false});
</script>
