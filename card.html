<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Buddies プロフィールカード</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
[hidden]{display:none!important}
:root{--ink:#231b19;--muted:#786d66;--paper:#fff9f3;--line:#eadbd0;--pink:#f2b5cf;--pink-deep:#d98fb0;--sky:#c7dff0;--mint:#d8eadf;--butter:#f7e4a6;--profile-font:"Hannotate SC","Tsukushi A Round Gothic","YuKyokasho","Hiragino Maru Gothic ProN","Yu Gothic","YuGothic","Hiragino Kaku Gothic ProN",Meiryo,sans-serif}
body{margin:0;min-height:100dvh;background:#f7f7f7;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;padding:14px 14px 96px}
.toolbar{position:fixed;left:0;right:0;bottom:0;z-index:20;padding:10px 14px calc(12px + env(safe-area-inset-bottom));background:rgba(255,255,255,.9);backdrop-filter:blur(16px);border-top:1px solid #eee;display:flex;gap:8px;justify-content:center}
.btn{height:44px;border-radius:9999px;border:1px solid #ddd;background:#fff;color:#111;font:700 14px inherit;padding:0 16px;display:inline-flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;min-width:0}
.btn.primary{background:#111;color:#fff;border-color:#111}
.btn svg{width:16px;height:16px;flex-shrink:0}
.stage{width:min(100%,980px);margin:0 auto;display:grid;gap:12px;justify-items:center}
.hint{font-size:12px;color:#777;text-align:center;line-height:1.6}
.card-wrap{width:100%;padding:6px 0 12px;display:flex;justify-content:center;overflow:hidden}
#profile-card{width:1200px;height:630px;flex:0 0 auto;position:relative;overflow:hidden;background:#fff9f3 url("assets/profile-card-base.svg") center/100% 100% no-repeat;transform-origin:top center;box-shadow:0 12px 36px rgba(0,0,0,.10)}
.wash-pink,.wash-sky,.brand,.badge,.book,.rule,.ticket,.tape,.mini-stamp,.memo-dot,.petal{display:none}
.polaroid{position:absolute;left:88px;top:120px;width:222px;height:286px;background:transparent;border:0;z-index:5;padding:0;transform:rotate(-3deg);box-shadow:none}
.photo{width:222px;height:222px;background:transparent;display:grid;place-items:center;overflow:hidden;border:0}
.avatar{width:182px;height:182px;border-radius:50%;background:rgba(242,181,207,.84);border:5px solid #fff;box-shadow:0 0 0 2px rgba(217,143,176,.55);display:grid;place-items:center;font-size:62px;font-weight:850;color:var(--ink);overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover;object-position:top center}
.caption{text-align:center;margin-top:28px;color:#9a706d;font-size:13px;font-weight:750;line-height:1.15;text-shadow:0 1px 0 #fff;font-family:var(--profile-font)}
.label{position:absolute;color:#d98fb0;font-weight:850;font-size:15px;line-height:1;letter-spacing:0;text-shadow:0 1px 0 #fff}
.label::before{content:"";position:absolute;left:-9px;top:50%;width:5px;height:5px;border-radius:50%;background:#e7a6c0;transform:translateY(-50%)}
.name-label{left:356px;top:145px}
.name{position:absolute;left:356px;top:178px;width:172px;height:45px;font-size:20px;font-weight:850;line-height:1.18;letter-spacing:0;white-space:normal;word-break:keep-all;overflow-wrap:anywhere;overflow:hidden;color:var(--ink);font-family:var(--profile-font)}
.oshi-label{left:356px;top:307px}
.oshi-list{position:absolute;left:356px;top:340px;width:172px;height:48px;display:flex;gap:7px;align-content:flex-start;flex-wrap:wrap;overflow:hidden;font-family:var(--profile-font)}
.chip{display:inline-flex;align-items:center;max-width:100%;min-height:24px;border-radius:9999px;padding:4px 10px;background:rgba(35,27,25,.92);color:#fff;font-size:12px;font-weight:800;line-height:1;white-space:nowrap;box-shadow:0 1px 0 rgba(0,0,0,.10)}
.profile-label{left:356px;top:433px}
.meta{position:absolute;left:356px;top:464px;width:172px;height:27px;font-size:12px;line-height:1.35;font-weight:750;white-space:normal;overflow-wrap:anywhere;overflow:hidden;color:var(--ink);font-family:var(--profile-font)}
.songs-label{left:684px;top:132px}
.song-list{position:absolute;left:684px;top:166px;width:312px;display:grid;gap:7px;font-family:var(--profile-font)}
.song{display:grid;grid-template-columns:21px 1fr;align-items:center;gap:10px;min-height:23px}
.song-no{width:20px;height:20px;border-radius:50%;display:grid;place-items:center;background:rgba(199,223,240,.92);font-size:11px;font-weight:850;color:#211816}
.song:nth-child(1) .song-no{background:var(--pink)}.song:nth-child(3) .song-no{background:var(--mint)}
.song-title{font-size:14px;font-weight:750;line-height:1.12;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.empty-songs{width:300px;min-height:38px;border:0;border-radius:0;background:transparent;display:grid;place-items:center;color:var(--muted);font-size:13px;font-weight:750}
.bio-label{left:684px;top:316px}
.bio{position:absolute;left:684px;top:350px;width:312px;height:42px;border:0;border-radius:0;background:transparent;padding:0 2px;font-size:10px;font-weight:650;line-height:1.48;overflow:hidden;overflow-wrap:anywhere;color:var(--ink);font-family:var(--profile-font)}
.tags{position:absolute;left:684px;top:468px;width:312px;height:42px;display:flex;gap:7px;flex-wrap:wrap;overflow:hidden;align-content:center;font-family:var(--profile-font)}
.tag{display:inline-flex;align-items:center;min-height:24px;border-radius:9999px;padding:4px 10px;background:rgba(247,228,166,.92);font-size:12px;font-weight:800;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis;color:var(--ink);box-shadow:0 1px 0 rgba(234,190,92,.28)}
.footer{display:none}.footer-brand{display:none}
.loading,.error{min-height:60vh;display:grid;place-items:center;color:#777;text-align:center;line-height:1.8}
@media (max-width:720px){body{padding:10px 10px 96px}.toolbar{justify-content:stretch}.btn{flex:1;padding:0 10px;font-size:13px}.btn span{display:none}.hint{display:none}}
</style>
</head>
<body>
<div class="stage">
  <div class="hint">表示されたプロフィールカードを保存・共有できます。画像はブラウザで生成するため日本語が崩れにくくなっています。</div>
  <div id="state" class="loading">読み込み中...</div>
  <div class="card-wrap" id="card-wrap" hidden>
    <div id="profile-card">
      <div class="wash-pink"></div><div class="wash-sky"></div>
      <div class="brand">SAKURAZAKA 46</div><div class="badge">BUDDIES PROFILE</div>
      <div class="tape tape-left"></div><div class="tape tape-right"></div><div class="mini-stamp">46<br>NOTE</div>
      <div class="memo-dot d1"></div><div class="memo-dot d2"></div><div class="memo-dot d3"></div><div class="memo-dot d4"></div>
      <div class="book">
        <div class="rule r1"></div><div class="rule r2"></div><div class="rule r3"></div><div class="rule r4"></div><div class="rule r5"></div><div class="rule r6"></div><div class="rule r7"></div><div class="rule r8"></div><div class="rule r9"></div><div class="rule r10"></div><div class="rule r11"></div><div class="rule r12"></div><div class="rule r13"></div>
      </div>
      <div class="ticket">SAKURA</div>
      <div class="polaroid"><div class="photo"><div class="avatar" id="avatar"></div></div><div class="caption">Buddies profile</div></div>
      <div class="label name-label">名前</div><div class="name" id="name"></div>
      <div class="label oshi-label">推しメン</div><div class="oshi-list" id="oshis"></div>
      <div class="label profile-label">プロフィール</div><div class="meta" id="meta"></div>
      <div class="label songs-label" id="songs-label">好きな曲</div><div class="song-list" id="songs"></div>
      <div class="label bio-label">ひとこと</div><div class="bio" id="bio"></div>
      <div class="tags" id="tags"></div>
      <div class="footer-brand">Buddies</div>
      <div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div>
    </div>
  </div>
</div>
<div class="toolbar">
  <button class="btn" onclick="history.length>1?history.back():location.href='./'"><i data-lucide="chevron-left"></i><span>戻る</span></button>
  <button class="btn primary" onclick="saveCard()"><i data-lucide="download"></i><span>保存</span></button>
  <button class="btn" onclick="shareCard()"><i data-lucide="share"></i><span>共有</span></button>
</div>
<script>
const API = './api.php';
const MEMBER_DATA = '../data/member.json';
let profile = null;
let members = {};

function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function qs(k){return new URLSearchParams(location.search).get(k);}
function getDisplayName(p){return p.display_name || p.name || '名無し';}
function getOshis(p){return [p.oshi_member,p.oshi_member_2,p.oshi_member_3].filter(Boolean);}
function getAvatarUrl(p){const first=p.oshi_member;return p.user_icon || (first && members[first] && members[first].image) || '';}
function proxiedImageUrl(url){
  if (!url || url.startsWith('data:') || url.startsWith('blob:')) return url;
  if (location.protocol === 'file:') return url;
  return 'image-proxy.php?url=' + encodeURIComponent(url);
}
function fitText(el, max, min){
  el.style.fontSize = max + 'px';
  let size = max;
  while ((el.scrollWidth > el.clientWidth || el.scrollHeight > el.clientHeight) && size > min) {
    size -= 1;
    el.style.fontSize = size + 'px';
  }
}
function updateScale(){
  const card = document.getElementById('profile-card');
  const wrap = document.getElementById('card-wrap');
  if (!card || !wrap || wrap.hidden) return;
  const scale = Math.min(1, (window.innerWidth - 20) / 1200, (window.innerHeight - 132) / 630);
  card.style.transform = `scale(${Math.max(0.28, scale)})`;
  wrap.style.height = `${630 * Math.max(0.28, scale) + 20}px`;
}
function cardUrl(){
  return location.origin + location.pathname.replace(/[^/]*$/, '') + 'profile.php?uid=' + encodeURIComponent(profile.id);
}
function truncate(s,n){s=String(s||'');return s.length>n?s.slice(0,n-1)+'…':s;}

async function loadProfile(){
  const uid = qs('uid');
  try {
    members = JSON.parse(sessionStorage.getItem('buddies_card_members') || localStorage.getItem('buddies_card_members') || '{}') || {};
  } catch(e) {}
  try {
    const res = await fetch(MEMBER_DATA + '?_=' + Date.now());
    const raw = await res.json();
    const arr = Array.isArray(raw) ? raw : Object.values(raw);
    arr.forEach(m => { members[m.name] = m; });
  } catch(e) {}

  try {
    const res = await fetch(API + '?action=buddies_profile_get&user_id=' + encodeURIComponent(uid || ''), { credentials:'include' });
    const json = await res.json();
    if (json.ok && json.data) profile = json.data;
  } catch(e) {}
  if (!profile) {
    try {
      const cached = JSON.parse(sessionStorage.getItem('buddies_card_profile') || localStorage.getItem('buddies_card_profile_' + uid) || 'null');
      if (cached && (!uid || String(cached.id) === String(uid))) profile = cached;
    } catch(e) {}
  }
  if (!profile && uid === 'demo') {
    profile = {
      id: 'demo',
      username: 'sample',
      display_name: 'サンプルさん長めの名前',
      oshi_member: '藤吉 夏鈴',
      oshi_member_2: '山崎 天',
      oshi_member_3: null,
      user_icon: null,
      age: 24,
      location: '東京都',
      buddies_since: '2020',
      bio: 'ライブと写真が好きです。同じ推しのBuddiesとつながりたいです。長い文章でも枠に収めます。',
      tags: ['ライブ参戦', '写真交換OK', '関東勢'],
      favorite_songs: ['Start over!', '静寂の暴力', '何歳の頃に戻りたいのか？'],
      sns_links: [],
      follow_stance: null
    };
  }
  if (!profile) throw new Error('プロフィールを読み込めませんでした');
}

function render(){
  document.getElementById('state').hidden = true;
  document.getElementById('card-wrap').hidden = false;
  const name = getDisplayName(profile);
  const avatar = document.getElementById('avatar');
  const avatarUrl = getAvatarUrl(profile);
  avatar.innerHTML = avatarUrl ? `<img src="${esc(proxiedImageUrl(avatarUrl))}" crossorigin="anonymous" alt="">` : esc(name[0] || '？');

  const nameEl = document.getElementById('name');
  nameEl.textContent = name;

  const oshis = getOshis(profile);
  document.getElementById('oshis').innerHTML = oshis.length
    ? oshis.map(o=>`<span class="chip">${esc(truncate(o,10))}</span>`).join('')
    : '<span class="chip">まだ内緒</span>';

  const meta = [profile.location, profile.age ? profile.age + '歳' : '', profile.buddies_since ? profile.buddies_since + '年から' : ''].filter(Boolean).join(' / ');
  document.getElementById('meta').textContent = meta || 'Buddies profile';

  const songs = (profile.favorite_songs || []).filter(Boolean).slice(0,4);
  document.getElementById('songs-label').textContent = '好きな曲';
  document.getElementById('songs').innerHTML = songs.length
    ? songs.map((s,i)=>`<div class="song"><span class="song-no">${i+1}</span><span class="song-title">${esc(s)}</span></div>`).join('')
    : '<div class="empty-songs">プロフィールでチェック</div>';

  document.getElementById('bio').textContent = profile.bio || '同じ推しのBuddiesとつながりたいです。';
  document.getElementById('tags').innerHTML = (profile.tags || []).filter(Boolean).slice(0,2).map(t=>`<span class="tag">#${esc(t)}</span>`).join('');

  fitText(nameEl, 20, 11);
  fitText(document.getElementById('meta'), 12, 8);
  fitText(document.getElementById('bio'), 10, 7);
  document.querySelectorAll('.song-title').forEach(el => fitText(el, 14, 9));
  updateScale();
}

async function renderBlobWithSvg(){
  const el = document.getElementById('profile-card');
  const styles = [...document.querySelectorAll('style')].map(s=>s.textContent).join('\n');
  const html = `<style>${styles}</style>${el.outerHTML.replace(/transform:[^;"]+;?/g, '')}`;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630"><foreignObject width="1200" height="630"><div xmlns="http://www.w3.org/1999/xhtml">${html}</div></foreignObject></svg>`;
  const url = URL.createObjectURL(new Blob([svg], {type:'image/svg+xml;charset=utf-8'}));
  try {
    const img = new Image();
    img.decoding = 'async';
    img.src = url;
    await new Promise((resolve, reject) => { img.onload = resolve; img.onerror = reject; });
    const canvas = document.createElement('canvas');
    canvas.width = 1200;
    canvas.height = 630;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff9f3';
    ctx.fillRect(0, 0, 1200, 630);
    ctx.drawImage(img, 0, 0);
    return await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
  } finally {
    URL.revokeObjectURL(url);
  }
}

async function renderBlob(){
  const el = document.getElementById('profile-card');
  const prev = el.style.transform;
  el.style.transform = 'none';
  await document.fonts.ready.catch(()=>{});
  try {
    if (window.html2canvas) {
      const canvas = await html2canvas(el, { width:1200, height:630, scale:2, backgroundColor:'#fff9f3', useCORS:true, logging:false });
      return await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    }
    return await renderBlobWithSvg();
  } finally {
    el.style.transform = prev;
  }
}

async function saveCard(){
  try {
    const blob = await renderBlob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'buddies-profile-card.png';
    a.click();
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
  } catch(e) { alert(e.message || '保存に失敗しました'); }
}

async function shareCard(){
  try {
    const blob = await renderBlob();
    const file = new File([blob], 'buddies-profile-card.png', { type:'image/png' });
    const text = `${getDisplayName(profile)}のBuddiesプロフィール`;
    if (navigator.canShare && navigator.canShare({ files:[file] })) {
      await navigator.share({ files:[file], text, url:cardUrl() });
    } else if (navigator.share) {
      await navigator.share({ title:text, text, url:cardUrl() });
    } else {
      await navigator.clipboard.writeText(cardUrl());
      alert('プロフィールURLをコピーしました');
    }
  } catch(e) {}
}

(async()=>{
  try {
    await loadProfile();
    render();
    if (window.lucide) lucide.createIcons();
  } catch(e) {
    const state = document.getElementById('state');
    state.className = 'error';
    state.textContent = e.message || 'プロフィールを読み込めませんでした';
  }
})();
window.addEventListener('resize', updateScale);
</script>
</body>
</html>
