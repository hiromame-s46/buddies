<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>アカウント設定 — Buddies</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--black:#000;--gray:#666;--light:#f5f5f5;--border:#ddd;--eee:#eee;--danger:#e53e3e;--success:#38a169;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;background:#f7f7f7;color:#111;line-height:1.5;}
.container{max-width:560px;margin:0 auto;min-height:100vh;background:#fff;padding:0 16px 80px;}

/* ヘッダー */
.header{display:flex;align-items:center;gap:12px;padding:20px 0 12px;border-bottom:1px solid var(--eee);}
.back-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:#333;text-decoration:none;}
.back-btn svg{width:18px;height:18px;}
.header-title{font-size:18px;font-weight:800;letter-spacing:-0.3px;}
.header-user{font-size:12px;color:#999;font-weight:500;}
.logout-header-btn{margin-left:auto;display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:9999px;border:1px solid #fed7d7;background:#fff;color:var(--danger);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap;}
.logout-header-btn:hover{background:#fff5f5;}
.logout-header-btn svg{width:14px;height:14px;flex-shrink:0;}

/* セクション */
.section{margin-top:28px;}
.section-title{font-size:11px;font-weight:700;color:#999;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;}
.card{background:#fff;border:1px solid var(--eee);border-radius:20px;padding:20px;margin-bottom:12px;}

/* フォーム */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.field:last-of-type{margin-bottom:0;}
.field label{font-size:12px;font-weight:600;color:#666;}
.field input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:12px;font-size:14px;background:#fff;outline:none;transition:border .2s;font-family:inherit;color:#000;-webkit-appearance:none;appearance:none;}
.field input:focus{border-color:#000;}
.field input:disabled{background:#f9f9f9;color:#999;cursor:not-allowed;}

/* エラー・成功メッセージ */
.msg{font-size:12px;font-weight:600;padding:10px 14px;border-radius:10px;display:none;margin-top:10px;}
.msg.error{background:#fff5f5;color:var(--danger);border:1px solid #fed7d7;}
.msg.success{background:#f0fff4;color:var(--success);border:1px solid #c6f6d5;}

/* パスワード入力欄ラッパー */
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:44px;}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#999;padding:4px;display:flex;}
.pw-toggle svg{width:18px;height:18px;}

/* ボタン */
.btn{width:100%;padding:13px;border-radius:12px;font-size:14px;font-weight:700;border:none;cursor:pointer;transition:all .15s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn:active{transform:scale(0.98);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:#000;color:#fff;}
.btn-outline{background:#fff;color:#000;border:1px solid var(--border);}
.btn-danger{background:#fff;color:var(--danger);border:1px solid #fed7d7;}
.btn-danger:hover{background:#fff5f5;}

/* 確認モーダル */
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;padding:0;}
@media(min-width:480px){.modal-overlay{align-items:center;padding:20px;}}
.modal-card{background:#fff;width:100%;max-width:480px;border-radius:24px 24px 0 0;padding:28px 24px 36px;}
@media(min-width:480px){.modal-card{border-radius:24px;padding:32px 28px;}}
.modal-title{font-size:18px;font-weight:800;margin-bottom:8px;}
.modal-body{font-size:14px;color:#555;line-height:1.6;margin-bottom:24px;}
.modal-body strong{color:#000;font-weight:700;}
.modal-actions{display:flex;flex-direction:column;gap:10px;}
.modal-warn{font-size:12px;color:var(--danger);background:#fff5f5;border:1px solid #fed7d7;border-radius:10px;padding:10px 14px;margin-bottom:16px;display:none;}

/* ローディング */
.page-loading{display:flex;align-items:center;justify-content:center;height:100vh;font-size:14px;color:#999;}

/* トースト */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#111;color:#fff;padding:10px 20px;border-radius:9999px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:all .25s;z-index:200;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(min-width:560px){
  .container{padding:0 24px 80px;}
  .header{padding:28px 0 16px;}
  .header-title{font-size:22px;}
  .section{margin-top:32px;}
  .card{padding:24px;}
}
</style>
</head>
<body>

<div id="page-loading" class="page-loading">読み込み中…</div>

<div id="main" class="container" style="display:none;">
  <div class="header">
    <a id="back-btn" href="../" class="back-btn" aria-label="戻る">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </a>
    <div>
      <div class="header-title">アカウント設定</div>
      <div class="header-user" id="header-username"></div>
    </div>
    <button class="logout-header-btn" onclick="confirmLogout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      ログアウト
    </button>
  </div>

  <!-- ユーザー名変更 -->
  <div class="section">
    <div class="section-title">ユーザー名</div>
    <div class="card">
      <div class="field">
        <label>現在のユーザー名</label>
        <input type="text" id="current-username-display" disabled>
      </div>
      <div class="field">
        <label>新しいユーザー名 <span style="font-size:11px;color:#999;font-weight:400;">（半角英数字・_ 、3〜32文字）</span></label>
        <input type="text" id="new-username" placeholder="new_username" autocapitalize="none" autocomplete="username" spellcheck="false" maxlength="32">
      </div>
      <div class="field">
        <label>現在のパスワード（確認）</label>
        <div class="pw-wrap">
          <input type="password" id="username-change-password" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="pw-toggle" onclick="togglePw('username-change-password', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="msg" id="username-msg"></div>
      <div style="margin-top:16px;">
        <button class="btn btn-primary" id="username-btn" onclick="confirmUsernameChange()">ユーザー名を変更</button>
      </div>
    </div>
  </div>

  <!-- パスワード変更 -->
  <div class="section">
    <div class="section-title">パスワード</div>
    <div class="card">
      <div class="field">
        <label>現在のパスワード</label>
        <div class="pw-wrap">
          <input type="password" id="pw-current" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="pw-toggle" onclick="togglePw('pw-current', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="field">
        <label>新しいパスワード <span style="font-size:11px;color:#999;font-weight:400;">（8文字以上）</span></label>
        <div class="pw-wrap">
          <input type="password" id="pw-new" placeholder="••••••••" autocomplete="new-password">
          <button type="button" class="pw-toggle" onclick="togglePw('pw-new', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="field">
        <label>新しいパスワード（確認）</label>
        <div class="pw-wrap">
          <input type="password" id="pw-new2" placeholder="••••••••" autocomplete="new-password">
          <button type="button" class="pw-toggle" onclick="togglePw('pw-new2', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="msg" id="pw-msg"></div>
      <div style="margin-top:16px;">
        <button class="btn btn-primary" id="pw-btn" onclick="confirmPasswordChange()">パスワードを変更</button>
      </div>
    </div>
  </div>

</div>

<!-- ── 確認モーダル ── -->
<div class="modal-overlay" id="confirm-modal" style="display:none;" onclick="if(event.target===this)closeConfirm()">
  <div class="modal-card">
    <div class="modal-title" id="confirm-title"></div>
    <div class="modal-body" id="confirm-body"></div>
    <div class="modal-warn" id="confirm-warn"></div>
    <div class="modal-actions">
      <button class="btn" id="confirm-ok-btn" onclick="executeConfirm()"></button>
      <button class="btn btn-outline" onclick="closeConfirm()">キャンセル</button>
    </div>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
const API = '../api.php';
let me = null;
let pendingAction = null;

// 遷移元に応じた戻り先・ログアウト後のリダイレクト先
const FROM        = new URLSearchParams(location.search).get('from');
const BACK_URL    = FROM === 'sakulabo' ? '/satellite/sakulabo/mypage/'  : '../';
const LOGOUT_URL  = FROM === 'sakulabo' ? '/satellite/sakulabo/mypage/'  : '../';

// ── 初期化 ─────────────────────────────────────────────
async function init() {
  // 戻るボタンのリンクを遷移元に合わせる
  document.getElementById('back-btn').href = BACK_URL;

  try {
    const res  = await fetch(API + '?action=auth_me', { credentials: 'include' });
    const json = await res.json();
    if (!json.ok || !json.data) {
      location.href = BACK_URL;
      return;
    }
    me = json.data;
    document.getElementById('header-username').textContent = '@' + me.username;
    document.getElementById('current-username-display').value = me.username;
  } catch(e) {
    location.href = BACK_URL;
    return;
  }
  document.getElementById('page-loading').style.display = 'none';
  document.getElementById('main').style.display = 'block';
}

// ── パスワード表示切り替え ──────────────────────────────
function togglePw(inputId, btn) {
  const inp = document.getElementById(inputId);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.innerHTML = show
    ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
}

// ── メッセージ表示 ──────────────────────────────────────
function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
  if (type === 'success') setTimeout(() => { el.style.display = 'none'; }, 3000);
}
function hideMsg(id) { document.getElementById(id).style.display = 'none'; }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ── 確認モーダル ────────────────────────────────────────
function openConfirm({ title, body, warnText, okLabel, okClass, action }) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-body').innerHTML    = body;
  const warn = document.getElementById('confirm-warn');
  if (warnText) { warn.textContent = warnText; warn.style.display = 'block'; }
  else           { warn.style.display = 'none'; }
  const okBtn = document.getElementById('confirm-ok-btn');
  okBtn.textContent = okLabel;
  okBtn.className   = 'btn ' + (okClass || 'btn-primary');
  pendingAction = action;
  document.getElementById('confirm-modal').style.display = 'flex';
}
function closeConfirm() {
  document.getElementById('confirm-modal').style.display = 'none';
  pendingAction = null;
}
async function executeConfirm() {
  if (!pendingAction) return;
  const fn = pendingAction;
  closeConfirm();
  await fn();
}

// ── ユーザー名変更 ──────────────────────────────────────
function confirmUsernameChange() {
  hideMsg('username-msg');
  const newName = document.getElementById('new-username').value.trim();
  const pw      = document.getElementById('username-change-password').value;
  if (!newName) { showMsg('username-msg', '新しいユーザー名を入力してください。', 'error'); return; }
  if (!/^[a-zA-Z0-9_]{3,32}$/.test(newName)) { showMsg('username-msg', 'ユーザー名は3〜32文字の半角英数字・アンダースコアで入力してください。', 'error'); return; }
  if (!pw) { showMsg('username-msg', 'パスワードを入力してください。', 'error'); return; }
  if (newName === me.username) { showMsg('username-msg', '現在と同じユーザー名です。', 'error'); return; }

  openConfirm({
    title: 'ユーザー名を変更しますか？',
    body: `<strong>@${escHtml(me.username)}</strong> → <strong>@${escHtml(newName)}</strong> に変更します。<br><br>SakuLabo を含む全サービスのログインに使用するユーザー名が変わります。`,
    warnText: '変更後は新しいユーザー名でログインしてください。',
    okLabel: 'ユーザー名を変更する',
    okClass: 'btn-primary',
    action: doUsernameChange,
  });
}

async function doUsernameChange() {
  const btn = document.getElementById('username-btn');
  btn.disabled = true;
  hideMsg('username-msg');
  try {
    const res  = await fetch(API + '?action=auth_username_change', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        new_username:     document.getElementById('new-username').value.trim(),
        current_password: document.getElementById('username-change-password').value,
      }),
    });
    const json = await res.json();
    if (json.ok) {
      me.username = json.data.username;
      document.getElementById('current-username-display').value = me.username;
      document.getElementById('header-username').textContent     = '@' + me.username;
      document.getElementById('new-username').value              = '';
      document.getElementById('username-change-password').value  = '';
      showMsg('username-msg', 'ユーザー名を変更しました。', 'success');
      toast('ユーザー名を変更しました');
    } else {
      showMsg('username-msg', json.error, 'error');
    }
  } catch(e) { showMsg('username-msg', '通信エラーが発生しました。', 'error'); }
  btn.disabled = false;
}

// ── パスワード変更 ──────────────────────────────────────
function confirmPasswordChange() {
  hideMsg('pw-msg');
  const current = document.getElementById('pw-current').value;
  const newPw   = document.getElementById('pw-new').value;
  const newPw2  = document.getElementById('pw-new2').value;
  if (!current) { showMsg('pw-msg', '現在のパスワードを入力してください。', 'error'); return; }
  if (!newPw)   { showMsg('pw-msg', '新しいパスワードを入力してください。', 'error'); return; }
  if (newPw.length < 8) { showMsg('pw-msg', 'パスワードは8文字以上で入力してください。', 'error'); return; }
  if (newPw !== newPw2) { showMsg('pw-msg', '新しいパスワードが一致しません。', 'error'); return; }

  openConfirm({
    title: 'パスワードを変更しますか？',
    body: 'パスワードを新しいものに変更します。<br><br>SakuLabo を含む全サービスのパスワードが変わります。',
    warnText: '変更後は新しいパスワードでログインしてください。',
    okLabel: 'パスワードを変更する',
    okClass: 'btn-primary',
    action: doPasswordChange,
  });
}

async function doPasswordChange() {
  const btn = document.getElementById('pw-btn');
  btn.disabled = true;
  hideMsg('pw-msg');
  try {
    const res  = await fetch(API + '?action=auth_password_change', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        current_password: document.getElementById('pw-current').value,
        new_password:     document.getElementById('pw-new').value,
      }),
    });
    const json = await res.json();
    if (json.ok) {
      document.getElementById('pw-current').value = '';
      document.getElementById('pw-new').value     = '';
      document.getElementById('pw-new2').value    = '';
      showMsg('pw-msg', 'パスワードを変更しました。', 'success');
      toast('パスワードを変更しました');
    } else {
      showMsg('pw-msg', json.error, 'error');
    }
  } catch(e) { showMsg('pw-msg', '通信エラーが発生しました。', 'error'); }
  btn.disabled = false;
}

// ── ログアウト ─────────────────────────────────────────
function confirmLogout() {
  openConfirm({
    title: 'ログアウトしますか？',
    body: 'このデバイスからサインアウトします。',
    okLabel: 'ログアウト',
    okClass: 'btn-danger',
    action: doLogout,
  });
}

async function doLogout() {
  await fetch(API + '?action=auth_logout', { method: 'POST', credentials: 'include' });
  location.href = LOGOUT_URL;
}

// ── ユーティリティ ─────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('confirm-modal').style.display !== 'none') closeConfirm();
});

init();
</script>
</body>
</html>
