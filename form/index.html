/* v7: strict layout / rendering stability */
html,body{width:100%;height:100%;position:fixed;inset:0;overflow:hidden;overscroll-behavior:none;}

.list-pane,.mail-pane{height:100%;min-height:0;overflow:hidden;}

.chat{min-height:0;overscroll-behavior:contain;overflow-anchor:none;}
.mail-pane{isolation:isolate;}
.composer{transform:translateZ(0);will-change:transform;}
.compose-row{align-items:flex-end;}
.composer textarea{touch-action:manipulation;scrollbar-width:none;}
.composer textarea::-webkit-scrollbar{display:none;}
.app.view-list .main{height:calc(var(--app-height) - 62px);overflow:hidden;}
.app.view-list .list-pane{height:100%;min-height:0;}

.app.view-mail .mail-pane{grid-template-rows:auto minmax(0,1fr) auto;}
.app.view-mail .composer.hidden{display:none!important;}
.list-card{min-height:92px;}
.bot-card{overflow:hidden;}
.dynamic-note{transition:background .15s,border-color .15s;}
.segment .seg span,.switch span,.btn,.send,.plus{touch-action:manipulation;}

function settingsCard(d,modal=false){const s=d.settings;const guest=!me;return`<div class="bot-card settings-card" id="settingsCard"><div class="card-title">お問い合わせ設定</div><div class="card-note">このお問い合わせごとの設定です。送信後は変更できないため、返信が必要かどうかを先に選んでください。</div>${me?`<div class="setting-section"><div class="setting-section-head"><div><div class="setting-section-title">アカウント表示</div><div class="setting-section-sub">匿名にする場合はオン。オフにするとBuddies profile名を管理者に表示します。</div></div></div><div class="toggle-row"><div class="toggle-copy"><div class="toggle-title">匿名で送信する</div><div class="toggle-note" id="anonNote">${s.anonymous?'管理者には匿名として表示されます。':'Buddies profileの表示名を管理者に表示します。'}</div></div><label class="switch"><input type="checkbox" id="set_anonymous" ${s.anonymous?'checked':''}><span></span></label></div></div>`:`<div class="setting-section"><div class="setting-section-title">アカウント表示</div><div class="dynamic-note">ログインしていないため、今回は「ログインなし」として送信されます。サイト内返信は使えないため、返信希望時はDMアカウントが必要です。</div></div>`}<div class="setting-section"><div class="setting-section-head"><div><div class="setting-section-title">返信の希望</div><div class="setting-section-sub">返信が必要かどうかを選択してください。標準は返信ありです。</div></div></div><div class="segment"><label class="seg"><input type="radio" name="set_need" value="1" ${s.need_reply?'checked':''}><span>返信あり<small>回答を受け取る</small></span></label><label class="seg"><input type="radio" name="set_need" value="0" ${!s.need_reply?'checked':''}><span>返信不要<small>送信のみ</small></span></label></div></div><div id="replyDetail">${replyDetailHtml(s,guest)}</div><div class="dynamic-note settings-dynamic-note" id="settingsDynamicNote">${settingsDynamicText(s,guest)}</div><div class="card-actions"><button class="btn black" type="button" data-act="save-settings">${modal?'設定を保存':'この設定で次へ'}</button></div></div>`}
function replyDetailHtml(s,guest){if(!s.need_reply)return'<div class="setting-section"><div class="setting-section-title">返信の受け取り方</div><div class="dynamic-note">返信不要が選択されているため、受け取り方の設定は不要です。</div></div>';const channel=guest?'dm':(s.reply_channel||'site');return`<div class="setting-section"><div class="setting-section-head"><div><div class="setting-section-title">返信の受け取り方</div><div class="setting-section-sub">サイト内返信は一覧に未読表示されます。DMの場合はアカウント名が必須です。</div></div></div>${!guest?`<div class="segment"><label class="seg"><input type="radio" name="set_channel" value="site" ${channel==='site'?'checked':''}><span>このサイト<small>未読表示あり</small></span></label><label class="seg"><input type="radio" name="set_channel" value="dm" ${channel==='dm'?'checked':''}><span>DM<small>X / Instagram</small></span></label></div>`:`<div class="dynamic-note">ログインなしの場合は、このサイト内返信が使えないためDM返信になります。</div>`}<div id="dmFields" class="${channel==='dm'?'':'hidden'}"><div class="dm-card"><div class="setting-choice-title">DM返信先</div><div class="setting-choice-note">XまたはInstagramのアカウント名を入力してください。</div><div class="dm-grid"><div class="field"><label>サービス</label><select class="input" id="set_dm_service"><option value="X" ${s.dm_service==='X'?'selected':''}>X</option><option value="Instagram" ${s.dm_service==='Instagram'?'selected':''}>Instagram</option></select></div><div class="field"><label>アカウント名</label><input class="input" id="set_dm_account" value="${esc(s.dm_account||'')}" placeholder="@yourname"></div></div></div></div></div>`}

function updateComposer(){const item=activeItem();const input=$('messageInput'),send=$('sendBtn'),plus=$('plusBtn'),note=$('composerNote'),composer=$('composer');if(!item){composer.classList.add('hidden');return}else composer.classList.remove('hidden');let enabled=false,attach=false,placeholder='本文を入力';if(item&&item.draft&&!item.sent){enabled=item.settings_done&&item.category_done&&(!needsSite(item.category)||item.site_done);attach=enabled&&((item.files||[]).length<2);placeholder=enabled?'本文を入力':'設定とカテゴリを選択してください'}else if(item&&!item.draft&&me&&item.status==='open'){enabled=true;attach=(+(item.image_count||((item.images||[]).length)||0)<10)&&((item.files||[]).length<1);placeholder='追加メッセージを入力'}const locked=isSendLocked();input.disabled=!enabled;send.disabled=!enabled||locked;plus.disabled=!attach||locked;input.placeholder=placeholder;let base=item&&item.draft?'初回画像は左の＋から2枚まで添付できます。本文の改行はそのまま保存されます。':(enabled?'追加メッセージには画像を1枚添付できます。お問い合わせ全体で画像は10枚までです。':'このお問い合わせには送信できません。');if(locked)base+=' 送信直後の重複送信を防ぐため、数秒後に再送できます。';note.textContent=base;renderAttachStrip()}

/* mail-ui overrides */
function mailSubject(item){
  if(!item)return 'お問い合わせ';
  if(item.draft)return item.sent&&item.contact_code?`お問い合わせ #${item.contact_code}`:'新規お問い合わせ';
  return `#${item.contact_code||item.id} ${item.category||'お問い合わせ'}`;
}
function mailStatus(item){return item.draft?(item.sent?'送信済み':'下書き'):statusLabel(item.status)}
function mailDate(item){return item.latest_at||item.created_at||''}
function mailChips(item){
  if(!item)return '';
  const chips=[];
  chips.push(`<span class="mail-chip strong">${esc(mailStatus(item))}</span>`);
  chips.push(`<span class="mail-chip">${esc(item.draft?(item.category||'カテゴリ未選択'):(item.category||'お問い合わせ'))}</span>`);
  chips.push(`<span class="mail-chip">${esc(item.draft?replyLabel(item.settings):replyLabel(item))}</span>`);
  if(!item.draft&&+item.unread_admin_count>0)chips.push(`<span class="mail-chip strong">未読返信 ${+item.unread_admin_count}</span>`);
  return `<div class="mail-chip-row">${chips.join('')}</div>`;
}
function mailMetaRows(item){
  if(!item)return '';
  const rows=[];
  rows.push(['状態',mailStatus(item)]);
  rows.push(['カテゴリ',item.draft?(item.category||'未選択'):(item.category||'お問い合わせ')]);
  const reply=item.draft?replyLabel(item.settings):replyLabel(item); rows.push(['返信',reply]);
  const code=item.draft?(item.contact_code?('#'+item.contact_code):'未発行'):('#'+(item.contact_code||item.id)); rows.push(['管理番号',code]);
  const site=item.draft?item.site_name:item.site_name; if(site||needsSite(item.category))rows.push(['対象サイト',site||'未入力']);
  const date=mailDate(item); if(date)rows.push(['日時',date]);
  return `<div class="mail-meta-grid">${rows.map(([k,v])=>`<b>${esc(k)}</b><span>${esc(v)}</span>`).join('')}</div>`;
}
function draftStepsHtml(d){
  const steps=[['設定',!!d.settings_done],['カテゴリ',!!d.category_done],['対象',!needsSite(d.category)||!!d.site_done],['本文',!!(String(d.body_draft||'').trim()||d.sent)]];
  return `<div class="mail-chip-row">${steps.map(([label,ok])=>`<span class="mail-chip ${ok?'strong':''}">${ok?'✓ ':''}${esc(label)}</span>`).join('')}</div>`;
}
function renderList(){
  const items=allItems();

  $('listCount').textContent=`${items.length}件${unread?` / 未読${unread}`:''}`;
  if(!items.length){
    $('inquiryList').innerHTML='<div class="empty">まだありません。<br>「新規」から作成できます。</div>';
    return;
  }
  $('inquiryList').innerHTML=items.map(item=>{
    const isDraft=!!item.draft,active=item.key===activeKey,unread=!isDraft&&+item.unread_admin_count>0;
    const subject=isDraft?(item.sent&&item.contact_code?`#${item.contact_code}`:'新規お問い合わせ'):`#${item.contact_code||item.id} ${item.category||'お問い合わせ'}`;
    const meta=isDraft?(item.category||'カテゴリ未選択'):(item.latest_sender==='admin'?'管理者から返信':'ユーザー送信');
    const preview=latestPreview(item)||nextActionLabel(item);
    const status=unread?`未読 ${+item.unread_admin_count}`:mailStatus(item);
    const date=mailDate(item);
    return `<button class="list-card ${active?'active':''} ${unread?'unread':''}" data-key="${esc(item.key)}"><div class="mail-list-row"><div class="mail-list-top"><div class="mail-list-subject">${esc(subject)}</div><div class="mail-list-date">${esc(date)}</div></div><div class="mail-list-meta">${esc(meta)} / ${esc(isDraft?replyLabel(item.settings):replyLabel(item))}</div><div class="mail-list-preview">${esc(preview)}</div><div class="mail-list-tags"><span class="badge ${unread?'unread':(isDraft?'draft':esc(item.status||'open'))}">${esc(status)}</span>${isDraft&&!item.sent?'<span class="badge action">作成中</span>':''}</div></div></button>`;
  }).join('');

function renderDraft(d,initialOpen=false){

    const guestNote=!me?'<div class="mail-warning">ログインなし送信のため、この画面で履歴確認はできません。</div>':'';
    body+=`<div class="mail-confirm">${esc(completionMessage(!!d.settings?.need_reply))}<br>管理番号：${esc(d.contact_code||'')}</div>${guestNote}`;
  }else if(!d.settings_done){

  }

function settingsSummaryHtml(o){

  if(o.category)rows.push(['カテゴリ',o.category]);

function isDraftReadyForBody(item){
  return !!item && !!item.draft && !item.sent && !!item.settings_done && !!item.category_done && (!needsSite(item.category)||!!item.site_done);
}
function nextActionLabel(item){
  if(!item)return 'お問い合わせ';
  if(!item.draft){
    if(+item.unread_admin_count>0)return '未読返信があります';
    return statusLabel(item.status);
  }
  if(item.sent)return '送信済み';
  if(!item.settings_done)return '返信設定を選択';
  if(!item.category_done||item.showCategoryEditor)return 'カテゴリを選択';
  if(needsSite(item.category)&&(!item.site_done||item.showSiteEditor))return '対象サイトを入力';
  return '本文を入力';
}

function canUserHideInquiry(c){

    if(rem){removeImage(+rem.dataset.removeImage);return;}
  });
  const on=(id,ev,fn)=>{const el=$(id);if(el)el.addEventListener(ev,fn)};
  on('newBtn','click',()=>newDraft(true));
  on('loginToggleBtn','click',toggleLogin);
  on('loginPromptBtn','click',()=>{const b=$('loginBox');if(b)b.classList.remove('hidden');goHome();});
  on('loginBtn','click',login);
  on('mobileListBtn','click',goHome);
  on('sheetBg','click',closeList);
  on('settingsModalClose','click',closeSettingsModal);
  const sm=$('settingsModal');if(sm)sm.onclick=e=>{if(e.target===sm)closeSettingsModal();const act=e.target.closest('[data-act]')?.dataset.act;if(act==='save-settings')saveSettings();
  if(act==='draft-back')goDraftBack(e.target.closest('[data-target]')?.dataset.target||'');};
  on('editModalClose','click',closeEditModal);
  const em=$('editModal');if(em)em.onclick=e=>{if(e.target===em)closeEditModal();const act=e.target.closest('[data-act]')?.dataset.act;if(act==='save-category')saveCategory();if(act==='save-site')saveSite();if(act==='cancel-existing-edit')closeEditModal();if(act==='save-existing-edit')saveExistingEdit();};
  on('plusBtn','click',pickImages);
  const picker=$('imagePicker');if(picker)picker.onchange=handlePickedImages;
  on('sendBtn','click',sendComposer);
  const content=$('mailContent');if(content)content.onclick=onMailClick;
  const actions=$('chatActions');if(actions)actions.onclick=e=>{const b=e.target.closest('button');if(!b)return;const act=b.dataset.act;if(act==='hide-inquiry')hideCurrentInquiry();
  if(act==='cancel-inquiry')cancelCurrentInquiry();if(b.id==='hideExistingBtn')hideCurrentInquiry();if(b.id==='discardDraftBtn')discardDraft();if(b.id==='cancelExistingBtn')cancelCurrentInquiry();};
  const input=$('messageInput');
  if(input){
    input.addEventListener('input',e=>{const item=activeItem();if(item&&item.draft)item.body_draft=e.target.value;autoGrow(e.target);if(item&&item.draft)renderList();const d=activeItem();if(d&&d.draft){$('chatActions').innerHTML=hasBodyDraft(d)&&!d.sent?'<button class="btn danger small" id="discardDraftBtn" type="button">下書き削除</button>':'';}});
    input.addEventListener('focus',focusComposerSoon);
    input.addEventListener('blur',()=>{keyboardBottomTimers.forEach(clearTimeout);keyboardBottomTimers=[];const app=$('app');if(app)app.classList.remove('keyboard-active');setTimeout(()=>{setAppHeight('blur');resetWindowScrollSoon();},80)});
    input.addEventListener('keydown',e=>{if(e.key==='Enter'){}});
  }
}
function afterMailRender(initialOpen=false){
  if(forceNextScrollBottom){scrollBottomSoon();forceNextScrollBottom=false;}
  else if(initialOpen||!isDraftReadyForBody(activeItem()))scrollTopSoon();
  else scrollBottomSoon();
}

</script>
</body>
</html>
