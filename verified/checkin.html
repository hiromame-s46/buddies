<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>QR受付 - コミュニティ管理</title>
<meta name="robots" content="noindex,nofollow">
<link rel="apple-touch-icon" sizes="180x180" href="../icon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="../icon/favicon-32x32.png">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--ink:#111;--muted:#666;--line:#e8e8e8;--soft:#f6f6f4;--card:#fff;--ok:#16a34a;--warn:#f59e0b}
body{margin:0;background:linear-gradient(180deg,#fff 0,#f7f6f2 36%,#f3f4f6 100%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;line-height:1.5}
.app{max-width:820px;margin:0 auto;min-height:100dvh;background:rgba(255,255,255,.72)}
header{position:sticky;top:0;z-index:20;min-height:64px;padding:10px 16px;display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,0,0,.06)}
.back{min-width:40px;height:40px;border:1px solid var(--line);border-radius:50%;display:grid;place-items:center;font-size:0;color:#555;text-decoration:none;background:#fff}.back::before{content:"←";font-size:18px;font-weight:900}.head{flex:1;min-width:0}.head-title{font-size:17px;font-weight:950;letter-spacing:-.02em}.head-sub{font-size:11px;color:#777;font-weight:700}
main{padding:14px;display:grid;gap:14px}.card{border:1px solid rgba(0,0,0,.07);border-radius:22px;background:var(--card);padding:16px;display:grid;gap:14px;box-shadow:0 10px 28px rgba(0,0,0,.04)}
.tabs{position:sticky;top:76px;z-index:15;display:grid;grid-template-columns:1fr 1fr;background:#ececec;border-radius:9999px;padding:4px;gap:4px;box-shadow:0 8px 20px rgba(0,0,0,.06)}.tab{border:0;border-radius:9999px;min-height:45px;background:transparent;font:900 14px inherit;color:#666;cursor:pointer}.tab.active{background:#fff;color:#111;box-shadow:0 1px 8px rgba(0,0,0,.1)}
.panel{display:none;gap:12px}.panel.active{display:grid}
.section-label,.event-select label,.camera-target label{font-size:12px;color:#555;font-weight:900}.event-select select,.camera-target select{width:100%;border:1px solid var(--line);border-radius:15px;padding:12px 13px;background:#fff;font:inherit;font-size:14px;font-weight:750}
.target-card{gap:12px}.target-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.target-title{font-size:18px;font-weight:950;line-height:1.35;letter-spacing:-.02em}.target-type{display:inline-flex;align-items:center;border-radius:9999px;background:#111;color:#fff;font-size:10px;font-weight:900;padding:4px 9px;white-space:nowrap}.progress-box{display:grid;gap:8px}.progress-head{display:flex;align-items:end;justify-content:space-between;gap:10px}.progress-main{font-size:28px;font-weight:950;letter-spacing:-.04em}.progress-main span{font-size:13px;color:#777;margin-left:4px;letter-spacing:0}.progress-rate{font-size:12px;color:#777;font-weight:900}.progress-track{height:9px;border-radius:9999px;background:#eee;overflow:hidden}.progress-fill{height:100%;border-radius:inherit;background:linear-gradient(90deg,#111,#16a34a);width:0%}
.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.stat{background:#fafafa;border:1px solid #eee;border-radius:16px;padding:12px 6px;text-align:center}.stat strong{font-size:24px;font-weight:950;display:block;letter-spacing:-.03em}.stat span{font-size:11px;color:#777;font-weight:800}.stat.ok{background:#f0fff4;border-color:#d8f3df}.stat.ok strong{color:var(--ok)}
.camera-head{display:flex;align-items:center;justify-content:space-between;gap:10px}.camera-event{font-size:13px;color:#555;font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.camera-progress{font-size:22px;font-weight:950;white-space:nowrap}.camera-progress span{font-size:12px;color:#777;margin-left:3px}
.scanner{background:linear-gradient(180deg,#171717,#050505);border-radius:24px;padding:14px;display:grid;gap:12px;position:sticky;top:136px;box-shadow:0 18px 38px rgba(0,0,0,.22)}.scanner-title{color:#fff;font-size:14px;font-weight:900;text-align:center}.reader-wrap{position:relative}.reader{overflow:hidden;border-radius:18px;background:#222;min-height:300px;border:1px solid rgba(255,255,255,.12)}.camera-start{position:absolute;inset:0;display:grid;place-items:center;text-align:center;padding:26px;color:#fff;background:radial-gradient(circle at center,rgba(255,255,255,.08),rgba(0,0,0,.16))}.camera-start.hidden{display:none}.start-btn{min-width:210px;min-height:62px;font-size:15px;box-shadow:0 10px 26px rgba(255,255,255,.12)}.scanner-note{font-size:11px;color:#d6d6d6;text-align:center;line-height:1.65}
.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{min-height:44px;border:1px solid var(--line);border-radius:9999px;background:#fff;color:#111;padding:0 17px;font:800 13px inherit;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}.btn.primary{background:#111;color:#fff;border-color:#111}.btn.ok{background:var(--ok);color:#fff;border-color:var(--ok)}.btn.danger{background:#fff5f5;color:#d33;border-color:#f3c2c2}.btn:disabled{opacity:.5;cursor:not-allowed}
.toolbar{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}.filters{display:flex;gap:6px;flex-wrap:wrap}.chip{border:1px solid var(--line);background:#fff;border-radius:9999px;min-height:34px;padding:0 12px;font:800 12px inherit;color:#555;cursor:pointer}.chip.active{color:#fff;background:#111;border-color:#111}
.list{display:grid;gap:9px}.row{width:100%;display:grid;grid-template-columns:auto minmax(0,1fr) auto;align-items:center;gap:11px;padding:12px;border:1px solid var(--line);border-radius:17px;background:#fff;cursor:pointer;font:inherit;color:inherit;text-align:left;box-shadow:0 5px 14px rgba(0,0,0,.025)}.row.checked{background:#f7fff9;border-color:#d4f3db}.avatar{width:46px;height:46px;border-radius:50%;background:#f2b5cf;display:grid;place-items:center;color:#fff;font-size:16px;font-weight:900;flex-shrink:0;overflow:hidden}.avatar img{width:100%;height:100%;object-fit:cover}.check{width:30px;height:30px;border-radius:50%;background:#f2f2f2;color:#aaa;display:grid;place-items:center;font-size:15px;font-weight:950;flex-shrink:0}.row.checked .check{background:var(--ok);color:#fff}.person{min-width:0;display:grid;gap:3px}.name{font-size:15px;font-weight:950}.meta{font-size:11px;color:#777}.row-tags{grid-column:2/4;display:flex;gap:6px;flex-wrap:wrap;margin-top:-2px}.tag{border-radius:9999px;padding:3px 8px;background:#fff4d6;color:#7c5600;font-size:10px;font-weight:900;white-space:nowrap}.tag.soft{background:#f3f4f6;color:#555}.empty{padding:32px 14px;text-align:center;color:#888;font-size:13px}.error-page{max-width:400px;margin:56px auto;padding:26px;text-align:center}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.48);display:none;align-items:flex-end;justify-content:center;z-index:60}.sheet-overlay.open{display:flex}.sheet{background:#fff;width:100%;max-width:560px;border-radius:22px 22px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));display:grid;gap:14px;max-height:88dvh;overflow:auto}.sheet-grip{width:42px;height:5px;border-radius:9999px;background:#ddd;margin:-7px auto 0}.sheet-person{display:flex;gap:12px;align-items:center}.sheet-person .avatar{width:58px;height:58px}.sheet-title{font-size:18px;font-weight:950}.sheet-note{font-size:13px;color:#666;line-height:1.65}.sheet-status{font-size:11px;font-weight:900;border-radius:9999px;background:#f2f2f2;padding:4px 9px;display:inline-flex;margin-top:4px}.sheet-status.ok{background:#f0fff4;color:#276749}.sheet-tags{display:flex;gap:6px;flex-wrap:wrap}.sheet-actions{display:grid;gap:8px}.sheet-actions .btn{width:100%;font-size:13px}
@media(max-width:560px){main{padding:10px}.tabs{top:70px}.reader{min-height:275px}.scanner{top:128px}.stats .stat{padding:10px 4px}.stat strong{font-size:20px}.target-title{font-size:16px}.progress-main{font-size:24px}}
</style>
</head>
<body>
<div class="app">
  <header><a class="back" href="./">← 管理画面</a><div class="head"><div class="head-title">デジタル参加証・QR受付</div><div class="head-sub">既存のプロフィールQRを読み取ります</div></div></header>
  <main id="app"><div class="empty">読み込み中...</div></main>
</div>
<div class="sheet-overlay" id="result-sheet" onclick="if(event.target===this)closeSheet('result-sheet')"><div class="sheet" id="result-sheet-body"></div></div>
<div class="sheet-overlay" id="person-sheet" onclick="if(event.target===this)closeSheet('person-sheet')"><div class="sheet" id="person-sheet-body"></div></div>
<script>
const API='../api.php';
const MEMBER_DATA='../../data/member.json';
let targets=[],selectedEvent=null,rows=[],memberMap={},scanner=null,scannerRunning=false,scanningLocked=false,scannerStopping=Promise.resolve(),filter='all',pendingToken='';
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function assetUrl(url){if(!url)return '';if(/^https?:\/\//.test(url)||url.startsWith('data:'))return url;return url.startsWith('/')?url:'../'+url;}
async function api(action,payload=null){const opt={credentials:'include'};if(payload){opt.method='POST';opt.headers={'Content-Type':'application/json'};opt.body=JSON.stringify(payload);}const res=await fetch(`${API}?action=${action}`,opt);const text=await res.text();try{return JSON.parse(text);}catch(e){return {ok:false,error:'サーバーから応答を取得できませんでした。'};}}
function fmt(s){if(!s)return '';const d=new Date(String(s).replace(' ','T'));if(isNaN(d))return String(s);return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
async function init(){
  try{const raw=await (await fetch(`${MEMBER_DATA}?_=${Date.now()}`)).json();(Array.isArray(raw)?raw:Object.values(raw||{})).forEach(m=>{if(m?.name)memberMap[m.name]=m;});}catch(e){}
  const me=await api('verified_me').catch(()=>({ok:false}));
  if(!me.ok)return showError('コミュニティアカウントでログインしてください。','管理画面でログインした後、受付ページを開いてください。');
  const list=await api('event_mine_list').catch(()=>({ok:false}));
  if(!list.ok)return showError('イベントを取得できませんでした。',list.error||'');
  const baseEvents=(list.data||[]).filter(e=>e.participant_enabled!==false&&e.checkin_enabled);
  for(const e of baseEvents){
    targets.push({type:'event',id:Number(e.id),key:`event:${e.id}`,title:e.title,label:e.title,event_id:Number(e.id)});
    const sub=await api('subevent_mine_list&event_id='+encodeURIComponent(e.id)).catch(()=>({ok:false}));
    (sub.ok?(sub.data||[]):[]).filter(s=>s.participant_enabled!==false).forEach(s=>{
      targets.push({type:'subevent',id:Number(s.id),key:`subevent:${s.id}`,title:s.title,label:`${e.title} / ${s.title}`,event_id:Number(e.id)});
    });
  }
  if(!targets.length)return showError('受付が有効なイベントがありません。','イベント編集から「デジタル参加証・QR受付を使う」をオンにしてください。');
  const qs=new URLSearchParams(location.search);
  const wantedSub=Number(qs.get('subevent_id')||0),wantedEvent=Number(qs.get('event_id')||0);
  selectedEvent=targets.find(t=>wantedSub&&t.type==='subevent'&&t.id===wantedSub)||targets.find(t=>wantedEvent&&t.type==='event'&&t.id===wantedEvent)||targets[0];
  render();await loadRows();
}
function showError(title,note){document.getElementById('app').innerHTML=`<div class="card error-page"><h2>${esc(title)}</h2><p>${esc(note)}</p><a class="btn primary" href="./">管理画面へ戻る</a></div>`;}
function targetOptions(){return targets.map(t=>`<option value="${esc(t.key)}" ${t.key===selectedEvent.key?'selected':''}>${esc(t.type==='subevent'?'└ '+t.label:t.label)}</option>`).join('');}
function targetTypeLabel(){return selectedEvent?.type==='subevent'?'サブイベント受付':'イベント受付';}
function progressPercent(){return rows.length?Math.round(rows.filter(r=>r.checked_in_at).length/rows.length*100):0;}
function targetSummaryCard(selectId){
  const checked=rows.filter(r=>r.checked_in_at).length,total=rows.length,remaining=Math.max(total-checked,0),percent=progressPercent();
  return `<div class="card target-card">
    <div class="target-top"><div><div class="section-label">受付対象</div><div class="target-title">${esc(selectedEvent.title)}</div></div><span class="target-type">${targetTypeLabel()}</span></div>
    <select id="${selectId}" onchange="selectEvent(this.value)">${targetOptions()}</select>
    <div class="progress-box"><div class="progress-head"><div class="progress-main" data-progress-main>${checked}/${total}<span>受付済み</span></div><div class="progress-rate" data-progress-rate>${percent}% 完了 ・ 未受付 ${remaining} 人</div></div><div class="progress-track"><div class="progress-fill" data-progress-fill style="width:${percent}%"></div></div></div>
  </div>`;
}
function render(){
  document.getElementById('app').innerHTML=`
    <div class="tabs"><button class="tab active" id="tab-camera" onclick="switchTab('camera')">カメラ受付</button><button class="tab" id="tab-list" onclick="switchTab('list')">参加者リスト</button></div>
    <section class="panel active" id="panel-camera">
      ${targetSummaryCard('camera-target-select')}
      <section class="scanner"><div class="scanner-title">参加者のプロフィールQRを枠内に映してください</div><div class="reader-wrap"><div class="reader" id="qr-reader"></div><div class="camera-start" id="camera-start"><button id="camera-btn" class="btn primary start-btn" onclick="startScanner()">カメラを起動する</button></div></div><div class="scanner-note">Buddies profile の「QRで交換」で表示されるQRを利用できます。期限切れの場合はQRを再表示してください。</div><div class="actions"><button class="btn" onclick="stopScanner()">カメラを停止</button></div></section>
    </section>
    <section class="panel" id="panel-list">
      ${targetSummaryCard('list-target-select')}
      <section class="card event-select"><div class="stats"><div class="stat"><strong id="registered-count">0</strong><span>参加登録</span></div><div class="stat ok"><strong id="checked-count">0</strong><span>受付済み</span></div><div class="stat"><strong id="remaining-count">0</strong><span>未受付</span></div></div></section>
      <section class="card"><div class="toolbar"><div class="section-label">参加者受付リスト</div><button class="btn" onclick="loadRows()">更新</button></div><div class="filters"><button class="chip active" data-filter="all" onclick="setFilter('all')">すべて</button><button class="chip" data-filter="pending" onclick="setFilter('pending')">未受付</button><button class="chip" data-filter="checked" onclick="setFilter('checked')">受付済み</button></div><div class="list" id="participant-list"><div class="empty">読み込み中...</div></div></section>
    </section>`;
}
async function switchTab(tab){document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.id===`tab-${tab}`));document.querySelectorAll('.panel').forEach(el=>el.classList.toggle('active',el.id===`panel-${tab}`));if(tab==='list')await stopScanner();}
async function selectEvent(key){await stopScanner();selectedEvent=targets.find(t=>t.key===String(key))||targets[0];pendingToken='';document.querySelectorAll('#camera-target-select,#list-target-select').forEach(sel=>sel.value=selectedEvent.key);const label=document.querySelector('.camera-event');if(label)label.textContent=selectedEvent.title;await loadRows();}
async function loadRows(){
  if(!selectedEvent)return;
  const result=selectedEvent.type==='subevent'?await api('subevent_participants_admin&id='+encodeURIComponent(selectedEvent.id)):await api('event_participants_admin&event_id='+encodeURIComponent(selectedEvent.id));
  if(!result.ok){openResultSheet('err',null,'参加者リストを取得できません',result.error||'');return;}
  rows=selectedEvent.type==='subevent'?(result.data?.participants||[]):result.data||[];
  renderRows();
}
function avatarHtml(u){const member=(u.oshi_members||[])[0];const url=u.user_icon||(member&&memberMap[member]?.image)||'';return url?`<img src="${esc(assetUrl(url))}" alt="" onerror="this.remove()">`:esc((u.display_name||u.username||'?')[0]);}
function mainTags(r){return selectedEvent.type==='subevent' ? `${!r.main_joined?'<span class="tag">メイン未参加</span>':!r.main_checked_in?'<span class="tag">メイン未受付</span>':''}` : '';}
function renderRows(){
  const checked=rows.filter(r=>r.checked_in_at).length;
  [['registered-count',rows.length],['checked-count',checked],['remaining-count',rows.length-checked],['camera-checked',checked],['camera-total',rows.length]].forEach(([id,n])=>{const el=document.getElementById(id);if(el)el.textContent=String(n);});
  const percent=progressPercent(),remaining=Math.max(rows.length-checked,0);
  document.querySelectorAll('[data-progress-main]').forEach(el=>{el.innerHTML=`${checked}/${rows.length}<span>受付済み</span>`;});
  document.querySelectorAll('[data-progress-rate]').forEach(el=>{el.textContent=`${percent}% 完了 ・ 未受付 ${remaining} 人`;});
  document.querySelectorAll('[data-progress-fill]').forEach(el=>{el.style.width=`${percent}%`;});
  const shown=rows.filter(r=>filter==='pending'?!r.checked_in_at:filter==='checked'?!!r.checked_in_at:true);
  const list=document.getElementById('participant-list');if(!list)return;
  if(!shown.length){list.innerHTML='<div class="empty">該当する参加者はいません</div>';return;}
  list.innerHTML=shown.map(r=>{const u=r.user||{};const meta=[(u.oshi_members||[]).join(' / '),u.location,r.checked_in_at?`受付 ${fmt(r.checked_in_at)}`:'未受付'].filter(Boolean).join(' ・ ');const tags=[r.registered_on_site?'<span class="tag">当日登録</span>':'',mainTags(r),r.checked_in_at?'<span class="tag soft">受付済み</span>':'<span class="tag soft">未受付</span>'].filter(Boolean).join('');return `<button class="row ${r.checked_in_at?'checked':''}" type="button" onclick="openPersonSheet(${Number(u.id)})"><div class="avatar">${avatarHtml(u)}</div><div class="person"><div class="name">${esc(u.display_name||u.username||'名無し')}</div><div class="meta">${esc(meta)}</div></div><div class="check">${r.checked_in_at?'✓':'-'}</div>${tags?`<div class="row-tags">${tags}</div>`:''}</button>`;}).join('');
}
function setFilter(next){filter=next;document.querySelectorAll('.chip').forEach(btn=>btn.classList.toggle('active',btn.dataset.filter===next));renderRows();}
function personHeader(u,status=''){return `<div class="sheet-person"><div class="avatar">${avatarHtml(u)}</div><div><div class="sheet-title">${esc(u.display_name||u.username||'参加者')}</div>${status}</div></div>`;}
function resultTags(data){return selectedEvent.type==='subevent'?`<div class="sheet-tags">${!data.main_joined?'<span class="tag">メイン未参加</span>':!data.main_checked_in?'<span class="tag">メイン未受付</span>':''}</div>`:'';}
function openResultSheet(kind,u,title,note,actions=''){const status=kind==='ok'?'<span class="sheet-status ok">受付済み</span>':kind==='warn'?'<span class="sheet-status">確認が必要</span>':'<span class="sheet-status">エラー</span>';const tags=u?resultTags(window._lastCheckinResult||{}):'';document.getElementById('result-sheet-body').innerHTML=`<div class="sheet-grip"></div>${u?personHeader(u,status):`<div class="sheet-title">${esc(title)}</div>`}${u?`<div class="sheet-title">${esc(title)}</div>`:''}${tags}<div class="sheet-note">${esc(note)}</div>${actions?`<div class="sheet-actions">${actions}</div>`:''}<button class="btn" onclick="closeSheet('result-sheet')">閉じる</button>`;document.getElementById('result-sheet').classList.add('open');}
function closeSheet(id){document.getElementById(id)?.classList.remove('open');}
function openPersonSheet(userId){const row=rows.find(r=>Number(r.user?.id)===Number(userId));if(!row)return;const u=row.user||{};const status=row.checked_in_at?`<span class="sheet-status ok">受付済み ${esc(fmt(row.checked_in_at))}</span>`:'<span class="sheet-status">未受付</span>';document.getElementById('person-sheet-body').innerHTML=`<div class="sheet-grip"></div>${personHeader(u,status)}<div class="sheet-tags">${mainTags(row)}</div><div class="sheet-actions">${row.checked_in_at?`<button class="btn danger" onclick="manualAction(${userId},'undo_checkin')">受付を取り消す</button>`:`<button class="btn ok" onclick="manualAction(${userId},'checkin')">手動で受付する</button>`}<button class="btn danger" onclick="manualAction(${userId},'remove_join')">${selectedEvent.type==='subevent'?'サブイベント参加を取り消す':'参加を取り消す'}</button><a class="btn" href="../view.html?id=${encodeURIComponent(userId)}" target="_blank" rel="noopener">プロフィールを見る</a></div><button class="btn" onclick="closeSheet('person-sheet')">閉じる</button>`;document.getElementById('person-sheet').classList.add('open');}
async function manualAction(userId,operation){if(operation==='undo_checkin'&&!confirm('この参加者の受付を取り消しますか？'))return;if(operation==='remove_join'&&!confirm(selectedEvent.type==='subevent'?'この参加者のサブイベント参加を取り消しますか？':'この参加者の参加登録を取り消しますか？受付記録とサブイベント参加も削除されます。'))return;const result=selectedEvent.type==='subevent'?await api('subevent_checkin_manage',{subevent_id:selectedEvent.id,user_id:userId,operation}):await api('event_checkin_manage',{event_id:selectedEvent.id,user_id:userId,operation});if(!result.ok){openResultSheet('err',null,'操作できませんでした',result.error||'');return;}closeSheet('person-sheet');await loadRows();}
async function startScanner(){if(scannerRunning||!selectedEvent)return;await scannerStopping;if(scannerRunning||!selectedEvent)return;if(!window.Html5Qrcode){openResultSheet('err',null,'カメラ機能を読み込めませんでした','再読み込みしてください。');return;}scanningLocked=false;const reader=document.getElementById('qr-reader');reader.innerHTML='';scanner=new Html5Qrcode('qr-reader');try{await scanner.start({facingMode:'environment'},{fps:20,qrbox:{width:250,height:250},aspectRatio:1},handleDecoded,()=>{});scannerRunning=true;document.getElementById('camera-start')?.classList.add('hidden');}catch(e){scanner=null;openResultSheet('err',null,'カメラを起動できません','カメラへのアクセスを許可して再試行してください。');}}
async function stopScanner(keepLocked=false){if(!scanner){if(!keepLocked)scanningLocked=false;document.getElementById('camera-start')?.classList.remove('hidden');return;}const current=scanner;scanner=null;scannerRunning=false;if(!keepLocked)scanningLocked=false;scannerStopping=(async()=>{try{await current.stop();current.clear();}catch(e){}document.getElementById('camera-start')?.classList.remove('hidden');})();await scannerStopping;}
async function handleDecoded(text){if(scanningLocked)return;let token='';try{const url=new URL(text,location.origin);token=new URLSearchParams(url.hash.replace(/^#/,'')).get('token')||'';}catch(e){}if(!token){openResultSheet('err',null,'読み取れないQRです','Buddies profile で表示したQRを読み取ってください。');return;}scanningLocked=true;pendingToken=token;stopScanner(true);await submitCheckin(false);}
async function submitCheckin(allowRegister){const result=selectedEvent.type==='subevent'?await api('subevent_checkin_scan',{subevent_id:selectedEvent.id,token:pendingToken,allow_register:!!allowRegister}):await api('event_checkin_scan',{event_id:selectedEvent.id,token:pendingToken,allow_register:!!allowRegister});if(!result.ok){openResultSheet('err',null,'受付できませんでした',result.error||'もう一度読み取ってください。',`<button class="btn primary" onclick="closeSheet('result-sheet');startScanner()">次を読み取る</button>`);return;}const data=result.data||{},user=data.user||{};window._lastCheckinResult=data;if(data.requires_registration){openResultSheet('warn',user,selectedEvent.type==='subevent'?'サブイベント未登録のユーザーです。':'参加登録していないユーザーです。','当日参加として登録し、受付済みにできます。',`<button class="btn ok" onclick="submitCheckin(true)">参加にして受付する</button><button class="btn" onclick="pendingToken='';closeSheet('result-sheet');startScanner()">キャンセル</button>`);return;}const note=data.already_checked_in?'すでに受付済みです。':data.registered_on_site?'当日参加として登録し、受付しました。':'受付が完了しました。';openResultSheet('ok',user,'受付完了',note,`<button class="btn primary" onclick="pendingToken='';closeSheet('result-sheet');startScanner()">次を読み取る</button>`);pendingToken='';await loadRows();}
init();
</script>
