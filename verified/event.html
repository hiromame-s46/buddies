<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--line:#e8e8e8;--ink:#111;--muted:#666;--gold:#e6b422}
body{margin:0;min-height:100dvh;background:#fafafa;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;line-height:1.6}
.app{max-width:680px;margin:0 auto;min-height:100dvh;background:#fff}
header{position:relative;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:10px;min-height:57px}
.back{display:inline-flex;align-items:center;gap:4px;font-size:14px;color:#111;text-decoration:none;font-weight:600;padding:6px 10px;border-radius:9999px}
.back:hover{background:#f3f3f3}
header h1{font-size:15px;margin:0;font-weight:700;color:#555;position:absolute;left:50%;transform:translateX(-50%);max-width:48%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;pointer-events:none}
main{padding:0 0 24px}
.cover{width:100%;aspect-ratio:16/9;background:#fff4d6;display:grid;place-items:center;color:#b79100;font-size:48px;overflow:hidden}
.cover img{width:100%;height:100%;object-fit:cover}
.head{padding:18px 20px 8px}
.title{font-size:22px;font-weight:800;margin:0 0 8px}
.meta{font-size:13px;color:#555;display:grid;gap:4px;margin-bottom:12px}
.meta b{color:#111}
.host{display:inline-flex;align-items:center;gap:10px;text-decoration:none;color:#111;background:#fff;border:1px solid var(--line);border-radius:9999px;padding:7px 12px 7px 7px;margin-bottom:12px;max-width:100%;box-shadow:0 2px 8px rgba(0,0,0,.03)}
.host:hover{background:#fafafa}
.host-icon{width:34px;height:34px;border-radius:50%;background:#fff4d6;color:#7c5600;display:grid;place-items:center;font-weight:800;overflow:hidden;flex-shrink:0}
.host-icon img{width:100%;height:100%;object-fit:cover}
.host-text{min-width:0;display:grid;line-height:1.25}
.host-label{font-size:10px;font-weight:800;color:#7c5600;letter-spacing:.04em}
.host-name{font-size:13px;font-weight:800;color:#111;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.desc{padding:0 20px;white-space:pre-wrap;font-size:14px;color:#333;margin:8px 0 18px}
.fees{margin:4px 20px 18px;border:1px solid var(--line);border-radius:16px;background:#fafafa;padding:13px 14px;display:grid;gap:8px}
.fees-title{font-size:12px;font-weight:800;color:#555;letter-spacing:.04em}
.fee-row{display:flex;align-items:baseline;justify-content:space-between;gap:16px;font-size:14px}
.fee-label{font-weight:700;color:#333}.fee-amount{font-weight:800;color:#111;white-space:nowrap}
.cta{padding:12px 20px;display:grid;gap:8px}
.cta .custom-link{margin-top:8px}
.owner-actions{margin:8px 20px 6px;padding:12px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);display:grid;gap:8px}
.owner-actions-label{font-size:11px;font-weight:800;color:#777;letter-spacing:.06em}
.owner-actions .btn{width:100%}
.attachments{padding:0 20px;display:grid;gap:8px}
.attachment{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:14px;background:#fff;color:#111;text-decoration:none;padding:10px 12px}
.attachment:hover{background:#fafafa}
.attachment .file-icon{width:34px;height:34px;border-radius:10px;background:#f3f3f3;display:grid;place-items:center;font-size:11px;font-weight:800;color:#555;flex-shrink:0}
.attachment .file-body{min-width:0;flex:1}
.attachment .file-name{font-size:13px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attachment .file-meta{font-size:11px;color:#777}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:48px;border-radius:9999px;border:none;font-weight:800;font-size:14px;padding:0 18px;cursor:pointer;text-decoration:none}
.btn.primary{background:#111;color:#fff}
.btn.gold{background:linear-gradient(135deg,var(--gold),#d29a14);color:#fff;box-shadow:0 6px 16px rgba(230,180,34,.32)}
.btn.secondary{background:#f3f3f3;color:#111}
.btn.danger{background:#fff;color:#d33;border:1px solid #f3c2c2}
.btn.active-join{background:#16a34a;color:#fff}
.btn.full{background:#e5e5e5;color:#888;box-shadow:none;cursor:not-allowed}
.btn.full:hover{background:#e5e5e5}
.btn:disabled{opacity:1}
.btn.active-like{background:#ffe4e6;color:#be123c;border:1px solid #fda4af}
.counts{display:flex;gap:14px;justify-content:center;color:#555;font-size:13px;margin-top:6px}
.section-title{padding:0 20px;font-size:12px;font-weight:800;color:#555;text-transform:uppercase;letter-spacing:.06em;margin:20px 0 8px}
.subevents{padding:0 12px;display:grid;gap:10px}
.subevents-toggle{margin:10px 20px 0}
.subevent-card{border:1px solid var(--line);border-radius:16px;background:#fff;display:flex;gap:12px;align-items:center;padding:12px 14px;text-decoration:none;color:#111;overflow:hidden}
.subevent-card:hover{background:#fafafa}
.subevent-card.is-hidden{display:none}
.subevent-thumb{width:72px;height:72px;border-radius:14px;background:#f3f3f3;display:grid;place-items:center;overflow:hidden;flex-shrink:0;color:#999;font-weight:800}
.subevent-thumb img{width:100%;height:100%;object-fit:cover}
.subevent-card .s-body{min-width:0;flex:1;display:grid;gap:3px}
.subevent-card .s-title{font-weight:800;font-size:15px;line-height:1.35}
.subevent-card .s-meta{font-size:12px;color:#666;line-height:1.45}
.subevent-card .s-desc{font-size:12px;color:#888;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.subevent-card .s-arrow{color:#aaa;font-size:20px;flex-shrink:0}
.participants{padding:0 12px;display:grid;gap:6px}
.participant{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:14px;background:#fafafa;text-decoration:none;color:#111;border:1px solid transparent}
.participant:hover{background:#f3f3f3;border-color:var(--line)}
.avatar{width:40px;height:40px;border-radius:50%;background:#f2b5cf;color:#fff;font-weight:800;display:grid;place-items:center;flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.p-name{font-weight:700;font-size:14px}
.p-meta{font-size:12px;color:#888}
.board-preview{padding:0 12px;display:grid;gap:10px}.board-preview.pinned-area{margin-bottom:12px}.board-post{border:1px solid var(--line);border-radius:18px;background:#fff;padding:13px;display:grid;gap:8px}.board-post.pinned{border-color:#f2d98c;background:linear-gradient(180deg,#fffdf7,#fff);box-shadow:0 8px 24px rgba(124,86,0,.08)}.board-pin{display:inline-flex;width:max-content;border-radius:9999px;background:#fff4d6;color:#7c5600;font-size:10px;font-weight:900;padding:2px 8px}.board-date{font-size:11px;color:#888;font-weight:800}.board-body{font-size:13px;color:#222;line-height:1.7;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;overflow-wrap:anywhere}.board-post.pinned .board-body{font-size:14px;font-weight:650}.board-body p{margin:0 0 6px}.board-body a{color:#111;font-weight:900}.board-more{display:flex;align-items:center;justify-content:center;min-height:44px;border-radius:9999px;background:#f3f3f3;color:#111;text-decoration:none;font-size:13px;font-weight:900}
.empty{padding:30px 16px;text-align:center;color:#888;font-size:13px}
.msg{display:none;padding:10px 12px;border-radius:10px;font-size:13px;font-weight:700;margin:8px 20px 0}
.msg.show{display:block}.msg.err{background:#fff5f5;color:#d33}.msg.ok{background:#f0fff4;color:#276749}
.certificate{margin:4px 20px 16px;padding:15px;border-radius:18px;background:#fff;color:#111;border:1px solid var(--line);box-shadow:0 6px 18px rgba(0,0,0,.04);display:grid;gap:6px}
.certificate-label{font-size:10px;font-weight:800;letter-spacing:.14em;color:#7c5600}.certificate-title{font-size:17px;font-weight:900}.certificate-note{font-size:12px;color:#666}
.edit-fab{position:fixed;right:18px;bottom:18px;z-index:30;width:56px;height:56px;border-radius:50%;background:#111;color:#fff;display:none;align-items:center;justify-content:center;text-decoration:none;box-shadow:0 10px 24px rgba(0,0,0,.22);border:1px solid #111}
.edit-fab:hover{background:#222}
.edit-fab svg{width:22px;height:22px}
.admin-panel{margin:18px 12px 0;border:1px solid var(--line);border-radius:18px;background:#fff;padding:14px;display:grid;gap:12px}
.admin-panel h2{font-size:14px;margin:0;font-weight:800}
.admin-panel .admin-tools{display:flex;gap:8px;flex-wrap:wrap}
.admin-list{display:grid;gap:8px}
.admin-row{border:1px solid #eee;border-radius:14px;background:#fafafa;padding:12px;display:grid;gap:6px}
.admin-row-head{display:flex;gap:8px;align-items:center;justify-content:space-between}
.admin-name{font-size:14px;font-weight:800}
.admin-meta{font-size:12px;color:#666;line-height:1.6}
.admin-empty{padding:16px;text-align:center;color:#888;font-size:13px;border:1px dashed var(--line);border-radius:14px}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.confirm-overlay.open{display:flex}
.confirm-box{background:#fff;border-radius:18px;max-width:360px;width:100%;padding:20px;display:grid;gap:12px;box-shadow:0 18px 44px rgba(0,0,0,.2)}
.confirm-box h3{margin:0;font-size:16px;font-weight:800}
.confirm-box p{margin:0;color:#555;font-size:13px;line-height:1.7}
.confirm-actions{display:flex;gap:8px;justify-content:flex-end}.confirm-actions .btn{font-size:13px}
.action-overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:110;display:none;align-items:center;justify-content:center;padding:20px}
.action-overlay.open{display:flex}
.action-sheet{width:100%;max-width:420px;background:#fff;border-radius:24px;padding:24px 20px 20px;display:grid;gap:14px;box-shadow:0 18px 50px rgba(0,0,0,.22);animation:actionPop .2s ease}
@keyframes actionPop{from{transform:translateY(8px) scale(.96);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.action-mark{width:54px;height:54px;border-radius:50%;background:#111;color:#fff;display:grid;place-items:center;font-size:25px;font-weight:900;margin:0 auto}
.action-title{text-align:center;font-size:18px;font-weight:900;margin:0}
.action-body{text-align:center;color:#555;font-size:13px;line-height:1.75;white-space:pre-wrap;margin:0}
.action-buttons{display:grid;gap:8px}
@media(max-width:560px){.edit-fab{right:16px;bottom:16px}}
</style>

<body>
<div class="app">
  <header>
    <a id="back-link" class="back" href="../" aria-label="戻る" data-nosnippet>← 戻る</a>
    <h1>イベント</h1>
  </header>
  <main id="app"><div class="empty" data-nosnippet>読み込み中…</div></main>
</div>
<div class="action-overlay" id="action-overlay" onclick="if(event.target===this)closeActionPopup()">
  <div class="action-sheet">
    <div class="action-mark">✓</div>
    <h2 class="action-title" id="action-title"></h2>
    <p class="action-body" id="action-body"></p>
    <div class="action-buttons">
      <a class="btn primary" id="action-link" href="#" target="_blank" rel="noopener" style="display:none"></a>
      <button class="btn secondary" type="button" onclick="closeActionPopup()">閉じる</button>
    </div>
  </div>
</div>
<a id="edit-fab" class="edit-fab" href="./index.html" target="_blank" rel="noopener" aria-label="イベント編集画面を開く" title="編集">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
</a>
<div class="confirm-overlay" id="confirm-overlay" onclick="if(event.target===this)closeConfirm(false)">
  <div class="confirm-box">
    <h3 id="confirm-title">確認</h3>
    <p id="confirm-text"></p>
    <div class="confirm-actions">
      <button class="btn secondary" type="button" onclick="closeConfirm(false)">キャンセル</button>
      <button class="btn danger" id="confirm-ok" type="button">参加を取り消す</button>
    </div>
  </div>
</div>
<script>
const API = '../api.php';
const MEMBER_DATA = '../../data/member.json';
let memberMap = {};
async function loadMemberMap(){
  try {
    const res = await fetch(MEMBER_DATA + '?_=' + Date.now());
    const raw = await res.json();
    const arr = Array.isArray(raw) ? raw : Object.values(raw);
    arr.forEach(m => { if (m && m.name) memberMap[m.name] = m; });
  } catch(e){}
}
function closeOrBack(e){
  if (window.opener && !window.opener.closed) { e.preventDefault(); window.close(); return false; }
  return true;
}
let ev = null;
let me = null;
let currentAccount = null;
let hostAccount = null;
let subevents = [];
let boardPosts = [];
let subeventsExpanded = false;

function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function assetUrl(url){ if (!url) return ''; if (/^https?:\/\//.test(url) || url.startsWith('data:')) return url; return url.startsWith('/') ? url : '../' + url; }
function getActionConfig(cfg){
  if (!cfg || !cfg.enabled) return null;
  return {
    mode: ['popup','button'].includes(cfg.mode) ? cfg.mode : 'popup',
    title: cfg.title || '参加登録が完了しました',
    body: cfg.body || 'イベントへの参加登録を受け付けました。',
    button_label: cfg.button_label || 'リンクを開く',
    button_url: cfg.button_url || '',
    show_button_after_popup: !!cfg.show_button_after_popup,
  };
}
function eventActionButtonHtml(){
  const cfg = getActionConfig(ev && ev.action_config);
  const shouldShow = cfg && ev.is_joined && cfg.button_url && (cfg.mode === 'button' || (cfg.mode === 'popup' && cfg.show_button_after_popup));
  if (!shouldShow) return '';
  return `<a class="btn primary custom-link" href="${esc(cfg.button_url)}" target="_blank" rel="noopener">${esc(cfg.button_label || cfg.title)}</a>`;
}
function showActionPopup(raw){
  const cfg = getActionConfig(raw);
  if (!cfg || cfg.mode !== 'popup') return;
  document.getElementById('action-title').textContent = cfg.title;
  document.getElementById('action-body').textContent = cfg.body;
  const link = document.getElementById('action-link');
  if (cfg.button_url) {
    link.href = cfg.button_url;
    link.textContent = cfg.button_label || 'リンクを開く';
    link.style.display = '';
  } else {
    link.style.display = 'none';
  }
  document.getElementById('action-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeActionPopup(){
  document.getElementById('action-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function hostHtml(){
  const href = `./view.html?id=${encodeURIComponent(ev.account_id)}`;
  if (!hostAccount) {
    return `<a class="host" href="${href}"><div class="host-icon">✓</div><div class="host-text"><span class="host-label">HOST</span><span class="host-name">主催アカウント</span></div></a>`;
  }
  const name = hostAccount.display_name || hostAccount.label || '主催アカウント';
  const icon = hostAccount.icon_url
    ? `<img src="${esc(assetUrl(hostAccount.icon_url))}" alt="" onerror="this.style.display='none'">`
    : esc((name || '？')[0]);
  return `<a class="host" href="${href}">
    <div class="host-icon">${icon}</div>
    <div class="host-text"><span class="host-label">HOST</span><span class="host-name">${esc(name)}</span></div>
  </a>`;
}
function syncBackLink(){
  const link = document.getElementById('back-link');
  if (!link || !ev || !ev.account_id) return;
  link.href = `./view.html?id=${encodeURIComponent(ev.account_id)}`;
}
function fmtDate(s){
  if (!s) return '日時未定';
  const d = new Date(s.replace(' ', 'T'));
  if (isNaN(d)) return '';
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function markdown(text){
  let html = esc(text || '');
  html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  return html.split(/\n{2,}/).map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
}
function msg(text, ok=true){
  const el = document.getElementById('msg');
  if (!el) return;
  el.textContent = text;
  el.className = 'msg show ' + (ok ? 'ok' : 'err');
  setTimeout(() => el.classList.remove('show'), 3500);
}
let confirmResolve = null;
function confirmDialog(title, text){
  return new Promise(resolve => {
    confirmResolve = resolve;
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-text').textContent = text;
    document.getElementById('confirm-overlay').classList.add('open');
    document.getElementById('confirm-ok').onclick = () => closeConfirm(true);
  });
}
function closeConfirm(result){
  document.getElementById('confirm-overlay').classList.remove('open');
  if (confirmResolve) { confirmResolve(!!result); confirmResolve = null; }
}
function showEditFabIfOwner(){
  const fab = document.getElementById('edit-fab');
  if (!fab || !ev || !currentAccount) return;
  if (Number(currentAccount.id) === Number(ev.account_id)) {
    fab.href = './index.html?edit_event=' + encodeURIComponent(ev.id);
    fab.style.display = 'flex';
  }
}
function isOwner(){
  return !!(ev && currentAccount && Number(currentAccount.id) === Number(ev.account_id));
}
function fmtFileSize(bytes){
  bytes = Number(bytes || 0);
  if (bytes >= 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + 'MB';
  if (bytes >= 1024) return Math.ceil(bytes / 1024) + 'KB';
  return bytes + 'B';
}
function attachmentSection(){
  const files = Array.isArray(ev.attachments) ? ev.attachments : [];
  if (!files.length) return '';
  return `<div class="section-title">参加者向けファイル</div>
    <div class="attachments">
      ${files.map(f => {
        const isPdf = String(f.mime || '').includes('pdf') || String(f.url || '').toLowerCase().endsWith('.pdf');
        return `<a class="attachment" href="${esc(assetUrl(f.url))}" target="_blank" rel="noopener">
          <div class="file-icon">${isPdf ? 'PDF' : 'IMG'}</div>
          <div class="file-body">
            <div class="file-name">${esc(f.name || '添付ファイル')}</div>
            <div class="file-meta">${esc(fmtFileSize(f.size))}</div>
          </div>
          <span>開く</span>
        </a>`;
      }).join('')}
    </div>`;
}
function feeSection(){
  const fees = Array.isArray(ev.fee_items) ? ev.fee_items : [];
  if (!fees.length) return '';
  return `<section class="fees"><div class="fees-title">参加費</div>${fees.map(f => `<div class="fee-row"><span class="fee-label">${esc(f.label)}</span><span class="fee-amount">${esc(f.amount)}</span></div>`).join('')}</section>`;
}
function certificateSection(){
  if (!ev.is_checked_in) return '';
  return `<section class="certificate"><div class="certificate-label">DIGITAL PARTICIPATION PASS</div><div class="certificate-title">✓ 受付済み</div><div class="certificate-note">${esc(ev.title)} に参加した記録です。</div></section>`;
}
function ownerReceptionSection(){
  if (!isOwner()) return '';
  const ready = ev.participant_enabled !== false && ev.checkin_enabled;
  return `<section class="owner-actions">
    <div class="owner-actions-label">主催者メニュー</div>
    ${ready
      ? `<a class="btn primary" href="./checkin.html?event_id=${encodeURIComponent(ev.id)}">QR受付を開始</a>`
      : `<button class="btn primary" type="button" onclick="enableCheckinAndOpen()">参加受付・QR受付を有効にして開始</button>`}
  </section>`;
}

async function safeJson(url, opt = {}){
  try {
    const res = await fetch(url, { credentials:'include', ...opt });
    const text = await res.text();
    try { return { ok:true, data: JSON.parse(text), status: res.status }; }
    catch (e) {
      console.warn('non-JSON response', url, res.status, text.slice(0, 300));
      return { ok:false, status: res.status, raw: text };
    }
  } catch (e) {
    console.warn('fetch failed', url, e);
    return { ok:false, network:true };
  }
}

async function load(){
  const id = parseInt(new URLSearchParams(location.search).get('id') || '0', 10);
  if (!id) { document.getElementById('app').innerHTML = '<div class="empty">イベントが指定されていません。</div>'; return; }

  // メンバーマップを並行ロード
  loadMemberMap();

  // me 取得（失敗しても閲覧は続行）
  const meR = await safeJson(`${API}?action=auth_me`);
  me = (meR.ok && meR.data && meR.data.ok) ? meR.data.data : null;

  // コミュニティアカウントでログイン中か確認（対象イベントの主催者だけ編集ボタンを表示）
  const vaR = await safeJson(`${API}?action=verified_me`);
  currentAccount = (vaR.ok && vaR.data && vaR.data.ok) ? vaR.data.data : null;

  // イベント取得（必要）
  const evR = await safeJson(`${API}?action=event_get&id=${id}`);
  if (!evR.ok || !evR.data) {
    document.getElementById('app').innerHTML = `<div class="empty">イベントを読み込めませんでした。<br><a href="javascript:location.reload()">再読み込み</a></div>`;
    return;
  }
  if (!evR.data.ok) {
    document.getElementById('app').innerHTML = `<div class="empty">${esc(evR.data.error || 'イベントが見つかりません')}</div>`;
    return;
  }
  ev = evR.data.data;
  const targetVaR = await safeJson(`${API}?action=verified_me&account_id=${encodeURIComponent(ev.account_id)}`);
  currentAccount = (targetVaR.ok && targetVaR.data && targetVaR.data.ok) ? targetVaR.data.data : currentAccount;
  const hostR = await safeJson(`${API}?action=verified_public_get&id=${encodeURIComponent(ev.account_id)}`);
  hostAccount = (hostR.ok && hostR.data && hostR.data.ok) ? hostR.data.data : null;
  syncBackLink();
  render();
  showEditFabIfOwner();
  loadSubevents(id);
  loadBoardPreview(ev.account_id);
  loadParticipants(id);
}

function render(){
  document.title = `${ev.title} - Buddies イベント`;
  const fullDate = ev.starts_at && ev.ends_at ? `${fmtDate(ev.starts_at)} 〜 ${fmtDate(ev.ends_at)}` : fmtDate(ev.starts_at);
  const participantEnabled = ev.participant_enabled !== false;
  const isJoined = !!ev.is_joined;
  const isLiked  = !!ev.is_liked;
  const isFull = ev.capacity !== null && ev.join_count >= ev.capacity && !isJoined;

  const isPublic = (ev.visibility || 'public') === 'public';
  const joinButton = participantEnabled ? `
      <button class="btn ${isJoined ? 'active-join' : isFull ? 'full' : 'gold'}" onclick="toggle('join')" ${(isFull || ev.is_checked_in) ? 'disabled' : ''}>
        ${ev.is_checked_in ? '✓ 受付済み' : isJoined ? '✓ 参加中（タップでキャンセル）' : isFull ? '満員（受付終了）' : '参加する'}
      </button>` : '';
  const likeButton = isPublic
    ? `
      <button class="btn ${isLiked ? 'active-like' : 'secondary'}" onclick="toggle('like')">
        ${isLiked ? '♡ お気に入り済み' : '♡ お気に入り'}
      </button>`
    : '';
  const ctaButtons = me
    ? joinButton + likeButton
    : (participantEnabled ? `<a class="btn primary" href="../">ログインして参加する</a>` : '');

  const extLink = ev.external_url
    ? `<a class="btn ${ev.external_button_highlight ? 'gold' : 'secondary'} custom-link" href="${esc(ev.external_url)}" target="_blank" rel="noopener">${esc(ev.external_label || '詳細を開く')}</a>`
    : '';
  const actionButton = eventActionButtonHtml();

  document.getElementById('app').innerHTML = `
    <div class="cover">${ev.cover_url ? `<img src="${esc(assetUrl(ev.cover_url))}" alt="">` : '🎫'}</div>
    <div class="head">
      ${hostHtml()}
      <h1 class="title">${esc(ev.title)}</h1>
      <div class="meta">
        <div><b>📅 日時:</b> ${esc(fullDate)}</div>
        ${ev.venue ? `<div><b>📍 会場:</b> ${esc(ev.venue)}</div>` : ''}
        ${participantEnabled ? (ev.capacity ? `<div><b>👥 定員:</b> ${ev.join_count} / ${ev.capacity}</div>` : `<div><b>👥 参加:</b> ${ev.join_count} 人</div>`) : ''}
        ${(ev.visibility || 'public') === 'public' ? `<div><b>♡ お気に入り:</b> ${ev.like_count || 0} 件</div>` : ''}
      </div>
    </div>
    ${ev.description ? `<div class="desc">${esc(ev.description)}</div>` : ''}
    ${feeSection()}
    <div class="cta">
      ${ctaButtons}
      ${extLink}
      ${actionButton}
    </div>
    ${ownerReceptionSection()}
    ${certificateSection()}
    ${attachmentSection()}
    <div id="msg" class="msg"></div>
    <div id="pinned-board-title" class="section-title" style="display:none;">大切なお知らせ</div>
    <div id="pinned-board-preview" class="board-preview pinned-area"></div>
    <div class="section-title" id="subevents-title" style="display:none;">サブイベント</div>
    <div id="subevents" class="subevents"></div>
    <div id="subevents-toggle" class="subevents-toggle" style="display:none;"></div>
    <div id="board-title" class="section-title" style="display:none;">掲示板</div>
    <div id="board-preview" class="board-preview"></div>
    ${participantEnabled ? `<div class="section-title">参加者（${ev.join_count}人）</div>
    <div id="participants" class="participants"><div class="empty">読み込み中…</div></div>` : ''}
    ${isOwner() ? `<section class="admin-panel">
      <h2>管理用参加者情報</h2>
      <div class="admin-meta">この情報は主催アカウントでログイン中のときだけ表示されます。</div>
      <div class="admin-tools">
        ${participantEnabled ? `<button class="btn secondary" onclick="loadAdminParticipants()">参加者の詳細を表示</button>` : ''}
        <a class="btn secondary" href="./index.html?edit_event=${encodeURIComponent(ev.id)}" target="_blank" rel="noopener">管理画面で編集</a>
      </div>
      <div id="admin-participants"></div>
    </section>` : ''}
  `;
}

async function enableCheckinAndOpen(){
  if (!isOwner()) return;
  const r = await safeJson(`${API}?action=event_update`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      id: ev.id,
      title: ev.title || '',
      description: ev.description || '',
      venue: ev.venue || '',
      fee_items: Array.isArray(ev.fee_items) ? ev.fee_items : [],
      starts_at: ev.starts_at || '',
      ends_at: ev.ends_at || '',
      capacity: ev.capacity || '',
      external_label: ev.external_label || '',
      external_url: ev.external_url || '',
      external_button_highlight: !!ev.external_button_highlight,
      participant_enabled: true,
      checkin_enabled: true,
      action_config: ev.action_config || null,
      visibility: ev.visibility || 'public',
    }),
  });
  if (!r.ok || !r.data || !r.data.ok) {
    msg((r.data && r.data.error) || '受付を開始できませんでした。', false);
    return;
  }
  location.href = `./checkin.html?event_id=${encodeURIComponent(ev.id)}`;
}

async function toggle(kind){
  if (!me) { location.href = '../'; return; }
  if (kind === 'like' && (ev.visibility || 'public') !== 'public') {
    msg('非公開イベントではお気に入り機能を利用できません。', false);
    return;
  }
  const currentlyOn = kind === 'join' ? !!ev.is_joined : !!ev.is_liked;
  const state = currentlyOn ? 'off' : 'on';
  if (kind === 'join' && currentlyOn) {
    const ok = await confirmDialog('参加を取り消しますか？', '参加を取り消すと、参加者向けファイルとサブイベント参加も解除されます。');
    if (!ok) return;
  }
  const r = await safeJson(`${API}?action=event_join`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ event_id: ev.id, kind, state }),
  });
  if (!r.ok || !r.data || !r.data.ok) {
    msg((r.data && r.data.error) || '操作できませんでした', false);
    return;
  }
  const actionConfig = kind === 'join' && state === 'on' ? r.data.data?.action_config : null;
  // 再取得（カウント更新のため）
  const evR = await safeJson(`${API}?action=event_get&id=${ev.id}`);
  if (evR.ok && evR.data && evR.data.ok) {
    ev = evR.data.data;
    render();
    renderSubevents();
    loadSubevents(ev.id);
    loadParticipants(ev.id);
    if (kind === 'join' && state === 'on') showActionPopup(actionConfig || ev.action_config);
  }
}


async function loadSubevents(id){
  const wrap = document.getElementById('subevents');
  const title = document.getElementById('subevents-title');
  if (!wrap || !title) return;
  if (subevents.length) renderSubevents();
  const r = await safeJson(`${API}?action=subevent_list&event_id=${id}`);
  if (!r.ok || !r.data || !r.data.ok) {
    if (subevents.length) renderSubevents();
    return;
  }
  subevents = r.data.data || [];
  renderSubevents();
}
function renderSubevents(){
  const wrap = document.getElementById('subevents');
  const title = document.getElementById('subevents-title');
  const toggleWrap = document.getElementById('subevents-toggle');
  if (!wrap) return;
  if (!subevents.length) {
    wrap.innerHTML = '';
    if (title) title.style.display = 'none';
    if (toggleWrap) { toggleWrap.style.display = 'none'; toggleWrap.innerHTML = ''; }
    return;
  }
  if (title) title.style.display = '';
  const shouldCollapse = subevents.length >= 3 && !subeventsExpanded;
  wrap.innerHTML = subevents.map((s, i) => {
    const dateText = s.starts_at && s.ends_at ? `${fmtDate(s.starts_at)} 〜 ${fmtDate(s.ends_at)}` : fmtDate(s.starts_at);
    const thumb = s.cover_url ? `<img src="${esc(assetUrl(s.cover_url))}" alt="">` : '予定';
    const desc = s.description ? `<div class="s-desc">${esc(s.description)}</div>` : '';
    return `<a class="subevent-card ${shouldCollapse && i >= 2 ? 'is-hidden' : ''}" href="./subevent.html?id=${encodeURIComponent(s.id)}">
      <div class="subevent-thumb">${thumb}</div>
      <div class="s-body">
        <div class="s-title">${esc(s.title)}</div>
        <div class="s-meta">${esc(dateText)}${s.venue ? ' ・ ' + esc(s.venue) : ''}</div>
        ${desc}
      </div>
      <div class="s-arrow">›</div>
    </a>`;
  }).join('');
  if (toggleWrap) {
    if (subevents.length >= 3) {
      toggleWrap.style.display = '';
      toggleWrap.innerHTML = `<button class="btn secondary" style="width:100%;" onclick="toggleSubeventsExpanded()">${subeventsExpanded ? 'サブイベントを折りたたむ' : `すべてのサブイベントを見る（${subevents.length}件）`}</button>`;
    } else {
      toggleWrap.style.display = 'none';
      toggleWrap.innerHTML = '';
    }
  }
}
function toggleSubeventsExpanded(){
  subeventsExpanded = !subeventsExpanded;
  renderSubevents();
}

async function loadBoardPreview(accountId){
  const wrap = document.getElementById('board-preview');
  const title = document.getElementById('board-title');
  const pinnedWrap = document.getElementById('pinned-board-preview');
  const pinnedTitle = document.getElementById('pinned-board-title');
  if (!wrap || !title || !pinnedWrap || !pinnedTitle) return;
  try {
    const r = await safeJson(`${API}?action=verified_post_list&account_id=${encodeURIComponent(accountId)}&limit=4`);
    if (!r.ok || !r.data || !r.data.ok) return;
    boardPosts = r.data.data || [];
  } catch(e) { return; }
  if (!boardPosts.length) {
    title.style.display = 'none';
    wrap.innerHTML = '';
    return;
  }
  const pinned = boardPosts.filter(p => p.pinned).slice(0, 3);
  if (pinned.length) {
    pinnedTitle.style.display = '';
    pinnedWrap.innerHTML = pinned.map(p => `<article class="board-post pinned">
      <div class="board-pin">固定</div>
      <div class="board-date">${esc(fmtDate(p.created_at))}</div>
      ${p.body ? `<div class="board-body">${markdown(p.body)}</div>` : ''}
      ${p.link_url ? `<a class="board-more" href="${esc(p.link_url)}" target="_blank" rel="noopener">${esc(p.link_label || 'リンクを開く')}</a>` : ''}
    </article>`).join('');
  } else {
    pinnedTitle.style.display = 'none';
    pinnedWrap.innerHTML = '';
  }
  const hasMore = boardPosts.length > 3;
  const shown = boardPosts.filter(p => !p.pinned).slice(0, 3);
  title.textContent = '主催者からのお知らせ';
  title.style.display = shown.length || hasMore ? '' : 'none';
  wrap.innerHTML = shown.map(p => `<article class="board-post">
    <div class="board-date">${esc(fmtDate(p.created_at))}</div>
    ${p.body ? `<div class="board-body">${markdown(p.body)}</div>` : ''}
    ${p.link_url ? `<a class="board-more" href="${esc(p.link_url)}" target="_blank" rel="noopener">${esc(p.link_label || 'リンクを開く')}</a>` : ''}
  </article>`).join('') + (hasMore ? `<a class="board-more" href="./board.html?account_id=${encodeURIComponent(accountId)}">もっと見る</a>` : '');
}

let participantsLoading = false;
async function loadParticipants(id){
  const wrap = document.getElementById('participants');
  if (ev && ev.participant_enabled === false) return;
  if (!wrap || participantsLoading) return;
  participantsLoading = true;
  const r = await safeJson(`${API}?action=event_participants&id=${id}`);
  participantsLoading = false;
  if (!r.ok || !r.data) {
    // 静かに失敗（ネットワーク不安定時のリトライ余地のためボタン表示）
    wrap.innerHTML = `<div class="empty">参加者一覧を読み込めませんでした。<br><button class="btn secondary" onclick="loadParticipants(${id})" style="margin-top:8px;">再試行</button></div>`;
    return;
  }
  if (!r.data.ok) { wrap.innerHTML = `<div class="empty">${esc(r.data.error || '読み込みに失敗しました')}</div>`; return; }
  const list = r.data.data || [];
  if (!list.length) { wrap.innerHTML = '<div class="empty">まだ参加者はいません</div>'; return; }
  wrap.innerHTML = list.map(p => {
    let iconUrl = p.user_icon || null;
    if (!iconUrl && p.oshi_member && memberMap[p.oshi_member]?.image) iconUrl = memberMap[p.oshi_member].image;
    const color = (p.oshi_member && memberMap[p.oshi_member]?.color) || '#f2b5cf';
    const icon = iconUrl
      ? `<img src="${esc(assetUrl(iconUrl))}" alt="" onerror="this.parentElement.innerHTML=${JSON.stringify(esc((p.display_name||'？')[0]))}">`
      : esc((p.display_name||'？')[0]);
    const sub = [p.oshi_member, p.location].filter(Boolean).join(' ・ ');
    return `<a class="participant" href="../view.html?id=${p.id}" target="_blank" rel="noopener">
      <div class="avatar" style="background:${esc(color)}">${icon}</div>
      <div style="min-width:0;flex:1;">
        <div class="p-name">${esc(p.display_name || '名無し')}</div>
        ${sub ? `<div class="p-meta">${esc(sub)}</div>` : ''}
      </div>
    </a>`;
  }).join('');
}
async function loadAdminParticipants(){
  const wrap = document.getElementById('admin-participants');
  if (!wrap || !ev) return;
  wrap.innerHTML = '<div class="admin-empty">読み込み中…</div>';
  const r = await safeJson(`${API}?action=event_participants_admin&event_id=${encodeURIComponent(ev.id)}`);
  if (!r.ok || !r.data || !r.data.ok) {
    wrap.innerHTML = `<div class="admin-empty">${esc((r.data && r.data.error) || '管理情報を読み込めませんでした')}</div>`;
    return;
  }
  const rows = r.data.data || [];
  if (!rows.length) {
    wrap.innerHTML = '<div class="admin-empty">参加者はまだいません</div>';
    return;
  }
  wrap.innerHTML = `<div class="admin-list">${rows.map(row => {
    const u = row.user || {};
    const joined = row.joined_at ? `参加: ${esc(fmtDate(row.joined_at))}` : '';
    const received = row.checked_in_at ? `✓ 受付済み: ${esc(fmtDate(row.checked_in_at))}${row.registered_on_site ? '（当日参加登録）' : ''}` : '未受付';
    const profile = `<a class="btn secondary" href="../view.html?id=${encodeURIComponent(u.id)}" target="_blank" rel="noopener">プロフィール</a>`;
    const subeventsText = (row.subevents || []).map(s => s.title).join('、');
    const details = [
      joined,
      received,
      (u.oshi_members || []).length ? `推し: ${esc((u.oshi_members || []).join('、'))}` : '',
      u.location ? `都道府県: ${esc(u.location)}` : '',
      subeventsText ? `サブイベント: ${esc(subeventsText)}` : '',
      (u.tags || []).length ? `タグ: ${esc((u.tags || []).join('、'))}` : '',
    ].filter(Boolean).join('<br>');
    return `<div class="admin-row">
      <div class="admin-row-head">
        <div class="admin-name">${esc(u.display_name || u.username || '名無し')}</div>
        ${profile}
      </div>
      ${details ? `<div class="admin-meta">${details}</div>` : ''}
      ${u.bio ? `<div class="admin-meta">${esc(u.bio)}</div>` : ''}
    </div>`;
  }).join('')}</div>`;
}

window.toggleSubeventsExpanded = toggleSubeventsExpanded;
window.loadAdminParticipants = loadAdminParticipants;
window.enableCheckinAndOpen = enableCheckinAndOpen;
load();
</script>
