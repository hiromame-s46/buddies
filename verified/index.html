<link rel="icon" type="image/png" sizes="16x16" href="../icon/favicon-16x16.png">
<link rel="manifest" href="../icon/site.webmanifest">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--line:#e8e8e8;--ink:#111;--muted:#666;--soft:#f7f7f7;--gold:#e6b422}
body{margin:0;min-height:100dvh;background:var(--soft);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;line-height:1.5;padding-bottom:120px}
.app{max-width:760px;margin:0 auto;min-height:100dvh;background:#fff}
header{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:8px}
header h1{font-size:17px;margin:0;font-weight:800;flex:1}
.crumb{font-size:12px;color:#777;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.crumb:hover{color:#111}
.small{font-size:12px;color:var(--muted);line-height:1.6}
main{padding:16px;display:grid;gap:14px}
.card{border:1px solid var(--line);border-radius:18px;padding:18px;background:#fff}
.account-summary{border:1px solid var(--line);border-radius:18px;padding:16px;background:#fff;display:grid;gap:14px}
.settings-home{display:none;gap:12px}
.settings-home.active{display:grid}
.settings-home .developer-banner{margin-bottom:0}
.settings-home-title{font-size:20px;font-weight:900;margin:4px 0 0}
.settings-home-note{font-size:13px;color:var(--muted);margin:-5px 0 4px}
.settings-menu{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.settings-card{border:1px solid var(--line);border-radius:17px;background:#fff;padding:17px 16px;text-align:left;text-decoration:none;cursor:pointer;display:grid;gap:6px;font:inherit;color:#111;transition:background .18s,border-color .18s}
.settings-card:hover{background:#fafafa;border-color:#d6d6d6}
.settings-card-title{font-size:15px;font-weight:900;display:flex;align-items:center;justify-content:space-between}
.settings-card-title::after{content:"›";color:#aaa;font-size:22px;line-height:1}
.settings-card-desc{font-size:12px;color:var(--muted);line-height:1.6}
.settings-card-count{display:inline-flex;width:max-content;border-radius:9999px;background:#f3f3f3;color:#555;padding:3px 8px;font-size:11px;font-weight:800}
.settings-panel{display:none}
.settings-panel.active{display:grid;gap:14px}
.settings-page-head{display:flex;align-items:center;gap:10px;padding:2px 0}
.settings-back{width:40px;height:40px;border:1px solid var(--line);border-radius:50%;background:#fff;color:#111;font:700 25px/1 inherit;cursor:pointer;display:grid;place-items:center;padding:0 0 2px}
.settings-page-title{font-size:20px;font-weight:900;margin:0}
.settings-page-desc{font-size:12px;color:var(--muted);margin:1px 0 0}
.settings-content{display:grid;gap:12px;padding:2px 0 0}
.settings-content .section-title{margin-bottom:4px}
@media(max-width:560px){.settings-menu{grid-template-columns:minmax(0,1fr)}}
.login{max-width:380px;margin:60px auto}
.field{display:grid;gap:6px;margin-bottom:10px}
.field label{font-size:12px;font-weight:700;color:#555}
.field-row{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px}
@media(max-width:560px){.field-row{grid-template-columns:minmax(0,1fr)}}
.field{min-width:0}
input,textarea,select{width:100%;max-width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 14px;font:inherit;font-size:14px;outline:none;background:#fff;color:#111;min-width:0;display:block;box-sizing:border-box}
input[type=datetime-local]{font-size:13px;padding:10px 12px;width:100%;min-width:0;-webkit-min-logical-width:0;appearance:none;-webkit-appearance:none}
.modal-body{overflow-x:hidden}
input:focus,textarea:focus,select:focus{border-color:#111}
textarea{min-height:96px;resize:vertical;line-height:1.7}
#description,#ev-desc,#form-desc{min-height:172px}
.btn{height:44px;border-radius:9999px;border:1px solid var(--line);background:#fff;color:#111;font:700 14px inherit;padding:0 18px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.primary{background:#111;color:#fff;border-color:#111}
.btn.danger{color:#d33;border-color:#f3c2c2;background:#fff}
.btn.ghost{background:transparent;border-color:transparent;color:#555}
.btn.sm{height:36px;font-size:13px;padding:0 14px}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.section-title{font-size:14px;font-weight:800;margin:0 0 12px;display:flex;align-items:center;gap:8px}
.account-head{display:flex;gap:14px;align-items:center}
.account-icon-btn{width:72px;height:72px;border-radius:50%;background:#f2f2f2;display:grid;place-items:center;color:#888;font-weight:800;font-size:28px;overflow:hidden;flex-shrink:0;border:none;cursor:pointer;padding:0;position:relative}
.account-icon-btn img{width:100%;height:100%;object-fit:cover}
.account-icon-btn .edit-hint{position:absolute;inset:auto 0 0 0;background:rgba(0,0,0,.55);color:#fff;font-size:10px;font-weight:700;padding:2px 0}
.account-head h2{margin:2px 0 2px;font-size:18px}
.verified-label{display:inline-flex;align-items:center;gap:5px;border-radius:9999px;background:#fff;border:1px solid var(--gold);color:#7c5600;font-size:11px;font-weight:800;padding:3px 9px}
.kind{display:inline-block;padding:3px 9px;border-radius:9999px;background:#f3f3f3;color:#555;font-size:11px;font-weight:700;margin-left:6px}
.msg{display:none;padding:10px 12px;border-radius:10px;font-size:13px;font-weight:700;margin-top:10px}
.msg.show{display:block}
.msg.ok{background:#f0fff4;color:#276749}
.msg.err{background:#fff5f5;color:#d33}

/* リンクカード */
.link-card{padding:4px 0 14px;margin-bottom:14px;border-bottom:1px solid var(--line)}
.link-card:last-child{border-bottom:0;margin-bottom:0;padding-bottom:0}
.link-card .link-card-title{font-size:11px;font-weight:800;color:#7c5600;letter-spacing:.04em;margin-bottom:8px;text-transform:uppercase}
.link-card .field{margin-bottom:8px}
.link-card .field:last-child{margin-bottom:0}
.sns-editor{display:grid;gap:8px;margin-top:8px}
.sns-row{display:grid;grid-template-columns:128px minmax(0,1fr) 44px;gap:8px;align-items:center}
.sns-row .btn{width:44px;padding:0}
@media(max-width:560px){.sns-row{grid-template-columns:minmax(0,1fr) 44px}.sns-row input{grid-column:1 / -1;grid-row:2}.sns-row .btn{grid-column:2;grid-row:1}}

/* 固定保存バー */
.save-bar{position:fixed;left:0;right:0;bottom:0;z-index:50;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:12px 16px;display:flex;gap:10px;align-items:center;justify-content:flex-end}
.save-bar .status{flex:1;font-size:12px;color:#666}
.save-bar .status.dirty{color:#b45309;font-weight:700}
.save-bar.saving{background:rgba(255,251,235,.98)}
.save-bar.saved{background:rgba(240,255,244,.98)}
.save-bar.error{background:rgba(255,245,245,.98)}
.save-bar.saving .status{color:#92400e;font-weight:800}
.save-bar.saved .status{color:#276749;font-weight:800}
.save-bar.error .status{color:#d33;font-weight:800}
.save-bar .btn.primary:disabled{opacity:.85}

/* ハーフモーダル */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{background:#fff;width:100%;max-width:560px;border-radius:20px 20px 0 0;max-height:90dvh;display:flex;flex-direction:column;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-head{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.modal-head h3{margin:0;font-size:16px;font-weight:800;flex:1}
.modal-close{background:none;border:none;cursor:pointer;font-size:22px;color:#666;width:36px;height:36px;border-radius:50%;display:grid;place-items:center}
.modal-close:hover{background:#f3f3f3}
.modal-body{padding:18px;overflow:auto;flex:1}
.modal-foot{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}
.modal-sheet .btn,.confirm-box .btn{font-size:13px}
.collab-modal-user{display:flex;gap:12px;align-items:center;border:1px solid var(--line);border-radius:16px;padding:12px;background:#fafafa}
.collab-modal-avatar{width:44px;height:44px;border-radius:50%;background:#eee;display:grid;place-items:center;font-weight:800;overflow:hidden;flex-shrink:0}
.collab-modal-avatar img{width:100%;height:100%;object-fit:cover}
.collab-search-row{grid-template-columns:auto minmax(0,1fr);align-items:center;text-align:left}
.collab-search-row .collab-modal-avatar{grid-row:1 / 3}
.collab-share-box{display:grid;gap:10px;margin-top:14px}.collab-share-url{word-break:break-all;font-size:12px;line-height:1.6;background:#f7f7f7;border:1px solid var(--line);border-radius:14px;padding:10px}
.welcome-icon{width:58px;height:58px;border-radius:50%;background:#111;color:#fff;display:grid;place-items:center;font-size:24px;font-weight:900;margin-bottom:12px}
.welcome-center{text-align:center;display:grid;justify-items:center}.welcome-center .collab-modal-user{width:100%;text-align:left}
#event-modal,#form-modal{align-items:stretch;background:#fff}
#event-modal .modal-sheet,#form-modal .modal-sheet{max-width:760px;height:100dvh;max-height:none;border-radius:0;margin:0 auto;animation:none;box-shadow:none}
#event-modal .modal-head,#form-modal .modal-head{position:sticky;top:0;background:#fff;z-index:2;padding:13px 16px}
#event-modal .modal-body,#form-modal .modal-body{background:#fff;padding-bottom:92px}
#event-modal .modal-foot,#form-modal .modal-foot{position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);backdrop-filter:blur(12px)}
.modal-builder{display:grid;gap:14px}
.builder-jump{display:flex;gap:7px;overflow-x:auto;padding:0 0 2px;scrollbar-width:none}
.builder-jump::-webkit-scrollbar{display:none}
.builder-jump button{height:34px;display:inline-flex;align-items:center;flex-shrink:0;padding:0 12px;border:1px solid var(--line);border-radius:9999px;background:#fff;color:#555;font:800 12px inherit;cursor:pointer}
.builder-jump button:active{background:#f2f2f2;color:#111}
.modal-section{border:0;border-top:1px solid var(--line);padding:18px 0 4px;display:grid;gap:12px;scroll-margin-top:12px}
.modal-section:first-of-type{border-top:0;padding-top:2px}
.modal-section-head{display:grid;gap:3px;margin-bottom:2px}
.modal-section-title{font-size:15px;font-weight:900;color:#111}
.modal-section-note{font-size:12px;color:var(--muted);line-height:1.6}
.modal-section .field{margin-bottom:0}
.modal-section .event-options{margin:0}
.inline-help{font-size:11px;color:var(--muted);line-height:1.6;margin-top:-4px}
.event-option-card:has(input:disabled){opacity:.52;cursor:not-allowed;box-shadow:none}
@media(max-width:560px){.modal-body{padding:14px}.modal-body .field-row{grid-template-columns:minmax(0,1fr)}.modal-section{padding:16px 0 2px}}

/* アイコンクロップ */
.crop-area{display:grid;gap:14px;justify-items:center}
.crop-stage{width:240px;height:240px;border-radius:50%;background:#fafafa;position:relative;overflow:hidden;touch-action:none;border:2px solid #111;cursor:grab;user-select:none}
.crop-stage.grabbing{cursor:grabbing}
.crop-stage canvas{width:100%;height:100%;display:block;pointer-events:none}
.crop-stage-empty{position:absolute;inset:0;display:grid;place-items:center;color:#999;font-size:12px;text-align:center;padding:24px;pointer-events:none}
.crop-controls{display:grid;gap:12px;width:100%;max-width:340px}
.range-row{display:grid;gap:4px}
.range-row label{font-size:12px;color:#555;font-weight:700}

/* イベント */
.event-list{display:grid;gap:10px}
.event-row{border:1px solid var(--line);border-radius:14px;padding:12px 14px;display:grid;gap:6px;background:#fff}
.event-row .title{font-weight:800;font-size:15px;display:flex;align-items:center;gap:8px}
.event-row .vis{font-size:10px;font-weight:800;padding:2px 8px;border-radius:9999px;background:#f3f3f3;color:#666}
.event-row .vis.unlisted{background:#fff4d6;color:#7c5600}
.event-row .meta{font-size:12px;color:var(--muted)}
.event-row .row-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.event-empty{padding:18px;text-align:center;color:#999;font-size:13px;border:1px dashed var(--line);border-radius:14px}
.event-options{display:grid;gap:10px;margin:4px 0 10px}
.event-option-card{display:flex;align-items:flex-start;gap:12px;border:1px solid var(--line);border-radius:16px;background:#fafafa;padding:14px;cursor:pointer;transition:border-color .18s,background .18s,box-shadow .18s}
.event-option-card:hover{background:#fff}
.event-option-card:has(input:checked){border-color:#111;background:#fff;box-shadow:0 6px 18px rgba(0,0,0,.06)}
.event-option-card input{width:22px;height:22px;min-width:22px;margin:1px 0 0;accent-color:#111}
.event-option-body{min-width:0;display:grid;gap:4px}
.event-option-title{font-size:14px;font-weight:900;color:#111;line-height:1.35}
.event-option-desc{font-size:12px;color:#666;line-height:1.65}
.event-option-badge{display:inline-flex;width:max-content;max-width:100%;align-items:center;border-radius:9999px;background:#fff4d6;color:#7c5600;border:1px solid #f3e3a8;font-size:11px;font-weight:900;padding:3px 8px;margin-top:2px}
.event-row-checkin{display:inline-flex;align-items:center;gap:5px;border-radius:9999px;background:#f0fff4;color:#276749;border:1px solid #c6f6d5;padding:3px 9px;font-size:11px;font-weight:900}
.fee-editor{display:grid;gap:8px}
.fee-editor-row{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr) 42px;gap:8px;align-items:center}
.fee-editor-row .btn{width:42px;padding:0}
@media(max-width:560px){.fee-editor-row{grid-template-columns:minmax(0,1fr) minmax(0,1fr) 40px}.fee-editor-row input{padding-left:10px;padding-right:10px}}
@media(max-width:560px){.event-option-card{padding:13px 12px}.event-option-title{font-size:13px}.event-option-desc{font-size:12px}}
.admin-table{display:grid;gap:8px}
.admin-row{border:1px solid var(--line);border-radius:14px;background:#fff;padding:12px;display:grid;gap:6px}
.admin-row-title{font-size:14px;font-weight:800}
.admin-detail{font-size:12px;color:#666;line-height:1.6}
#responses-modal .modal-sheet{max-width:760px}
.form-builder{display:grid;gap:14px}
.form-builder-section{border:0;border-top:1px solid var(--line);padding:18px 0 4px;display:grid;gap:12px;scroll-margin-top:12px}
.form-builder-section:first-of-type{border-top:0;padding-top:2px}
.form-builder-section h4{margin:0;font-size:14px;font-weight:800}
.form-builder-section .hint{font-size:12px;color:var(--muted);margin-top:-6px}
.form-setup-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
@media(max-width:680px){.form-setup-grid{grid-template-columns:minmax(0,1fr)}}
.form-setting-card{border:0;background:#fafafa;border-radius:12px;padding:12px;display:grid;gap:8px}
.form-setting-card label{font-size:12px;font-weight:800;color:#555}
.form-setting-card .small{font-size:11px}
.form-question-toolbar{display:flex;gap:8px;flex-wrap:wrap}
.form-add-group{display:flex;gap:6px;flex-wrap:wrap;align-items:center;background:#fafafa;border-radius:12px;padding:8px}
.form-add-label{font-size:11px;font-weight:900;color:#777;margin-right:2px}
.form-question-row{border:1px solid var(--line);border-radius:16px;background:#fafafa;padding:12px;display:grid;gap:10px}
.form-question-row.section-block{background:#fff8e1;border-color:#f3e3a8}
.form-question-row.collapsed{gap:0;background:#fff}
.form-question-head{display:flex;align-items:center;gap:8px}
.form-question-no{width:28px;height:28px;border-radius:50%;background:#111;color:#fff;display:grid;place-items:center;font-size:12px;font-weight:800;flex-shrink:0}
.form-question-title{font-size:13px;font-weight:800;flex:1}
.form-question-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.question-summary{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
.question-toggle{height:34px;padding:0 12px;border:1px solid var(--line);border-radius:9999px;background:#fff;font:800 12px inherit;cursor:pointer;color:#555}
.form-question-row .field-row{grid-template-columns:minmax(0,1fr) 150px}
.form-question-advanced{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.form-question-advanced input{background:#fff}
.form-option-tools{display:flex;gap:6px;flex-wrap:wrap}
.response-summary{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:12px}
.response-stat{border:1px solid var(--line);border-radius:14px;background:#fafafa;padding:10px 12px}
.response-stat strong{display:block;font-size:18px;line-height:1.2}
.response-stat span{font-size:11px;color:var(--muted);font-weight:700}
.response-tools{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.response-tools input{flex:1;min-width:180px}
.response-card{border:1px solid var(--line);border-radius:16px;background:#fff;padding:14px;display:grid;gap:10px}
.response-head{display:flex;gap:10px;align-items:flex-start;justify-content:space-between}
.response-name{font-size:14px;font-weight:800}
.response-meta{font-size:12px;color:var(--muted)}
.response-answer-grid{display:grid;grid-template-columns:minmax(0,1fr);gap:8px}
.response-answer{border:1px solid #eee;border-radius:12px;background:#fafafa;padding:10px;display:grid;gap:4px}
.response-answer-label{font-size:11px;color:#666;font-weight:800}
.response-answer-value{font-size:13px;color:#111;white-space:pre-wrap;word-break:break-word}
.response-empty-value{color:#999}
@media(max-width:560px){.response-summary{grid-template-columns:minmax(0,1fr)}.response-head{display:grid}.form-question-row .field-row,.form-question-advanced{grid-template-columns:minmax(0,1fr)}}
.subevent-box{margin-top:10px;padding:10px 12px;border-radius:14px;background:#fafafa;border:1px solid var(--line);display:grid;gap:8px}
.subevent-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
.subevent-title{font-size:12px;font-weight:800;color:#555}
.subevent-list{display:grid;gap:6px}
.subevent-row{display:grid;gap:4px;padding:8px 10px;border-radius:12px;background:#fff;border:1px solid #eee}
.subevent-row-title{font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:space-between;gap:8px}
.subevent-row-meta{font-size:11px;color:var(--muted)}
.subevent-row-actions{display:flex;gap:6px;flex-wrap:wrap}
.subevent-cover-preview{width:100%;max-width:240px;aspect-ratio:16/9;border-radius:12px;object-fit:cover;border:1px solid var(--line);display:block;margin-bottom:8px;background:#f2f2f2}
.attachment-list{display:grid;gap:8px;margin-bottom:10px}
.attachment-row{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:12px;background:#fff;padding:9px 10px}
.attachment-row .file-icon{width:32px;height:32px;border-radius:10px;background:#f3f3f3;display:grid;place-items:center;font-weight:800;font-size:11px;color:#555;flex-shrink:0}
.attachment-row .file-body{min-width:0;flex:1}
.attachment-row .file-name{font-size:13px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attachment-row .file-meta{font-size:11px;color:var(--muted)}

.developer-banner{background:#fff8e1;border:1px solid #f3e3a8;border-radius:14px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.developer-banner svg{flex-shrink:0;color:#b45309}
.developer-banner strong{font-size:13px;color:#7c5600}
.developer-banner span{font-size:12px;color:#7c5600}

/* 確認モーダル */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.confirm-overlay.open{display:flex}
.confirm-box{background:#fff;border-radius:18px;max-width:380px;width:100%;padding:20px;display:grid;gap:12px}
.confirm-box h3{margin:0;font-size:16px;font-weight:800}
.confirm-box p{margin:0;font-size:13px;color:#555;line-height:1.6}
.confirm-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
</style>
</head>
<body>
<div class="app">
  <header>
    <a class="crumb" href="../" onclick="return closeOrBack(event)">← Buddies</a>
    <h1>コミュニティ管理</h1>
    <button class="btn sm danger" id="logout-btn" type="button" data-act="logout" hidden>ログアウト</button>
  </header>
  <main id="app"></main>
</div>

<!-- 固定保存バー -->
<div class="save-bar" id="save-bar" hidden>
  <div class="status" id="save-status">変更はありません</div>
  <button class="btn primary" id="save-btn" type="button" data-act="save-all">すべて保存</button>
</div>

<!-- アイコン編集モーダル -->
<div class="modal-overlay" id="icon-modal" onclick="if(event.target===this)closeIconModal()">
  <div class="modal-sheet">
    <div class="modal-head">
      <h3>アイコンを編集</h3>
      <button class="modal-close" type="button" data-act="close-icon">×</button>
    </div>
    <div class="modal-body">
      <div class="crop-area">
        <div class="crop-stage" id="crop-stage">
          <canvas id="crop-canvas" width="400" height="400"></canvas>
          <div class="crop-stage-empty" id="crop-empty">画像が選択されていません</div>
        </div>
        <div class="crop-controls">
          <button class="btn" type="button" onclick="document.getElementById('icon-file').click()">画像を選択</button>
          <input type="file" id="icon-file" accept="image/png,image/jpeg,image/webp" style="display:none;" onchange="loadImageFile(this.files[0])">
          <div class="range-row">
            <label>拡大 <span id="zoom-val" class="small">1.0×</span></label>
            <input type="range" min="1" max="3" step="0.05" value="1" id="zoom-range" oninput="crop.scale=Number(this.value);document.getElementById('zoom-val').textContent=crop.scale.toFixed(2)+'×';drawCrop()">
          </div>
          <p class="small" style="margin:0;">PNG / JPEG / WebP（最大3MB）</p>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" type="button" data-act="close-icon">キャンセル</button>
      <button class="btn primary" type="button" data-act="upload-icon">アイコンを保存</button>
    </div>
  </div>
</div>

<!-- イベント編集モーダル -->
<div class="modal-overlay" id="event-modal" onclick="if(event.target===this)closeEventForm()">
  <div class="modal-sheet">
    <div class="modal-head">
      <button class="modal-close" type="button" data-act="close-event" aria-label="イベント一覧へ戻る">←</button>
      <h3 id="event-modal-title">イベントを編集</h3>
    </div>
    <div class="modal-body" id="event-modal-body"></div>
    <div class="modal-foot">
      <button class="btn" type="button" data-act="close-event">キャンセル</button>
      <button class="btn primary" id="event-save-btn" type="button" data-act="save-event">保存</button>
    </div>
  </div>
</div>

<!-- サブイベント編集モーダル -->
<div class="modal-overlay" id="subevent-modal" onclick="if(event.target===this)closeSubeventForm()">
  <div class="modal-sheet">
    <div class="modal-head">
      <h3 id="subevent-modal-title">サブイベントを編集</h3>
      <button class="modal-close" type="button" data-act="close-subevent">×</button>
    </div>
    <div class="modal-body" id="subevent-modal-body"></div>
    <div class="modal-foot">
      <button class="btn" type="button" data-act="close-subevent">キャンセル</button>
      <button class="btn primary" id="subevent-save-btn" type="button" data-act="save-subevent">保存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="participants-modal" onclick="if(event.target===this)closeParticipantsModal()">
  <div class="modal-sheet">
    <div class="modal-head">
      <h3>参加メンバー管理</h3>
      <button class="modal-close" type="button" onclick="closeParticipantsModal()">×</button>
    </div>
    <div class="modal-body" id="participants-modal-body"></div>
  </div>
</div>

<div class="modal-overlay" id="form-modal" onclick="if(event.target===this)closeFormModal()">
  <div class="modal-sheet">
    <div class="modal-head">
      <button class="modal-close" type="button" onclick="closeFormModal()" aria-label="フォーム一覧へ戻る">←</button>
      <h3 id="form-modal-title">フォームを編集</h3>
    </div>
    <div class="modal-body" id="form-modal-body"></div>
    <div class="modal-foot">
      <button class="btn" type="button" onclick="closeFormModal()">キャンセル</button>
      <button class="btn primary" type="button" onclick="saveForm()">保存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="responses-modal" onclick="if(event.target===this)closeResponsesModal()">
  <div class="modal-sheet">
    <div class="modal-head">
      <h3>回答一覧</h3>
      <button class="modal-close" type="button" onclick="closeResponsesModal()">×</button>
    </div>
    <div class="modal-body" id="responses-modal-body"></div>
  </div>
</div>

<div class="modal-overlay" id="collab-modal" onclick="if(event.target===this)closeCollaboratorModal()">
  <div class="modal-sheet">
    <div class="modal-head">
      <h3 id="collab-modal-title">共同運営者を招待</h3>
      <button class="modal-close" type="button" onclick="closeCollaboratorModal()">×</button>
    </div>
    <div class="modal-body" id="collab-modal-body"></div>
  </div>
</div>

<div class="modal-overlay" id="welcome-modal" onclick="if(event.target===this)closeWelcomeModal()">
  <div class="modal-sheet">
    <div class="modal-head">
      <h3>共同運営者</h3>
      <button class="modal-close" type="button" onclick="closeWelcomeModal()">×</button>
    </div>
    <div class="modal-body" id="welcome-modal-body"></div>
  </div>
</div>

<!-- 確認モーダル -->
<div class="confirm-overlay" id="confirm-overlay" onclick="if(event.target===this)closeConfirm()">
  <div class="confirm-box">
    <h3 id="confirm-title">確認</h3>
    <p id="confirm-text"></p>
    <div class="confirm-actions">
      <button class="btn" type="button" data-act="close-confirm">キャンセル</button>
      <button class="btn primary" id="confirm-ok" type="button">OK</button>
    </div>
  </div>
</div>

<script>
const API = '../api.php';
const selectedAccountId = new URLSearchParams(location.search).get('account_id') || '';
let account = null;
let isDeveloper = false;
let activeSettingsTab = 'menu';
const crop = { img:null, scale:1, x:0, y:0, dragStart:null, startX:0, startY:0 };
let pendingIcon = null; // 未保存のアイコンデータURL
let dirty = false;
let verifiedSns = [];
let myEvents = [];
let subeventsByEvent = {};
let editingEventId = null;
let editingFeeItems = [];
let pendingEventCover = null;
let pendingEventAttachments = [];
let pendingExistingAttachment = null;
let myForms = [];
let editingFormId = null;
let expandedFormQuestion = null;
let formQuestions = [];
let responseView = { form:null, questions:[], rows:[] };
let editingSubeventId = null;
let editingSubeventEventId = null;
let collaboratorSearchTimer = null;
let collaboratorSelectedUser = null;
let collaboratorInvitePayload = null;

function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function assetUrl(url){
  if (!url) return '';
  if (/^https?:\/\//.test(url) || url.startsWith('data:') || url.startsWith('/')) return url;
  if (url.startsWith('../')) return url;
  return '../' + url.replace(/^\.\//, '');
}
function tagsText(a){return (a.hashtags||[]).join(', ')}
function val(id){const el=document.getElementById(id);return el?el.value.trim():'';}
function snsLabel(type){return ({x:'X',threads:'Threads',instagram:'Instagram',tiktok:'TikTok',youtube:'YouTube',github:'GitHub',line:'LINE',note:'note',ameba:'Ameba',link:'その他リンク'})[type] || 'その他リンク';}
function accountSnsLinks(a){
  const links = Array.isArray(a.sns_links) ? a.sns_links.filter(s => s && s.url) : [];
  if (a.x_url && !links.some(s => s.url === a.x_url)) links.unshift({ type:'x', url:a.x_url, label:'X' });
  return links.map(s => ({ type:s.type || 'link', url:s.url || '', label:s.label || '' }));
}
function snsEditorHtml(){
  const options = ['x','threads','instagram','tiktok','youtube','github','line','note','ameba','link'];
  return `<div class="sns-editor" id="sns-editor">
    ${verifiedSns.map((s,i)=>`
      <div class="sns-row">
        <select onchange="updateVerifiedSns(${i},'type',this.value)">
          ${options.map(type => `<option value="${type}" ${s.type===type?'selected':''}>${snsLabel(type)}</option>`).join('')}
        </select>
        <input value="${esc(s.url||'')}" placeholder="https://..." oninput="updateVerifiedSns(${i},'url',this.value)">
        <button class="btn" type="button" onclick="removeVerifiedSns(${i})" aria-label="削除">×</button>
      </div>
    `).join('')}
  </div>
  <button class="btn sm" type="button" onclick="addVerifiedSns()">+ SNSリンクを追加</button>`;
}
function renderVerifiedSns(){
  const wrap = document.getElementById('sns-editor-wrap');
  if (wrap) wrap.innerHTML = snsEditorHtml();
}
function addVerifiedSns(){ verifiedSns.push({type:'x',url:'',label:''}); renderVerifiedSns(); setDirty(true); }
function updateVerifiedSns(i,k,v){ if (!verifiedSns[i]) return; verifiedSns[i][k] = v; setDirty(true); }
function removeVerifiedSns(i){ verifiedSns.splice(i,1); renderVerifiedSns(); setDirty(true); }
function closeOrBack(e){
  if (window.opener && !window.opener.closed) { e.preventDefault(); window.close(); return false; }
  return true;
}
function msg(id, text, ok=true){
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.className = 'msg show ' + (ok ? 'ok' : 'err');
  setTimeout(() => { if (el.textContent === text) el.classList.remove('show'); }, 4000);
}
function eventMsg(text, ok=true){
  const inModal = document.getElementById('event-modal')?.classList.contains('open') && document.getElementById('event-editor-msg');
  msg(inModal ? 'event-editor-msg' : 'event-msg', text, ok);
}
function formMsg(text, ok=true){
  const inModal = document.getElementById('form-modal')?.classList.contains('open') && document.getElementById('form-editor-msg');
  msg(inModal ? 'form-editor-msg' : 'form-msg', text, ok);
}
async function copyManagedLink(path, kind='event'){
  try {
    await navigator.clipboard.writeText(new URL(path, location.href).href);
    (kind === 'form' ? formMsg : eventMsg)('共有リンクをコピーしました', true);
  } catch (e) {
    (kind === 'form' ? formMsg : eventMsg)('リンクをコピーできませんでした', false);
  }
}
function showsSaveBar(){
  return !!account && ['profile','links'].includes(activeSettingsTab);
}
function scrollModalSection(id){
  document.getElementById(id)?.scrollIntoView({behavior:'smooth', block:'start'});
}
function setDirty(v){
  dirty = v;
  const bar = document.getElementById('save-bar');
  const status = document.getElementById('save-status');
  if (!bar || !status) return;
  bar.hidden = !showsSaveBar();
  bar.classList.remove('saving','saved','error');
  if (v) { status.textContent = '未保存の変更があります'; status.classList.add('dirty'); }
  else   { status.textContent = '変更はありません'; status.classList.remove('dirty'); }
}
function setSaveState(state, text){
  const bar = document.getElementById('save-bar');
  const status = document.getElementById('save-status');
  if (!bar || !status) return;
  bar.hidden = !showsSaveBar();
  bar.classList.remove('saving','saved','error');
  if (state) bar.classList.add(state);
  status.textContent = text;
  status.classList.toggle('dirty', state === 'error');
}
function switchSettingsTab(tab){
  const allowed = ['menu','profile','links','events','forms','collaborators','security'];
  if (!allowed.includes(tab)) tab = 'menu';
  activeSettingsTab = tab;
  document.querySelectorAll('.settings-home').forEach(home => home.classList.toggle('active', tab === 'menu'));
  document.querySelectorAll('.settings-panel').forEach(panel => panel.classList.toggle('active', panel.dataset.settingsPanel === tab));
  const bar = document.getElementById('save-bar');
  if (bar) bar.hidden = !showsSaveBar();
  window.scrollTo({ top:0, left:0, behavior:'auto' });
}
function confirmDialog(title, text){
  return new Promise(resolve => {
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-text').textContent = text;
    const ov = document.getElementById('confirm-overlay');
    ov.classList.add('open');
    const okBtn = document.getElementById('confirm-ok');
    const handler = () => { okBtn.removeEventListener('click', handler); ov.classList.remove('open'); resolve(true); };
    okBtn.addEventListener('click', handler);
    window._confirmReject = () => { okBtn.removeEventListener('click', handler); resolve(false); };
  });
}
function closeConfirm(){ document.getElementById('confirm-overlay').classList.remove('open'); if(window._confirmReject) window._confirmReject(); }

async function api(action, payload=null){
  const opt = { credentials:'include' };
  if (payload) { opt.method='POST'; opt.headers={'Content-Type':'application/json'}; opt.body=JSON.stringify(payload); }
  const accountParam = selectedAccountId ? `&account_id=${encodeURIComponent(selectedAccountId)}` : '';
  const res = await fetch(`${API}?action=${action}${accountParam}`, opt);
  const text = await res.text();
  try { return JSON.parse(text); }
  catch(e) {
    console.error(`[api:${action}] non-JSON response (HTTP ${res.status})`, text.slice(0, 1000));
    return { ok:false, error:`サーバーエラー (HTTP ${res.status})。詳細はコンソールを確認してください。` };
  }
}

async function init(){
  const json = await api('verified_me').catch(() => ({ ok:false }));
  account = json.ok ? json.data : null;
  isDeveloper = !!(account && account.account_type === 'developer');
  document.getElementById('logout-btn').hidden = !account;
  render();
  setTimeout(handleAdminOpenParams, 600);
}

function render(){
  const root = document.getElementById('app');
  if (!account) {
    const inviteToken = normalizeInviteToken(new URLSearchParams(location.search).get('invite') || '');
    if (inviteToken) {
      root.innerHTML = `<div class="card login">
        <h2 style="margin:0 0 8px;font-size:22px;">共同運営者の招待</h2>
        <p class="small" style="margin:0 0 16px;">Buddies profile の一般アカウントでログインし、この招待を受けるとコミュニティ管理機能を利用できます。招待されたアカウント以外では承認できません。</p>
        <div class="field"><label>ユーザー名</label><input id="invite-login-id" autocomplete="username"></div>
        <div class="field"><label>パスワード</label><input id="invite-login-pass" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')acceptInviteLogin('${esc(inviteToken)}')"></div>
        <button class="btn primary" style="width:100%;margin-top:6px;" onclick="acceptInviteLogin('${esc(inviteToken)}')">ログインして招待を受ける</button>
        <button class="btn" style="width:100%;margin-top:8px;" onclick="acceptInvite('${esc(inviteToken)}')">ログイン済みなので招待を受ける</button>
        <div id="login-msg" class="msg"></div>
      </div>`;
      document.getElementById('save-bar').hidden = true;
      return;
    }
    root.innerHTML = `<div class="card login">
      <h2 style="margin:0 0 8px;font-size:22px;">コミュニティ管理ログイン</h2>
      <p class="small" style="margin:0 0 16px;">コミュニティアカウント本人、または共同運営者として連携済みのBuddies profileアカウントでログインできます。</p>
      <div class="field"><label>ログインID</label><input id="login-id" autocomplete="username"></div>
      <div class="field"><label>パスワード</label><input id="login-pass" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"></div>
      <button class="btn primary" style="width:100%;margin-top:6px;" onclick="login()">ログイン</button>
      <div id="login-msg" class="msg"></div>
    </div>`;
    document.getElementById('save-bar').hidden = true;
    return;
  }

  const kindLabel = account.account_type === 'developer' ? '開発者アカウント' : 'コミュニティアカウント';
  const isOwner = account.is_owner !== false;
  verifiedSns = accountSnsLinks(account);
  root.innerHTML = `
    <div class="settings-home" data-settings-home>
      ${isDeveloper ? `
        <div class="developer-banner">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <div><strong>開発者セッション</strong><br><span>管理者向け機能とコミュニティアカウントの管理が利用できます。<a href="../admin.html" style="color:#7c5600;font-weight:800;">コミュニティアカウント一覧へ →</a></span></div>
        </div>
      ` : ''}
      <section class="account-summary">
        <div class="account-head">
          <button class="account-icon-btn" type="button" data-act="open-icon" title="タップしてアイコンを編集">
            ${account.icon_url ? `<img src="../${esc(account.icon_url)}?_=${Date.now()}" alt="">` : esc((account.display_name||'？')[0])}
            <span class="edit-hint">編集</span>
          </button>
          <div style="min-width:0;flex:1;">
            <span class="verified-label">✓ ${esc(account.label || kindLabel)}</span><span class="kind">${esc(kindLabel)}</span>
            ${!isOwner ? `<span class="kind">共同運営者</span>` : ''}
            <h2>${esc(account.display_name)}</h2>
            <div class="small">${esc(account.account_definition || '')}</div>
          </div>
        </div>
      </section>
      <div>
        <h2 class="settings-home-title">管理メニュー</h2>
        <p class="settings-home-note">編集する項目を選択してください。</p>
      </div>
      <div class="settings-menu">
        <button class="settings-card" type="button" onclick="switchSettingsTab('profile')">
          <span class="settings-card-title">プロフィール</span>
          <span class="settings-card-desc">表示名、説明文、ハッシュタグを編集</span>
        </button>
        <button class="settings-card" type="button" onclick="switchSettingsTab('links')">
          <span class="settings-card-title">リンク</span>
          <span class="settings-card-desc">公式リンク、SNS、誘導ボタンを管理</span>
        </button>
        <button class="settings-card" type="button" onclick="switchSettingsTab('events')">
          <span class="settings-card-title">イベント</span>
          <span class="settings-card-desc">イベント、受付、参加者、サブイベントを管理</span>
          <span class="settings-card-count" id="events-count">読み込み中</span>
        </button>
        <button class="settings-card" type="button" onclick="switchSettingsTab('forms')">
          <span class="settings-card-title">フォーム</span>
          <span class="settings-card-desc">アンケート作成と回答データを管理</span>
          <span class="settings-card-count" id="forms-count">読み込み中</span>
        </button>
        <button class="settings-card" type="button" onclick="switchSettingsTab('collaborators')">
          <span class="settings-card-title">共同運営者</span>
          <span class="settings-card-desc">${isOwner ? '一般アカウントを招待して管理権限を共有' : '共同運営者として参加中'}</span>
        </button>
        <a class="settings-card" href="./view.html?id=${encodeURIComponent(account.id)}" target="_blank" rel="noopener">
          <span class="settings-card-title">掲示板</span>
          <span class="settings-card-desc">公開ページで告知投稿と添付ファイルを管理</span>
        </a>
        ${isOwner ? `<button class="settings-card" type="button" onclick="switchSettingsTab('security')">
          <span class="settings-card-title">セキュリティ</span>
          <span class="settings-card-desc">ログインパスワードを変更</span>
        </button>` : ''}
      </div>
    </div>

    <div class="settings-panel active" data-settings-panel="profile">
      <div class="settings-page-head"><button class="settings-back" type="button" onclick="switchSettingsTab('menu')" aria-label="管理メニューへ戻る">←</button><div><h2 class="settings-page-title">プロフィール</h2><p class="settings-page-desc">公開プロフィールに表示する基本情報</p></div></div>
      <section class="settings-content">
        <div class="field"><label>表示名</label><input id="display_name" maxlength="100" value="${esc(account.display_name)}" oninput="setDirty(true)"></div>
        <div class="field"><label>ラベル（バッジ表示文言）</label><input id="label" maxlength="80" value="${esc(account.label||'')}" placeholder="${esc(kindLabel)}" oninput="setDirty(true)"></div>
        <div class="field"><label>説明文</label><textarea id="description" maxlength="2000" placeholder="アカウントの説明（プロフィール詳細に表示されます）" oninput="setDirty(true)">${esc(account.description||'')}</textarea></div>
        <div class="field"><label>ハッシュタグ（カンマ区切り・最大6つ）</label><input id="hashtags" value="${esc(tagsText(account))}" placeholder="例: 推し活, イベント" oninput="setDirty(true)"></div>
      </section>
    </div>

    <div class="settings-panel" data-settings-panel="links">
      <div class="settings-page-head"><button class="settings-back" type="button" onclick="switchSettingsTab('menu')" aria-label="管理メニューへ戻る">←</button><div><h2 class="settings-page-title">リンク</h2><p class="settings-page-desc">公開ページから案内するリンク</p></div></div>

async function acceptInviteLogin(token){
  const login_id = val('invite-login-id');
  const password = val('invite-login-pass');
  if (!login_id || !password) { msg('login-msg', 'ユーザー名とパスワードを入力してください', false); return; }
  const auth = await api('auth_login', { username:login_id, password });
  if (!auth.ok) { msg('login-msg', auth.error || 'ログインできませんでした', false); return; }
  await acceptInvite(token);

function normalizeInviteToken(raw){
  raw = String(raw || '').trim();
  if (!raw) return '';
  try {
    const url = new URL(raw);
    raw = url.searchParams.get('invite') || raw;
  } catch(e) {}
  return raw.trim().replace(/[^a-fA-F0-9]/g, '').toLowerCase();
}
async function acceptInvite(token){
  token = normalizeInviteToken(token);
  const json = await api('verified_collaborator_invite_accept', { token });
  if (!json.ok) { msg('login-msg', json.error || '招待を承認できませんでした', false); return; }
  account = json.data.account;
  isDeveloper = account && account.account_type === 'developer';
  document.getElementById('logout-btn').hidden = false;
  history.replaceState(null, '', location.pathname);
  render();
  openWelcomeModal(!!json.data.already_accepted);
}

function openIconModal(){
  document.getElementById('icon-modal').classList.add('open');

}
function closeIconModal(){
  document.getElementById('icon-modal').classList.remove('open');

function loadImageFile(file){
  if (!file) return;
  const img = new Image();
  img.onload = () => {
    crop.img = img; crop.x = 0; crop.y = 0; crop.scale = 1;
    const zr = document.getElementById('zoom-range');
    if (zr) { zr.value = 1; document.getElementById('zoom-val').textContent = '1.00×'; }
    const empty = document.getElementById('crop-empty');
    if (empty) empty.style.display = 'none';
    drawCrop();
  };
  img.src = URL.createObjectURL(file);
}
function drawCrop(){
  const canvas = document.getElementById('crop-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#fafafa';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  if (!crop.img) return;
  const base = Math.max(canvas.width / crop.img.width, canvas.height / crop.img.height) * crop.scale;
  const w = crop.img.width * base;
  const h = crop.img.height * base;
  ctx.drawImage(crop.img, (canvas.width-w)/2 + crop.x, (canvas.height-h)/2 + crop.y, w, h);
}
function setupCropDrag(){
  const stage = document.getElementById('crop-stage');
  if (!stage || stage.dataset.bound) return;
  stage.dataset.bound = '1';
  const getPoint = (e) => e.touches && e.touches[0] ? { x: e.touches[0].clientX, y: e.touches[0].clientY } : { x: e.clientX, y: e.clientY };
  const onDown = (e) => {
    if (!crop.img) return;
    const p = getPoint(e);
    crop.dragStart = p;
    crop.startX = crop.x; crop.startY = crop.y;
    stage.classList.add('grabbing');
    e.preventDefault();
  };
  const onMove = (e) => {
    if (!crop.dragStart) return;
    const p = getPoint(e);
    const rect = stage.getBoundingClientRect();
    if (!rect.width) return;
    const k = 400 / rect.width;
    crop.x = crop.startX + (p.x - crop.dragStart.x) * k;
    crop.y = crop.startY + (p.y - crop.dragStart.y) * k;
    drawCrop();
    e.preventDefault();
  };
  const onUp = () => { crop.dragStart = null; stage.classList.remove('grabbing'); };
  stage.addEventListener('mousedown', onDown);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  stage.addEventListener('touchstart', onDown, {passive:false});
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('touchend', onUp);
}
async function uploadImage(){
  const canvas = document.getElementById('crop-canvas');
  if (!crop.img) { return; }
  const out = document.createElement('canvas');
  out.width = 400; out.height = 400;
  const octx = out.getContext('2d');
  octx.save(); octx.beginPath(); octx.arc(200,200,200,0,Math.PI*2); octx.clip();
  octx.drawImage(canvas, 0, 0); octx.restore();
  const data = out.toDataURL('image/png');
  const json = await api('verified_upload_icon', { image:data });
  if (!json.ok) { alert(json.error||'画像を保存できませんでした'); return; }
  const me = await api('verified_me');
  account = me.data;
  closeIconModal();
  render();
}

function fmtDateLocalInput(s){
  if (!s) return '';
  const d = new Date(s.replace(' ', 'T'));
  if (isNaN(d)) return '';
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function fmtDateDisplay(s){
  if (!s) return '';
  const d = new Date(s.replace(' ', 'T'));
  if (isNaN(d)) return '';
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function fmtFileSize(bytes){
  bytes = Number(bytes || 0);
  if (bytes >= 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + 'MB';
  if (bytes >= 1024) return Math.ceil(bytes / 1024) + 'KB';
  return bytes + 'B';
}
function defaultAttachmentName(file){
  const name = String(file?.name || '添付ファイル').replace(/\.[^.]+$/, '').trim();
  return name || '添付ファイル';
}
function readFileAsDataUrl(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error || new Error('file read failed'));
    reader.readAsDataURL(file);
  });
}
function validateEventCoverFile(file){
  if (!file) return false;
  if (!['image/png','image/jpeg','image/webp'].includes(file.type)) {
    eventMsg('カバー画像はPNG/JPEG/WebPのみアップロードできます', false);
    return false;
  }

async function saveEvent(){
  const saveBtn = document.getElementById('event-save-btn');
  const isNew = !editingEventId;
  const payload = {
    title: val('ev-title'),
    description: val('ev-desc'),
    venue: val('ev-venue'),
    fee_items: editingFeeItems.map(item => ({label:String(item.label || '').trim(), amount:String(item.amount || '').trim()})).filter(item => item.label && item.amount),
    starts_at: val('ev-starts'),
    ends_at: val('ev-ends'),
    capacity: val('ev-capacity'),
    external_label: val('ev-extlabel'),
    external_url: val('ev-exturl'),
    external_button_highlight: document.getElementById('ev-ext-highlight')?.checked || false,
    participant_enabled: document.getElementById('ev-participant-enabled')?.checked !== false,
    checkin_enabled: document.getElementById('ev-checkin-enabled')?.checked || false,
    visibility: val('ev-visibility') || 'public',
  };
  const action = editingEventId ? 'event_update' : 'event_create';
  if (editingEventId) payload.id = editingEventId;
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = isNew ? '作成中…' : '更新中…'; }
  const json = await api(action, payload);
  if (!json.ok) {
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = editingEventId ? '更新' : '作成'; }
    eventMsg(json.error || '保存できませんでした', false);
    return;
  }
  const savedId = editingEventId || json.data?.id;
  const uploadErrors = [];
  if (isNew && savedId) {
    if (saveBtn) saveBtn.textContent = 'ファイルをアップロード中…';
    if (pendingEventCover) {
      try {
        const data = await readFileAsDataUrl(pendingEventCover);
        const coverJson = await api('event_upload_cover', { id:savedId, image:data });
        if (!coverJson.ok) uploadErrors.push(coverJson.error || 'カバー画像を保存できませんでした');
      } catch(e) {
        uploadErrors.push('カバー画像を読み込めませんでした');
      }
    }
    for (const item of pendingEventAttachments) {
      try {
        const data = await readFileAsDataUrl(item.file);
        const fileJson = await api('event_upload_attachment', { id:savedId, name:item.name || defaultAttachmentName(item.file), file:data });
        if (!fileJson.ok) uploadErrors.push(`${item.name || item.file.name}: ${fileJson.error || '保存できませんでした'}`);
      } catch(e) {
        uploadErrors.push(`${item.name || item.file.name}: 読み込めませんでした`);
      }
    }
  }
  if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = editingEventId ? '更新' : '作成'; }

function ensureQuestionOptions(q){

          <div class="form-option-tools">
            <button class="btn sm" type="button" onclick="setFormQuestionOptions(${i}, ['はい','いいえ'])">はい/いいえ</button>
            <button class="btn sm" type="button" onclick="setFormQuestionOptions(${i}, ['参加','不参加','未定'])">参加確認</button>
            <button class="btn sm" type="button" onclick="setFormQuestionOptions(${i}, ['とても良い','良い','普通','改善してほしい'])">満足度</button>
          </div>

      ${q.type === 'section' ? '<div class="small">回答項目をまとめる説明用ブロックです。</div>' : `<label class="small"><input type="checkbox" ${q.required?'checked':''} onchange="formQuestions[${i}].required=this.checked?1:0"> 必須項目にする</label>`}
      <div class="form-question-actions">
        <button class="btn sm" type="button" ${i===0?'disabled':''} onclick="moveFormQuestion(${i},-1)">上へ</button>
        <button class="btn sm" type="button" ${i===formQuestions.length-1?'disabled':''} onclick="moveFormQuestion(${i},1)">下へ</button>
        <button class="btn sm danger" type="button" onclick="removeFormQuestion(${i})">削除</button>
      </div>` : ''}
    </div>`}).join('');
}
function toggleFormQuestion(i){ expandedFormQuestion = expandedFormQuestion === i ? null : i; renderFormQuestions(); }
function addFormQuestion(type = 'text'){
  if (formQuestions.length >= 30) {
    formMsg('質問は30件まで追加できます。', false);
    return;
  }
  const q = {id:'q'+Date.now()+Math.random().toString(16).slice(2),label:'',type,required:0,options:[],help:'',placeholder:''};
  ensureQuestionOptions(q);
  formQuestions.push(q);
  expandedFormQuestion = formQuestions.length - 1;
  renderFormQuestions();
}
function removeFormQuestion(i){
  formQuestions.splice(i,1);
  expandedFormQuestion = formQuestions.length ? Math.min(i, formQuestions.length - 1) : null;
  renderFormQuestions();
}
function moveFormQuestion(i, dir){
  const next = i + dir;
  if (next < 0 || next >= formQuestions.length) return;
  const tmp = formQuestions[i];
  formQuestions[i] = formQuestions[next];
  formQuestions[next] = tmp;
  if (expandedFormQuestion === i) expandedFormQuestion = next;
  else if (expandedFormQuestion === next) expandedFormQuestion = i;
  renderFormQuestions();
}
function setFormQuestionOptions(i, options){
  if (!formQuestions[i]) return;
  formQuestions[i].options = options;
  renderFormQuestions();
}

function responseValueText(value){
  if (Array.isArray(value)) return value.join('、');
  return value == null ? '' : String(value);
}
function renderResponsesTable(){
  const wrap = document.getElementById('response-table');
  if (!wrap) return;
  const keyword = val('response-search').toLowerCase();
  const qs = responseView.questions || [];
  const rows = (responseView.rows || []).filter(r => {
    if (!keyword) return true;
    const haystack = [r.respondent_name || '匿名', r.created_at || '']
      .concat(qs.map(q => responseValueText((r.answers || {})[q.id])))
      .join(' ')
      .toLowerCase();
    return haystack.includes(keyword);
  });
  if (!rows.length) {
    wrap.innerHTML = '<div class="event-empty">表示できる回答がありません</div>';
    return;
  }
  wrap.innerHTML = `<div class="admin-table">${rows.map(r=>`
    <div class="response-card">
      <div class="response-head">
        <div>
          <div class="response-name">${esc(r.respondent_name || '匿名')}</div>
          <div class="response-meta">${esc(fmtDateDisplay(r.created_at) || '')}</div>
        </div>
        ${r.user_id ? `<a class="btn sm" href="../view.html?id=${r.user_id}" target="_blank" rel="noopener">プロフィール</a>` : ''}
      </div>
      <div class="response-answer-grid">
        ${qs.map(q=>{
          const text = responseValueText((r.answers || {})[q.id]);
          return `<div class="response-answer">
            <div class="response-answer-label">${esc(q.label || '質問')}</div>
            <div class="response-answer-value ${text ? '' : 'response-empty-value'}">${esc(text || '未回答')}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('')}</div>`;
}
function csvEscape(value){
  return `"${String(value == null ? '' : value).replace(/"/g, '""')}"`;
}
function downloadResponsesCsv(){
  const form = responseView.form || {};
  const qs = responseView.questions || [];
  const rows = responseView.rows || [];
  const header = ['回答日時','回答者'].concat(qs.map(q => q.label || '質問'));
  const lines = [header.map(csvEscape).join(',')];
  rows.forEach(r => {
    const values = [r.created_at || '', r.respondent_name || '匿名'].concat(qs.map(q => responseValueText((r.answers || {})[q.id])));
    lines.push(values.map(csvEscape).join(','));
  });
  const blob = new Blob(['\uFEFF' + lines.join('\n')], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${(form.title || 'form-responses').replace(/[\\/:*?"<>|]/g, '_')}_responses.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

        <input id="sub-participant-enabled" type="checkbox" ${!s || s.participant_enabled !== false ? 'checked' : ''}>
        <span class="event-option-body">
          <span class="event-option-title">参加者を集計する</span>
          <span class="event-option-desc">オンにするとサブイベントページに「参加する」ボタンと参加者数を表示します。メインイベントと別に設定できます。</span>
        </span>
      </label>
    </div>
    <div class="field"><label>外部リンク文言</label><input id="sub-extlabel" maxlength="80" value="${esc(s?.external_label || '')}" placeholder="例: 詳細を見る"></div>
    <div class="field"><label>外部リンクURL</label><input id="sub-exturl" value="${esc(s?.external_url || '')}" placeholder="https://..."></div>
    <div class="event-options">
      <label class="event-option-card">
        <input id="sub-ext-highlight" type="checkbox" ${s?.external_button_highlight ? 'checked' : ''}>
        <span class="event-option-body">
          <span class="event-option-title">外部リンクボタンを目立たせる</span>
          <span class="event-option-desc">集合場所や詳細ページなど、優先して開いてほしいリンクを黄色の強調ボタンで表示します。</span>
          <span class="event-option-badge">黄色ボタン</span>
        </span>
      </label>
    </div>
    ${id ? `<div class="field">
      <label>カバー画像</label>
      ${s?.cover_url ? `<img class="subevent-cover-preview" src="../${esc(s.cover_url)}" alt="">` : ''}
      <input type="file" accept="image/png,image/jpeg,image/webp" onchange="uploadSubeventCover(${id}, this.files[0])">
    </div>` : '<p class="small">※カバー画像は保存後にアップロードできます</p>'}
    <p class="small" style="margin:0;">サブイベントでは参加のみ利用できます。表示順は開始日時が早い順で自動調整されます。お気に入り機能はありません。</p>
  `;
  document.getElementById('subevent-modal').classList.add('open');
}
function closeSubeventForm(){
  editingSubeventId = null;
  editingSubeventEventId = null;
  document.getElementById('subevent-modal').classList.remove('open');
}
async function saveSubevent(){
  const payload = {
    event_id: editingSubeventEventId,
    title: val('sub-title'),
    description: val('sub-desc'),
    venue: val('sub-venue'),
    starts_at: val('sub-starts'),
    ends_at: val('sub-ends'),
    capacity: val('sub-capacity'),
    external_label: val('sub-extlabel'),
    external_url: val('sub-exturl'),
    external_button_highlight: document.getElementById('sub-ext-highlight')?.checked || false,
    participant_enabled: document.getElementById('sub-participant-enabled')?.checked !== false,
  };
  const action = editingSubeventId ? 'subevent_update' : 'subevent_create';
  if (editingSubeventId) payload.id = editingSubeventId;
  const json = await api(action, payload);
  if (!json.ok) { msg('event-msg', json.error || '保存できませんでした', false); return; }
  msg('event-msg', editingSubeventId ? 'サブイベントを更新しました' : 'サブイベントを作成しました', true);
  closeSubeventForm();
  loadEvents();
}
async function deleteSubevent(id){
  const ok = await confirmDialog('サブイベントを削除', 'このサブイベントを削除しますか？この操作は取り消せません。');
  if (!ok) return;
  const json = await api('subevent_delete', { id });
  if (!json.ok) { msg('event-msg', json.error || '削除できませんでした', false); return; }
  msg('event-msg', 'サブイベントを削除しました', true);
  loadEvents();
}


function handleAdminOpenParams(){
  if (!account) return;
  const qs = new URLSearchParams(location.search);
  const editEventId = parseInt(qs.get('edit_event') || '0', 10);
  if (editEventId && myEvents.some(e => Number(e.id) === Number(editEventId))) {
    switchSettingsTab('events');
    openEventForm(editEventId);
    qs.delete('edit_event');
    const rest = qs.toString();
    history.replaceState(null, '', location.pathname + (rest ? '?' + rest : ''));
  }
}

// ── パスワード変更 ───────────────────────────────────────
async function changePassword(){
  const cur = val('current_password'), nw = val('new_password');
  if (!cur || !nw) { msg('pw-msg', '両方入力してください', false); return; }
  const ok = await confirmDialog('パスワード変更', 'パスワードを変更しますか？変更後は再ログインが必要になります。');
  if (!ok) return;
  const json = await api('verified_change_password', { current_password:cur, new_password:nw });
  msg('pw-msg', json.ok ? 'パスワードを変更しました' : (json.error||'変更できませんでした'), !!json.ok);
  if (json.ok) {
    document.getElementById('current_password').value = '';
    document.getElementById('new_password').value = '';
  }
}
// グローバルに明示的に公開（onclick 属性から確実に呼べるように）
window.openEventForm = openEventForm;

window.saveEvent = saveEvent;
window.deleteEvent = deleteEvent;
window.uploadEventCover = uploadEventCover;
window.uploadEventAttachment = uploadEventAttachment;
window.deleteEventAttachment = deleteEventAttachment;
window.uploadSubeventCover = uploadSubeventCover;
window.openSubeventForm = openSubeventForm;
window.closeSubeventForm = closeSubeventForm;
window.saveSubevent = saveSubevent;
window.deleteSubevent = deleteSubevent;
window.openIconModal = openIconModal;
window.closeIconModal = closeIconModal;
window.uploadImage = uploadImage;
window.saveAll = saveAll;
window.changePassword = changePassword;
window.logout = logout;
window.login = login;
window.acceptInviteLogin = acceptInviteLogin;
window.acceptInvite = acceptInvite;
window.searchCollaboratorUsers = searchCollaboratorUsers;
window.openCollaboratorModal = openCollaboratorModal;
window.closeCollaboratorModal = closeCollaboratorModal;

window.shareCollaboratorInvite = shareCollaboratorInvite;
window.copyCollaboratorInvite = copyCollaboratorInvite;

window.closeWelcomeModal = closeWelcomeModal;
window.removeCollaborator = removeCollaborator;
window.loadImageFile = loadImageFile;
window.closeOrBack = closeOrBack;
window.closeConfirm = closeConfirm;
window.setDirty = setDirty;
init();

// 全てのクリックを委譲して処理（onclick 属性が何らかの理由で動かない場合のフェールセーフ）
document.addEventListener('click', (e) => {
  const t = e.target.closest('[data-act]');
  if (!t) return;
  const act = t.dataset.act;
  const id = t.dataset.id ? parseInt(t.dataset.id, 10) : null;
  switch (act) {
    case 'new-event':    openEventForm(); break;
    case 'edit-event':   openEventForm(id); break;
    case 'delete-event': deleteEvent(id); break;
    case 'new-subevent': openSubeventForm(parseInt(t.dataset.eventId, 10)); break;
    case 'edit-subevent': openSubeventForm(parseInt(t.dataset.eventId, 10), id); break;
    case 'delete-subevent': deleteSubevent(id); break;
    case 'close-subevent': closeSubeventForm(); break;
    case 'save-subevent': saveSubevent(); break;
    case 'open-icon':    openIconModal(); break;
    case 'close-icon':   closeIconModal(); break;
    case 'upload-icon':  uploadImage(); break;
    case 'close-event':  closeEventForm(); break;
    case 'save-event':   saveEvent(); break;
    case 'save-all':     saveAll(); break;
    case 'logout':       logout(); break;
    case 'change-password': changePassword(); break;
    case 'close-confirm': closeConfirm(); break;
  }
});
</script>
